body:
  text: 卷一總論小兒古謂啞科以其病不能達全憑醫者臆度耳兼之臟腑脆嫩藥餌不可過峻況近來氣運寢薄幼兒賦形受氣不啻水漚竹露然果關於氣運乎實由人之自取也古昔盛時人心渾噩後起聲色目縱膏粱恣欲精氣附身日剝而日削愈耗而愈衰譬之釀酒斗酒下升水則濃而耐窨斗酒下倍水則薄而難貯人情甚澆縱欲無度精氣妄泄邪火日炎真陽日憊幸而受孕能如古禮妻將生子夫居側室猶有幸也乃仍不節盜泄母氣嗚呼人之生也需父之精賴母之血彼夫未孕之前長夜縱欲父精已竭於當初及其當孕當生又復馳情母血又泄於在孕終始相剝兩兩相摧幼子之生所受父精母血者幾何今日之人大皆如是秉受羸弱何往不然然而藜藿之家衣食是計朝耘夜績志苦形勞荊叉裙布之前只此啇飢論飽何暇縱欲娛情籲如是者父精無傷於往日母氣完固於妊娠此其生子往往形完體壯不畏風霜不遭病苦鮮夭札之傷寡不育之患以此驗之秉受攸殊果在氣運之薄乎實人氣之自薄耳由是以觀則凡治幼病必以培本扶弱為定論矣胡乃受病之家罔知自反行時之醫不知尋源嘗見富家生子鍾愛每異於尋常偶有啼哭即請醫治而醫者治之不察稟受之厚薄不辨脈證之虛實不分疾病之寒熱但見發熱啼哭輒以驚風名夫驚風前賢闢之詳矣乃執迷不悟猶以開驚鎮墜散風化痰消食降火之藥雜然並進自稱穩當在虛寒者藥下而恐見痰壅煩躁危已及矣彼猶曰病重藥輕極苦大寒羅而用之有識者曰毋乃大寒涼乎彼反謂純陽之子受之無害不知病已虛寒妄用寒涼則真火就衰陽衰則陰無主而失所生人非水火不生活勢必底於夭殤而後已良可慨也誠如是也嬰兒之病不幾無從療治乎曰有定論使學者玩索有得尋源以治心誠以求所謂啞科者庶乎不啞所謂夭札者庶幾同登仁壽矣賦稟夫人之生也秉兩大以成形借陰陽而賦命是故頭圓象天足方象地五行運於內二曜明於外乃至精神魂魄知覺靈明何者非陰陽之造就與氣化相盛衰然天地之氣化有古今斯賦稟由之分厚薄上古元氣渾龐太和洋溢八風正而寒暑調六氣勻而雨陽若人情敦茂物類昌明當是之時有情無情悉歸於厚非物之厚由氣厚也及開闢既久人物繁殖發泄過傷攘竊天元雕殘太朴世風漸下人性澆漓故水旱有不時之擾流災有比戶之侵生物不蕃民用日促值此之際有知無知咸歸於薄非物之薄由氣薄也然則今之受氣於父母者其不能不薄也可知矣況有膏藜異養貴賤殊形醫術稱仁顧可視為不經之務夫膏粱者形樂氣散心蕩神浮口饜甘肥身安華屋頤養過厚體質嬌柔而且珠翠盈前嬈妍列侍縱熊羆之葉夢難桂柏以參天復有癖由貪起利令志昏者有雪案螢聰刳心噴血者有粟陳貫朽握算持籌不覺形衰氣痿者有志高命蹇妄念鎖營以致心倦神疲者凡此耗本傷元壞胎之植安保其深根固蒂也乃若藜藿之家形勞志逸願足心安守盎廩瓶倉對荊叉裙布乃其神志無傷反得胎嬰自固以此較比得失判然矣若夫怒傷元氣勞役形骸迅雷烈風嚴寒酷暑日月薄蝕病體初安醉飽傷神落紅未淨胎孕之由斯愈薄實又成於人所不覺者故人之稟受十有九虛究其所因多半率由於是業斯道者當知氣化厚薄人事澆醇因以察其胎元之受於父母者之盛衰堅脆庶幾近焉若但以上古成方而治今時薄弱膠柱鼓瑟究歸無當泥而不通未可以言達於理也心誠賦欲保赤子全仗心誠口不能言其疾苦脈難以決其浮沉外感六淫風寒火邪易襲內因諸證心肝脾臟為多欲觀氣色先分部位左頰屬木為肝右頰屬金為肺天庭高為心火之位承漿低為腎水之區脾土中央鼻為通氣肝青腎黑水木之色主驚寒肺白心紅金火之色為虛熱土色黃現疳食證多欲窮其變再察五官鼻雖中央肺竅通聲重鼻塞風寒可見唇雖赤色脾氣應燥腫生瘡脾熱自詳舌乃心苗紅滑順而乾黑者熱目為肝竅赤腫熱而有神者生胃流注於雙發頤風熱內攻則紅腫腎開竅於兩耳腎元虧損則黑枯繞耳經絡足少陽暴聾紅腫其過在膽牙床經絡二陽明齒遲枯燥病歸乎腎再觀其外以知其內紅氣現而熱蒸青色露而驚悸如煤之黑兮中惡之因似橘之黃兮脾虛之謂白乃疳勞紫為熱極青遮口角扁鵲難醫黑掩太陽盧醫莫治年壽赤光兮多生膿血山根青色兮頻見災危瀉痢而戴陽雖防咳嗽而拖藍可畏疼痛方殷面青唇撮眉目蹙驚風欲發面赤目直睡多驚火光焰焰外感風寒白氣浮浮中臟癖積乍黃乍白兮疳熱連綿又赤又青兮風邪緊急察之若精治之得理鴉聲魚口枉費精神肉折皮乾空勞氣力氣色頓移形容各異氣乏則脾冷腎虛則滯頤面目虛浮定腹脹而氣喘眉毛頻蹙則肚痛以多啼蛔出兮脾胃將敗𧈟蟲兮肛臟先虧苟瞑眩而弗瘳縱盧扁而何益手如數物兮肝風將發面若塗朱兮心火已炎坐臥愛冷兮煩熱之攻伸縮就暖兮風寒之畏肚大腳細兮脾欲困而成疳瞪目張口兮熱已危而必斃弄舌脾熱解囟腎憊重舌木舌兮虛熱積於心脾硬氣喘氣兮實火浮於肝肺齦宣息露必是牙疳哺露丁奚多緣食積唇乾自作渴腸鳴必自利夜啼分為四證變蒸周於一歲心熱欲言而不能脾虛無時而好睡病後失音者腎怯咳嗽失音者肺痿肚痛而清水流出者蟲腹痛而大便酸臭者積口頻撮而虛寒舌長伸而火熾龜胸兮肝火乘於肺膈龜背兮腎風入於骨髓鼻乾黑燥兮火盛金衰肚大青筋兮木強土潰丹瘤瘡疥皆胎毒之連綿吐瀉瘧痢乃食積之沾滯不能吮乳者熱在心脾常欲俯臥者火蒸脾胃喜視燈火者煩熱在心愛吃泥土者疳熱在脾腹痛寒侵口瘡熱積臍風忌於一月火再畏於一周驚自熱生癇因痰致吐瀉而精神敗者則危瘧痢而飲食絶者則瘁驚本心生風由肝致搐合左右兮證有順逆藥分補瀉兮病有虛實急驚也由於積熱之深涼瀉偏宜慢驚也得於大病之後溫補為貴頭搖目竄而氣喘兮上工莫醫口噤鼻張而氣冷兮神丹何濟閉目兮無魂狂叫兮多祟不知吞吐者死反加悶亂者危且如病則熱起熱則驚生或制熱以熱或攻熱以寒襁褓未寧兮但調其母匍匐不快兮當周其元奈何瀉久成痢積久成疳瘧久成癖驚久成癇未致留連兮攻之宜速已見沉疴兮治之宜緩腸胃祕結兮急瀉而已氣血虛乏兮急補而安此皆指南之活法何疑治病之不萬全也哉初誕救護小兒初生或不能發聲謂之夢生多不知救深為可憫切勿斷臍帶速用明火將胞衣炙暖使暖氣入兒腹更以熱湯燙洗臍帶即取貓一隻以布袋裹其頭足使伶俐婦人拿住貓頭向兒耳邊以口齧貓耳貓必大叫一聲兒即醒而開聲方可剪斷臍帶又有因難産或冒風寒遲久方下兒氣欲絶不能啼者亦以前法溫暖之令暖氣入腹氣回即蘇更令父母之真氣呵而接之凡斷臍帶世俗皆以刀剪斷之最為不妥但以大紙捻蘸香油燃火於臍帶上燒之令斷蓋所以補接其陽氣不但為回生起死之良法且後日無傷寒泄瀉之患初生腎縮乃受寒氣所致用硫黃吳茱萸各三錢研極細末搗蔥取汁調藥塗臍腹另以蛇床子燒煙燻之即伸悶臍生者兒糞門有一膜悶住兒氣故不能出聲拍之則膜破而叫矣又有用輕巧婦人以銀簪輕輕挑破為甚便或不能挑急以暖衣緊包勿令散放以熱水浸其胞衣寒天則以火灸之久則熱氣入腹而氣內鼓其膜自破其聲自出又有生下無穀道者乃肺熱閉於肛門急以金銀或玉簪看其端的則穿之或以火針刺穿但不可深以油紙捻套住免其再合兒初生下遍身如魚脬或如水晶破則流水以密陀僧研末手艷之兒初生遍身無皮俱紅肉急以早米粉干撲之候其皮生全則止初生大小便不通腹脹危急者急令婦人口含熱水吮兒之前後心並臍下手足心共七處每一處吮吸七口以肉色紅赤為止須臾即通又一方以生蔥汁人乳各半調勻抹兒口中須臾即通初生不尿以蔥一根切碎人乳半杯同煎去蔥取乳分作四次服即尿不吮乳者服此即吮乳初生護持嬰兒初生肌膚未實宜用舊絮護其背亦不可太暖更宜素見風日則血氣剛強肌肉緻密若藏於重幃密室或厚衣過暖則筋骨軟脆不任風寒多易致病衣衫當隨寒熱加減但令背暖為佳亦勿令其汗出恐致表虛風邪易入乳哺亦不宜過飽所謂忍三分飢吃七分飽頻操肚少洗澡皆至言也又須令乳母預慎六淫七情蓋兒初生借乳為命善為乳母者夏不欲熱熱則致兒吐逆冬不欲寒寒則致兒咳嗽怒乳則上氣顛狂醉乳則身熱腹痛新房而乳則瘦瘠交脛不能行新浴而乳則發吐傷神冷熱不調停積胸膈結為痰飲遂成壯熱壯熱不已乃成風癇兒啼未定劇以乳哺氣逆不消因成乳癖有孕而乳致兒黃瘦肚大腳小名曰魃音忌病總之乳母能慎寒暑恚怒厚味炙煿庶乳汁清和兒不致疾否則陰陽偏勝氣血沸騰乳汁敗壞必生諸病若屢服藥餌則臟腑陰損多變敗證不可不知初誕之時有於頭額之上髮際之間灸之又有以燈火遍身燒之彼以為能截風路不知實足以大開風門蓋火攻由兒有病不得已而用之無故而用伐及無辜諸病自茲始矣戒之戒之凡浴時須調和湯水試看冷熱若不得所令兒怖畏況冬浴久則傷寒夏浴久則傷熱其浴兒當護兒背恐風寒從背而入凡浣兒衣不可露於星月之下易惹邪祟如偶失收當用醋炭熏過方可衣之有鳥名天地女又名隱飛鳥最喜陰雨夜過飛鳴徘徊其鳥純雌無雄善落羽毛於兒衣中令兒作病不可不謹凡當春夏月間宜令其地臥使不逆生長之氣如遇秋冬宜就溫和使不逆收藏之令凡在春天勿與護頂裹足以致陽氣不舒因多發熱即至年長下體勿令過暖蓋十六歲前血氣方盛如日方升惟真陰未足下體主陰得清涼則易長溫暖則陰易消故曲禮云童子不衣裘裳夫人以脾胃為主故乳哺宜節節則調養脾胃過則損傷脾胃夏天忌熱乳冬月忌寒乳皆宜捏去之而後與之凡食後不可與乳乳後不可與食小兒脾胃怯弱乳食並進難於消化初得成積久則成癖成疳皆乳母不慎之過凡寒則加衣熱則減衣過寒則氣滯而血凝澀過熱則汗泄而腠理疏以致風寒易入疾病乃生更忌解脫當風易於感冒然風和日暖又當抱出遊戲如陰地草木不見風日未有能堅持者又不可日置地間令肚著地以致脾宮受寒腹痛泄瀉慎之慎之調變小兒初生飲食未開胃氣未動廓然清虛之府宜乘此時加意調變於兒未啼之時令精巧婦女輕指探兒口控去汙血隨以甘草湯用軟帛裹指蘸湯拭去口中涎沫然後看兒面色若身面俱紅唇舌紫赤知其必有胎毒每日用鹽茶但不可太鹹以帛蘸洗其口去其黏涎日須五六次此法至神至異世所不知蓋兒之胎毒藏於脾胃口中多有精涎其馬牙鵝口重舌木舌皆從此起每日洗拭則毒隨涎去病從何來而且至簡至易何忽視而不為倘胎毒重直須洗至周歲方可此有毒者之調變也倘兒面唇淡紅此為胎寒不可用茶惟以淡薑湯洗拭每日一二次足矣蓋薑能開胃而且和中最宜於時用者至於古方之用黃連大黃硃砂輕粉開口之法此時斷不可用今時稟受十有九虛苦寒克削最不相宜況嬰兒初誕如蟄蟲出戶草木萌芽卒遇暴寒嚴霜未有不為其僵折者以苦寒而入初誕之口亦若是也每見三朝七日必有肚疼嘔乳泄瀉夜啼之證是皆苦寒傷胃之害其孰能知之或曰子言苦寒不可用於初誕之口何以後之沆瀣丹及瀉青丸有三黃大黃得無矛盾乎曰彼胎毒已現外證可憑有病病當何大黃之足畏今初誕開口未辨毒之有無即使有毒尚然未發深藏潛伏聲臭俱泯程鳳雛有言正如閭閻無事時未可扶平人而誅之曰爾將為寇也以苦寒而開口是誅平人也毒發而畏苦寒是有寇不誅鄉原之仁烏乎可也看病訣小兒初生欲知其有病無病以手捻其頭摸其頤頷不作聲者為無病以手指探其口雖發聲而從容咂指者有病亦輕若急發聲不咂指者面色青紅帶紫或牙關緊急不納乳汁此落地受寒之甚風邪入足太陽及足陽明而然也須急治之庶可平復初生之兒肥胖色嫩日覺好看者此其根本不堅甚非佳兆且最易感冒風寒邪入腑者近在第二三日見之其證吐乳夜啼腹鳴此皆胎風之類然證猶淺而易治宜用全身燈火十不失一若邪之入臟遠在六七日見之此即臍風噤口撮口風之候若口噤舌大痰壅者皆不治蓋病傳入臟繫心脾肺三經也此風氣甚盛無所發泄便形見於喉口牙關聲音也凡生下時身破裂者死陰囊白者死陰不起者死無糞門者死股間無生肉者死開口如鴉聲者死粉白花色者死皮肉不光者死泣不出聲者死舌如豬肝色者死面無彩色者夭臍帶短大紫色者夭生下渾身銀白色者夭生下有齒者大凶主傷父母不然必傷自身生下未裹即撒尿者殺父母蕩家産在世終身勞苦治病端本澄源至要口訣凡臨病家診視小兒無論病之輕重證之順逆稍長者令其本身忌口乳子即令乳母忌口嚴禁葷酒油膩酸鹹辛辣但可香茶白飯稍用蜜餞糖食而已蓋乳房為胃經所主飲食入胃腐化精微而為榮血貯於衝脈衝脈載以上行遂變赤為白而為乳汁小兒賴此以為命與乳母氣候相關吉凶共際是以母食熱子受熱母食寒子受寒母食毒子中毒又惟葷酒油膩甘肥凝滯之物為尤甚故凡小兒有病但得乳母忌口即不藥亦能自愈不觀窮鄉僻壤藜藿單寒之家所育之子肥實壯健而且少病病亦易愈人但云他人之子何以易育不知他家無甘肥凝膩口腹清淡所以病少而易育自家乳母縱口飲啖葷酒不忌醫雖用藥得法其如乳汁不清胃口油膩不能宣布藥力所以多病難醫也此至緊要關頭醫者不為切戒其咎在醫至於病家每多自誤凡乳子有病其母於房勞食飲寒暑喜怒一毫不慎惟責效於醫之草根樹皮詎知刀頭圭角能勝其無情之相火能制其有質之油膩耶徒令醫者勞心病兒受苦深可悲憫復有婦人姑息之愛切要提防昔豫一堂弟年八歲因病傷寒幾死得遇助者保全稍能步履醫囑嚴禁葷腥豫伯母覿面承諾私以爛蹄花一碗與之病人見肉登時食盡時豫目觀其事夜即變證四肢厥冷口吐白沫喉內痰鳴兩目直視而絶豫伯與醫驚惶無措莫測其由因詢曾食何物伯母堅辭無有微風不露豫亦莫敢直言醫者無可下手遂辭去豫取山楂肉炒研細末以濃薑湯調灌數次蓋山楂多服最能通利五更大瀉數行所下油膩膠滯之物內有精肉猶存人事倏清伯見所下之物始知肉食生變痛罵其母幾至反目幸豫在側開解之令豫調理豫為暢脾而安此等曖昧苟非豫之目擊伯母必不直告即至真死彼亦不言醫者亦不知其何以變證而死可見婦女誤事為禍如此其烈也凡類此者以天下之大又豈特一人而已故凡遇膏粱宦室不可不諄切言之以杜其姑息之害小兒在胎之時衝脈運血以養之及其産下衝脈載血以乳之乳為血化所以兒之脾胃獨與此乳汁相吻合其他則皆非所宜矣凡小兒一周二歲止可飲之以乳切不可輔以穀食蓋穀食有形之物堅硬難消兒之脾氣未強不能運化每多因食致病倘乳少必欲借穀食調養者須以早米炒熟磨粉微入白糖滾湯調服不致停滯至於肉食尤為有害凡小兒五歲之內能忌肉食終身無脾病無奈愚夫愚婦莫可理喻見兒病稍愈即以肉食飼之謬云虛補不如實補謂藥補為虛肉補為實不知此語出於何經妄誕無知真堪唾罵及其脾胃凝滯兒病復作始為倉惶懊悔是誰之咎故小兒病後必不可妄用葷腥只可素食調理或一月半日待其脾氣已健始可略與清湯仍不得過用甘肥蓋甘肥之物非但不能益兒適足以致病醫者能知此意治病必不掣肘病家能依禁忌斷無反悔之虞此非摹擬之辭實知之深見之確端本澄源莫切於此豫雖未學臨證有年病家之弊無不周知故不得不剖心相告庶後賢知所提備云治法定論稽凡治病之法舉不外乎望聞問切以別表裡虛實陰陽大法若此於幼何獨不然而歷考前明治幼定規其要在辨指紋蓋指紋者與寸關尺同一脈也按內經十二經絡始於手太陰其支者從腕外出次指之端而交於手陽明宋人創之而錢仲陽則以食指分為三關寅曰風關卯曰氣關辰曰命關其訣謂風輕氣重命危言雖未必悉驗而其義可取後出惡醫謬撰驚風門類專從指上辨別遇青紋則謂是四足驚黑因水撲赤因火炎則謂是人驚紫色成瀉或兼土黃則謂是雷驚是紋之青黃赤黑皆驚之所致而小兒之內傷外感麻痘等證虛實寒熱豈無所辨乎乃悉以驚風治之可乎噫仲陽宋之明人也以孝見稱豈故出此謬妄之説豈肯造此殺幼之罪其由異徒假名而造孽也明甚然不有喻氏嘉言陳氏飛霞二先生饒特識而力闢之不至為其所貽害者幾希矣雖然指紋原屬太陰之旁支與太淵無異療幼兒者焉可闢而不用但當以浮沉分表裡紅紫定寒熱淡滯定虛實而尤必兼憑脈斷第兒童幼小三部之地位不寬診切何從下手古法以一指定三關其候仍不外定浮沉有力無力病之吉凶亦從此驗歌詳於後可熟諳之是故辨紋定法切脈定規明斯二者思過半矣又何容多論哉然形色尤不可不觀也聲音尤不可不聞也根由尤不可不問也考厥病幾凡面紅目赤及形壯口渴聲粗便閉者其證皆屬實面白露睛及形衰聲微神恍便溏者其證皆屬虛而尤必視小兒嚮往之好尚與父母身體之強弱詢乳母飲食之厚薄性情之溫躁與夫懷抱遊玩之地及其供樂適情之物且情意與何人相契必問得病在何時地必詢合而驗之則病情無不了然或溫或清操卷可得至假虛假實切要尤在脈之有力無力心領神會臨證用藥庶無貽誤所謂躋夭傷於仁壽者殆此謂也診脈法小兒三五歲原非大方可比然亦可以診視第手腕短促三部莫分惟以一指候之誠非易易內經曰診視小兒者必察氣口之脈面部之色呼吸之聲或兼察手魚亦可診脈不必多歧但以緩急大小為準余不避僭越體其意竟易為浮沉遲數而以有力無力定其表裡虛實似比大即浮洪類也小即沉細類也緩即遲也急即數也為明悉後賢其體之四脈主病浮主表病在外沉主裡病在內遲主臟病為寒數主腑病為熱四至五至為遲為寒為不足浮遲外寒沉遲內寒有力實寒無力虛寒七至八至為數為熱為太過浮數表熱沉數里熱有力實熱無力虛熱診脈主病歌浮而有力實兼風風熱皆陽表之實也無力陰虛汗雨蒙陰營妄泄表之虛也有力而沉痰食害痰凝食滯結於裡也沉沉無力氣凝胸氣滯於中不運化也遲而有力多為痛浮遲外痛沉遲內痛無力虛寒氣血窮氣弱血衰至虛之候數脈熱多終有力數而有力實熱無疑瘡痍無力熱虛攻陰血受傷虛熱所致總括脈要歌太淵一指定安危六至中和五至虧七八至熱多三四至冷浮沉遲數貴詳推有力為陽為實熱虛寒無力里何疑若能留意於中取何致亡羊泣遠歧脈證宜忌歌脈浮身熱汗之松陽邪居表應從汗解沉細身涼莫強攻無論表裡不可攻伐咳嗽正嫌浮帶數浮緩為宜浮數大忌細沉腫脹定知凶脾胃虛寒愈不運化沉遲下利方為吉氣血俱傷最嫌洪數洪大偏宜痘疹逢陰陽充足毒不能留腹痛不堪浮有力二陰受病浮則反常浮洪吐衄總無功陽火太盛陰血愈虛陶節庵曰診脈之要無論浮沉遲數但於有力無力中分有力者為陽為實為熱無力者為陰為虛為寒至哉斯言也後賢無忽病熱生死論病熱脈懸小者陽證見陰脈本為大忌但小而緩者邪之微其愈易小而急者邪之甚為可慮也手足溫則生寒則死夫以稚陽之體而加病熱脈不當小若脈體雖小手足溫者以四肢為諸陽之本陽猶在也故生若四肢寒冷者則邪勝其正元陽去矣故死中風熱喘鳴息肩者脈實大也緩則生急則死此言外感風熱中於陽分而喘鳴息肩者脈當實大但大而緩則胃氣存邪漸退故生實而急則真臟見病日進則死指紋三關圖紋形主病歌腹痛紋入掌中心彎內風寒次第侵紋向外彎痰食熱水形脾肺兩傷陰掌心包絡所主紋入掌中邪侵內臟由中氣寒也故腹痛紋若彎弓內外有別其紋彎向中指為內為順證為外感風寒易治彎向大指為外為逆證為內傷飲食難治形如水字脾肺不足食塞太陰中氣怯弱脾不運化故也或問指紋只一線安有水字之形曰不觀太淵之脈亦只一線何以陽維陰維陽蹺陰蹺皆左右彈右豈非水字之形乎脈有左右安知紋無左右觸類旁通無往非理也三關部位歌初起風關證未央氣關紋現急須防乍臨命位誠危急射甲通關病勢彰凡看指紋以我大指側面推兒食指三關若覆指而推紋必變色蓋羅紋有火剋制肺金又當從辰關推至寅關若從寅關推至辰關則愈推愈出大損肺氣可不慎乎哉陳飛震曰指紋之法起於宋孝子錢仲陽以食指分為三關其法診食指之第一節寅位為風關第二節卯位為氣關第三節辰位為命關位則自下而上邪則自淺而深證則自輕而重紋見寅關邪氣初入紋見卯關邪氣正盛紋見辰關邪氣充塞紋透關射甲則邪無所容如亢龍之象矣又當以浮沉分表裡紅紫辨寒熱淡滯定虛實殆用之不盡也夫乳子非無脈可診虛實不易定耳然亦當以指紋之可見者又診之於脈互相印證而聞聲察色是固然也浮表沉里辨指紋紅黃隱隱乳子無病之診指紋若浮邪尚在表速宜疏散使邪隨微汗而解指紋若沉邪已入里但入有淺深之別若指紋半沉往來寒熱則邪尚在經治宜解肌瀉火指紋極沉則邪已入腑急需攻下救里若見身熱猶以風藥治之此病在內而治其外不特邪不能服適足燥其陰血愈增其困耳紅寒紫熱辨指紋紅鮮由血滯也此寒邪初入皮毛之應無論內寒外寒初病久病一見此紋總以寒證施治若紋色淡瑩中氣弱也淡而兼紅虛寒之應也指紋深紅由寒閉汗孔腠理不通寒化為熱矣熱壅經絡紋必見紫紫為熱盛千古定論也至若肝膽受邪指紋必青此傷風候也此可以風熱目之不可云驚風以誤人若紫而兼青者是為傷食蓋飲食有形之物阻抑中焦壅遏脾氣不能宣布故風乘其困而侮之所以痰氣上逆也疏通壅滯令其流利則病愈矣若青而兼黑者此風痰實熱固結中焦脾氣抑鬱之至急宜攻下庶有生機誤認驚風百無一救淡虛滯實辨小兒稟賦陽虛面色㿠白唇舌淡瑩者指紋四時皆淡即有病之時亦止淡紅淡青淡紫而已淡紅為虛寒淡青為虛風淡紫為虛熱無論新病久病總歸於虛誤投攻伐覆水難收戒之慎之若指紋澀滯全無活潑流利之象此由飲食風熱相搏是為實證急宜蕩滌去其菀莝則易愈矣若三關純黑推之不動不可治也看驚紋辨生死歌虎口有三關風氣命相參青風驚急病黃黑水傷餐紫色生驚曲紅青熱在肝關中尋五色節節見紋斑已過三關節神仙不可扳面圖歌右頰肺金左頰肝脾通鼻準定中央印堂心位承漿腎就簡刪繁便覽看五臟所屬辨色分證察兒形色先分部位欲辨形之強弱堅脆色之光澤枯茉必先分上下左右之部定五行四象之位然後按部察色以定證之安危左頰青龍屬肝右頰白虎屬肺經曰左右者陰陽之道路也蓋五行之位木旺在卯金旺在酉天地之氣陽從左升陰從右降故以左頰配肝右頰配肺非謂左頰即是肝右頰即是肺不過以生殺之理配木金龍虎之位以候其臟氣之強弱爾天庭高而離陽心火地角低而坎陰腎水周易以東震西兌南離北坎定子午卯酉之四正蓋後天之用有形者無不由之故以心配離南之午火於天庭腎配坎北之子水於地角亦陽上陰下之義第據其理而言之非謂額上即心唇下即腎竊笑幼科未識淵源刻舟求劍未可向癡人而説夢也鼻在面中脾應唇際內經以鼻為面主以其位居至中內通呼吸生死賴之所以謂之中也脾為中土經曰中央黃色入通於脾開竅於口又曰脾胃倉廩之本其華在唇四白故曰脾應唇際亦中州受納之地也或間既五臟之經脈未行於面何以又從面部而察五臟之證能無幻耶曰日望色察證內經之傳第軒歧大聖天人之學後世莫能效法所以據五行四象列以部位庶望色者有所憑依耳又曰布列雖按五行恐內臟之氣不應奈之何哉曰五臟之脈實未行於面而藏象論曰十二經脈三百六十五絡其氣血皆上於面而走空竅蓋人上下九竅而七竅在面目二耳二鼻二口一故目為肝竅耳為腎竅鼻為肺竅口為脾竅舌為心竅有此諸竅而後三百六十五絡之氣皆通於面故曰氣血走空竅由是按部察色以決其吉凶亦猶於脈之兩手六部分左心小腸肝膽腎右肺大腸脾胃命夫兩手惟一肺脈耳他臟何涉亦前哲按八卦方位以手太陰一經巧分六部以候十二經臟氣之盛衰然則脈之隱微莫觀尚可候其成敗面色之一望顯然者獨不可推其吉凶乎醫理至微後賢幸勿忽略紅色見而熱痰壅盛青色露而肝風怔悸此概言通面之色通面為足陽明胃經所主胃經鬱熱面必淡紅熱搏津液定化為痰而壅滯風邪沖並面必見青心神不安則為怔忡驚悸如煤之黑為痛中惡逆傳似橘之黃食傷脾虛吐利面見黧黑至凶之俟俄而暴病乍見實為中惡之徵蓋因惡毒之氣從鼻而入肺先受之阻遏正氣遂道不通所以腹痛邪盛不能自出反至子乘母位而逆傳如肺傳脾脾傳心者是也橘黃言其深黃也脾可運化乳食不停何黃之有由其運化失職所以食填太陰脾氣凝滯故深黃上面必致有吐瀉之虞白乃疳勞紫為熱熾白屬肺氣虛子傷纍母所以脾必困而為疳紫為風熱熾經絡受邪定化為壯熱而不已青遮日角難醫黑掩太陽不治此下逐部分言之諸書皆誤為口角不知面部無口角之位不但無此位證亦全不符蓋小兒中氣強者唇不變色中氣虛寒者十有九青此為常候非難醫之證今正之日角左額也猶日之東升而為青色遮蔽為木蔽陽光病則必有疑難之慮太陽左右兩額也太陽為衆陽之宗屬火旺夏氣色宜紅今黑色掩映將有水來剋火之象定見傷殘故曰不治年壽赤光多生膿血山根青黑每多災異年壽鼻梁也為氣之門戶赤光侵位肺必受傷氣不流行則血必凝滯將有膿血之災山根足陽明胃脈所起大凡小兒脾胃無傷則山根之脈不現倘乳食過度胃氣抑鬱則青黑之紋橫截于山根之位必有延綿啾唧故曰災異朱雀貫於雙瞳火入水鄉青龍達於四白肝乘肺位朱雀赤脈也雙瞳腎水也赤脈貫瞳火垂水位治宜瀉心補腎青龍肝木也四白肺金也白珠見青肝風侵肺治宜保肺平肝瀉痢而戴陽須防咳嗽而拖藍可忌瀉屬脾病痢屬腎病脾腎兩臟既傷先後二天並弱面宜憔悴今反面見紅赤知為虛陽上泛故曰須防咳嗽肺病也青者肝色也由其肺氣已虛肝無所畏木乘金位恐其生火以剋金故曰可忌疼病方殷面青而唇口撮肝風欲發面赤而目竄視疼痛腹痛也寒氣侵脾內臟無火一派陰冷阻抑陽和故面青而唇撮也竄視目直視也幼時指為肝病其實太陰經木證蓋太陰之脈系目上綱血虛受寒則上綱緊急故目直視今指為肝風必用風藥耗其津液反成不救能知養血其病自療火光焰焰外感風寒金氣浮浮中臟積滯通面火光風寒傷胃陽明拂鬱表未解也黃色滿面食傷脾也運化無功久成積也乍黃乍白疳積連綿又赤又青風邪瘲瘛黃為脾虛白為肺弱脾肺俱傷無氣以運乳食難消輕則為積久則為疳赤為火色青為風色風火相乘榮血枯燥筋脈牽強甚則搐搦而為痙矣氣乏囟門成坑血衰頭毛作穗小兒稟受精髓不足者平日腦髓末充賴氣以充之今大病之後中氣下陷安保其囟不成坑耶發乃血之餘血榮則發黑今頭毛如草之穗知其榮血枯焦也肝氣眼生眵淚脾冷流涎滯頤眼屬肝肝氣實則眵乾硬肝氣虛則眵膠黏寒傷肝則淚冷熱傷肝則淚熱脾主涎脾氣虛冷不能收攝故津液妄泄而滯於頤間誤為脾熱禍不旋踵面目虛浮定腹脹而上喘眉毛頻蹙必腹痛而多啼脾肺兩虛中宮寒肅以致氣不歸源反逆而之上則上氣喘急面目虛浮因知其內必腹脹小兒知識未開於七情六欲毫不相關何頻蹙之有亦由臟寒腹痛所以不時啼哭而頻蹙不樂也左右兩頰似青黛知為忤客風氣二池如黃土無乃傷脾左右兩頰俱青客忤之證由小兒神氣怯弱陽和未充外邪客氣得以乘之從鼻而入忤其正氣則口吐青黃白沫面色變異不常腹痛喘急者是也風池氣池眉上眼下也風池屬肝氣池屬胃如黃土之色由木勝土覆所以真臟色見風門黑主疝青為風方廣光滑吉昏暗危風門者耳前也少陰經所主黑則為寒為疝青則為燥為風方廣眉梢也亦少陽所主光亮則吉昏暗則危手如數物兮肝風將發面若塗朱兮心火燃眉邪熱傷神手如數物謂十指屈伸不定如數物之狀速宜疏解熱邪斷無肝風之發淡紅為陽明胃經表熱深紅為少陰心經裡熱面若塗朱知為心熱心不可瀉惟瀉小腸兩火一清丁火自息坐臥愛暖風寒之入伸縮就冷煩躁何疑凡小兒偎入母懷藏頭密隱欲入懷抱者惡風寒也由風寒初入未能化熱所以坐臥愛暖邪已入里則撒衣揭覆揚手露面偃胸仰臥口渴躁煩由其內外皆熱所以欲就清涼肚大腳小脾欲困而成疳目瞪口張勢似危而必斃脾不運化而肚大肌肉消削而腳小蓋脾主肌肉由其乳食失節所以脾困而成疳膀胱絶而目瞪脾氣絶而口張其勢已危必無可生之理噫五體以頭為尊一面惟神可恃況聲之輕重不同啼之乾溼頓異呵欠連綿知病之欲作急然驚叫識火之將煒此察證之規繩幸拳拳而不悖頭為元首故以為尊面分五位惟神是賴神存則生神亡則死蓋指眼光而言也況聲有輕重啼有乾溼安得無辨凡聲微者知其氣不足聲壯者知其氣有餘哭而無淚者實哭而多淚者虛呵欠連綿為陰陽交引升降不前知其病之將至忽然大叫則知火熱擾神必有壯熱之證倘能依此辨證亦猶工之有規矩樂之有六律是則是效是突是圖自不致有望洋之嘆矣審顏色苗竅知表裡之寒熱虛實夏禹鑄曰望聞問切固醫家之不可少一者也在大方脈則然而小兒科惟以望為主問繼之聞則次而切則無矣經云切而知之之謂巧夫小兒以脈未全切之無可切而巧亦無所用其巧問而知之之謂工小兒於未言時問之無可問即於能言者問之多不以實對是問不必問而工亦無所用其工聞而知之之謂聖小兒初病時聲音或不失其常至病久而氣喪氣喪而聲失聞之無可聞而聖又何所見其聖況書曰哭聲不響赴陰君而亦有不赴陰君者何無非擬其聲不得肺之絶與不絶故也吾故曰以望為主曰五臟之屬體隱而理微望從何處曰體固隱矣而發見於苗竅顏色之間者用無不周理固微矣而昭著於四大五官之外者無一不顯中庸所謂費而隱微之顯者不可引之相發明哉故小兒病於內必形於外外者內之著也望形審竅自知其病按病用藥見效之速未有不如響之應聲者內有臟曰心曰脾曰肺曰腎曰肝五臟不可望惟望五臟之苗與竅舌乃心之苗紅紫心熱也腫黑心火極也淡白虛也鼻準與牙床乃脾之竅鼻紅燥脾熱也慘黃脾敗也牙床紅腫熱也破爛胃火也唇乃脾之竅紅紫熱也淡白虛也黑者脾將絶也口右扯肝風也左扯脾之痰也鼻孔肺之竅乾燥熱也流清涕寒也耳與齒乃腎之竅耳鳴氣不和也耳流膿腎熱也齒如黃豆腎氣絶也目乃肝之竅勇視而睛轉者風也直視而晴不轉者肝氣將絶也以目分言之又屬五臟之竅黑珠屬肝純見黃色凶證也白珠屬肺色青肝風侮肺也淡黃色脾有積滯也老黃乃肺受濕熱證也瞳人屬腎無光彩又兼發黃腎氣虛也大角屬大腸破爛肺有風也小角屬小腸破爛心有熱也上胞屬脾腫則脾傷也下胞屬胃青色胃有風也睡而露睛者脾胃虛極也面有五位五臟各有所屬額屬心離火也左腮屬肝震木也右腮屬肺兌金也口下屬腎坎水也鼻準屬脾坤土也五臟里也六腑表也小腸心之表小便短黃澀痛心熱也清長而利心虛也胃乃脾之表唇紅而吐胃熱也唇慘白而吐胃虛也唇色平常而吐作傷胃論大腸肺之表閉結肺有火也肺無熱而便祕血枯也不可攻下脫肛肺虛也膽乃肝之表口苦膽火也聞聲作驚肝虛也膀胱腎之表筋腫筋痛腎之寒氣入膀胱也面有五色一曰紅紅病在心面紅者熱一曰青青病在肝面青者痛一曰黃黃病在脾面黃者脾傷一曰白白病在肺面白者中寒一曰黑黑病在腎面黑而無潤色腎氣敗也望其色若異於平日而苗竅之色與面色不相符則臟腑虛實無有不驗者矣五臟所屬之證肝者足厥陰木也實則目赤大叫呵欠頓悶虛則呵欠咬牙有風則目連眨有熱則目直視成疳則白膜遮睛主怒則性急大叫哭甚則卵腫熱則大小便難手尋衣領手亂捻物甚則撮空摸床此喪魂病也兒病時目睛視物不轉或目合不開或目開不合或哭而無淚或不哭而淚出皆肝絶也心者手少陰火也實則叫哭發熱飲水虛則困臥悸動不安心血足則面色紅潤易養心血虧則面色昏黯難養熱甚則津液干而病渴神亂而臥不安喜伏臥舌破成瘡又為重舌木舌舌出不收之病凡病丹瘤斑疹龍纏虎骨蟲疥瘡皆心之證也如心病久汗出發潤或舌出不收暴喑不語或神昏潰亂或斑疹變黑此皆心絶也脾者足太陰土也為水穀之海實則困睡身熱飲水虛則吐瀉生風傷濕則為腫為脹為黃為吐瀉故脾痛則腹痛脾疳則肚大青筋脾熱則口臭唇瘡飲食不為肌膚吐舌弄舌口乾飲水寒則口角流涎謂之滯頤氣不和則口頻撮虛則肉削而瘦不喜飲食傷食則成積積久則成疳成癖如脾久病大肉消削肚大青筋或遍身虛腫或吐瀉不止飲食不入或多食而瘦或蟲出於口或唇蹇而縮皆脾絶之證也肺者手太陰金也實則悶亂喘促虛則哽氣長出經曰寒傷肺由兒之衣薄受寒也又曰熱傷肺由兒之衣厚鬱熱也凡兒寒熱傷肺則氣逆而為喘為咳肺受風則噴嚏而流清涕受寒則鼻塞呼吸不利受熱則鼻乾或為衄血成疳則鼻下赤爛喘不止則面腫咳不止則胸骨高謂之龜胸燥則渴不止好飲水謂之膈消如肺久病咳嗽連綿喘息不休或肩息或龜胸或咳血不止或鼻孔黑燥或鼻孔開張而喘或瀉痢不休大孔如筒或面目虛浮上喘氣逆皆肺絶也腎者足少陰水也虛則目畏明目中白睛多其顱即解色㿠白骨髓不滿兒必畏寒多為五軟之證尻骨不成則坐遲髁骨不成則行遲真陽不足則齒遲血脈不榮則發稀心氣不足則語遲熱則耳中出膿生疳如腎病久身下竄目中如見鬼狀或骨痿弱臥不能起或二便遺失此腎敗也簡切辨證小兒熱證有七面腮紅大便祕小便黃渴不止上氣急足心熱眼紅赤此皆實熱證忌用溫補小兒寒證有七面㿠白糞青白肚虛脹眼珠青吐瀉無熱足脛冷睡露睛此皆虛寒忌用寒涼壽夭辨頭者諸陽之會髓之海也凡兒頭角豐隆髓海足也背者五臟六腑俞穴皆附於背脊背平滿臟腑實也腹者水穀之海腹皮寬厚水穀盈也目為肝竅耳為腎竅鼻為肺竅口為脾竅七竅無闕形象全矣故知肉食者脾足筋強者肝足骨堅者腎足不妄言笑者心足不多啼哭者肺足哭聲連續者肺實不久眠睡者脾實兼之腳健而壯項長而肥囊小而黑根株固也肌肉溫潤營衛和也而更腮妍如桃發黑似漆表氣實也小便清長大便滋潤裡氣實也已上皆為壽相其兒無病易養諸陽皆起於頭顱破項軟者陽衰於上諸陰皆起於足腨小腳蜷者陰衰於下鼻孔乾燥肺枯唇縮流津脾冷發稀者血衰項軟者柱折青紫之筋散見於面者多病風熱兼之形枯色灰者表虛瀉利無時者裡虛瘡疥啼哭及多笑語者皆屬陽火妄動之候以上皆為夭相其兒多病者難看凡聲音清亮者壽有回音者壽哭聲澀者病散而無聲者夭變蒸闢謬變蒸之説自古無之至西晉王叔和始創其論謂嬰兒生下三十二日一變六十四日一蒸為究其義則謂變者變生五臟蒸者蒸養六腑長益氣血而生精神益智慧凡五百七十六日而畢每當其候惟有身熱耳冷驚惕而已別無他病稽其制治下方則或曰令母服小柴胡湯或則用褊銀丸是無論其變蒸之無即其用藥已大逆天地生育之機矣而況乎一言昌之後議雜出或則以天一生水徵其變或則以木火相生定其蒸不但此也且有以木金相剋為言者焉噫今日之幼兒異日之強壯也考夫生生之道人身為一小天地人之生也本陰陽自然運化之理在人身本父母精血而成陰陽化之精血育之必化育其內外五官五臟六腑百骸之無缺而乃生苟有一之不具則斷其無生長之日即生長之亦終為廢人是則小兒初生百體無不具即有不具亦不過增長之而已何待乎變抑何待乎蒸縱或有所謂變有所謂蒸其説宜有定論又何至各執一見紛然逞為異説哉則變蒸之無其説也有斷然者況後之明達若張氏景嶽陳氏飛霞歷有定論即豫醫數十年療治小兒不可勝數從未見有一如所謂變蒸之期而依候而發熱者有之或前乎其期數十日或後乎其期數月是豈變蒸也乎故敢執鄙見而叱之曰小兒無變蒸之事後醫毋得信之凡遇作熱等證惟依類驗證因證下方庶不致貽誤遲延殺人於無形也有心保赤者其信然乎勿輕服藥初誕之兒未可輕藥蓋無情草木氣味不純原非嬌嫩者所宜且問切無因惟憑望色粗疏之輩寒熱二字且不能辨而欲其識證無差未易得也凡有微疾不用倉忙但令乳母嚴戒油膩葷酒能得乳汁清和一二日間不藥自愈所謂不藥為中醫至哉言也每見愚人兒稍不快即忙覓醫練達者或不致誤疏略者惟以通套驚風藥治之此無事之中生出有事伐及無辜病反致重父母見其無效是必更醫卒無善手相與任意揣度曰風曰痰曰驚曰熱前藥未行後藥繼至甚至日易數醫各為臆説湯丸疊進刻不容緩嗟乎藥性不同見識各異嬌嫩腸胃豈堪此無情惡味擾攘於中不必病能傷人而藥即可以死之矣豫每見不聽勸戒艾藥妄投者百無一救哀哉楚瞻曰凡為幼科猶宜參看方脈諸書蓋幼稚名曰啞科疾病痛苦勿能告人全賴治者細心詳察況幼科諸書理淺言略難明病源惟以小兒不節飲食為執見最重消磨更以純陽之子為定論恣投寒苦孰知易停滯者脾氣必虛若圖見小效於目前則便遺大害於日後況小兒易虛易實言虛者正氣易於虛也言實者邪氣易於實也然邪湊之實必乘正氣之虛若不顧正氣之虛惟逐邪氣之實其有不敗者幾希如寒傷營也但溫養營陰風傷衛也惟辛調衛氣但使營衛和平而宣行則客邪不攻而自散使正氣自行逐賊則邪氣退而正氣安然如浮雲一過天日昭明也若專投與氣血無情之猛劑客邪雖散正氣亦傷乘虛之邪將接踵而至矣豈知正氣不至空虛邪必不能湊而為實至於云純陽者以無陰而謂乃稚陽耳其陽幾何陰氣未全而覆敗其陽將何以望其生長耶況大地之氣化日薄男女之性情日漓幼稚之稟受日弱有稟父之陽氣不足者多犯氣虛中滿有稟母之陰血不足者多犯陰虛發熱患痘則多犯腎虛內潰之證此皆先天不足所致近來比比皆然若徒效上古克削寒涼如肥兒丸蘆薈丸之類則千中千死莫能挽也至云小兒陽火有餘不知火之有餘實由水之不足壯水以制陽光先賢至論服寒涼百不一生古哲格言以不生之藥投欲生之兒心何忍哉凡小兒脾胃自能消穀今偶有停滯則脾胃受傷只健其脾胃而谷自化矣故方有助脾消化推蕩穀氣者有稟命門火衰補火生土者有一消一補者有以補為消者誠恐寬一分即耗一分元氣也夫人有生惟此一氣易虧難復何可輕耗況幼稚之稟尤為易虧惟必根究先天之薄弱而從方脈諸書求源探本以為治斯能補救當代赤子元氣於後天便亦培植後代赤子元氣於先天而壽世於無疆矣若徒宗上古幼科淺略方論則猶灌溉樹木者不顧根本而惟灑潤枝葉欲望其生長未之有也而況復加劃削者乎藥餌之誤小兒氣血未充一生盛衰之基全在幼時此飲食之宜調而藥餌尤當慎也今舉世幼科既不知此大本又無的確明見而惟苟完目前故凡遇一病則無論虛實寒熱但用海底兜法而悉以散風消食清痰降火行滯利水之劑總不出二十餘味一套混用謬稱穩當何其誕也夫有是病而用是藥則病受之無是病而用是藥則元氣受之小兒元氣幾何能無陰受其損而變生不測此當今幼科之大病而醫之不可輕任者正以此也又見有愛子者因其清瘦每以為慮而詢之庸流則不云痰火必云食積動以肥兒丸保和丸之類使之常服不知肥兒丸以苦寒之品最敗元陽保和丸以消導之物極損胃氣謂其肥兒也適足以瘦兒謂其保和也適足以違和耳即如抱龍丸之類亦不可輕易屢用豫嘗見一富翁之子每多痰氣或時驚叫凡遇疾作輒用此丸一投而愈彼時以為神丹如此者不啻十餘次及其長也則一無所知凝然一癡物而已豈非暗損元神所致耶凡此克伐之劑最當慎用故必有真正火證疳熱乃宜肥兒丸及寒涼等劑真正食積脹滿乃宜保和丸及消導等劑真正痰火喘急乃宜抱龍丸及化痰等劑即用此者亦不過中病則止非可過也倘不知此而徒以肥兒保和等名乃欲借為保障不知小兒之元氣無多病已傷之而醫復伐之其有不痿敗者鮮矣神奇外治法疏表法小兒發熱不拘風寒食飲時行痘疹並宜用之以蔥一握搗爛取汁少加麻油在內和勻指蘸蔥油摩運兒之五心頭面項背諸處每處摩擦十數下運完以厚衣裹之蒙其頭略疏微汗但不可令其大汗此法最能疏通腠里宣行經絡使邪氣外出不致久羈榮衛而又不傷正氣誠良法也清裡法小兒發熱至二三日邪已入里或乳食停滯內成鬱熱其候五心煩躁睡臥不寧口渴多啼胸滿氣急面赤唇焦大小便祕此為內熱以雞蛋一枚去黃取清以碗盛之入麻油約與蛋清等再加雄黃細末一錢攪極勻復以婦女亂髮一團蘸染蛋清於小兒胸口拍之寒天以火烘暖不可冷用自胸口拍至臍輪止須拍半時之久仍以頭髮敷於胸口以布扎之一炷香久取下不用一切諸熱皆能退去蓋蛋清能滋陰退熱麻油雄黃拔毒涼肌故也此身有熱者用之倘身無熱惟啼哭焦煩神志不安者不必蛋清專以麻油雄黃亂髮拍之仍敷胸口即時安臥此法多救危險之證功難殫述解煩法凡小兒實熱之證及麻疹毒盛熱極其候面赤口渴五心煩熱啼哭焦擾身熱如火上氣喘急揚手擲足一時藥不能及用水粉一匙以雞蛋清調勻略稀塗兒胃口及兩手掌心復以釀酒小曲十數枚研爛熱酒和作二餅貼兩足心布扎之少頃其熱散於四肢心內清涼不復啼擾開閉法凡小兒風痰閉塞昏沉不醒藥不能入甚至用艾火灸之亦不知痛者蓋因痰塞其脾之大絡截其陰陽升降之隧道也原非死證用生菖蒲生艾葉生薑生蔥各一握共入石臼內搗如泥以麻油好醋同前四味炒熱布包之從頭頂背胸四肢乘熱往下尉之其痰一豁倏然而醒此方不特小兒凡閉證皆效引痰法凡小兒痰嗽上氣喘急有升無降喉中作牽鋸聲須引而下行用生白礬一兩研末少入麵粉米粉亦可蓋生礬見醋即化成水入麵粉取其膠黏故也好醋和作二小餅貼兩足心布包之一宿其痰自下暖痰法凡小兒胸有寒痰不時昏絶醒則吐出如緑豆粉濃厚而帶青色此寒極之痰前法皆不能化惟以生附子一枚生薑一兩同搗爛炒熱布包尉背心及胸前尉完將薑附捻成一餅貼於胃口良久其痰自開納氣法凡小兒虛脫大證上氣喘急真氣浮散不得歸元諸藥莫效用吳茱萸五分胡椒七粒五倍子一錢研極細末酒和作餅封肚臍以帶扎之其氣自順通脈法凡小兒忽爾手足厥冷此蓋表邪閉其經絡或風痰阻其榮衛又或大病之後陽不布散於四肢速用生薑煨熟搗汁半小杯略入麻油調勻以指蘸薑油摩兒手足往下磋挪揉捩以通其經絡俟其熱回以紙拭去之凡小兒指紋帶澀推之不動即以此法推豁之蓋此法不論陰陽虛實用之皆效定痛法凡小兒胸中飽悶臍腹疼痛一時不能得藥用食鹽一碗鍋內炒極熱布包之向胸腹從上尉下蓋鹽走血分最能軟堅所以止痛冷則又炒又尉痛定乃止凡男婦氣痛皆同此法以上九法非古書所有實豫異授心傳經驗既久神應無方筆之於書以公世用
