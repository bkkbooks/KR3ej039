body:
  text: 卷二臍風證論臍為百風總竅五臟寒門道家謂之下丹田為人身之命蒂兒在胎時口鼻未通呼吸惟臍間真息隨母之呼吸為呼吸及其下地囫盧一聲氣通口鼻而胎元之一息不復為用矣遂寄於臍內一寸三分中虛一穴左青右白上赤下黑中央黃色八脈九竅經緯聯絡為真息往來之路坎離交會之鄉凡修練仙胎皆從此處立基所以謂之命蒂故小兒初生惟臍之干係最重斷臍之時不可不慎或剪臍帶太短或結束不緊致外風侵入臍中或浴兒時牽動臍帶水入生瘡客風乘虛而入內傷於腎腎傳肝肝傳心心傳脾脾傳肺蘊蓄其毒發為臍風其證面赤啼叫者心病手足微搐者肝病唇青口撮痰涎壅塞者脾病牙關緊急者腎病啼哭不止者肺病五臟之證略見一二者猶可治悉見者不治然其症亦不止此也有曰臍風曰噤口曰鎖肚者雖皆臍症而寒熱自別試詳別之免滋後誤夫所謂臍風者由斷臍後為水濕風寒所乘入於臍而流於心脾令肚腹脹滿吮乳口松多啼不乳此初起之時速用火攻散之若至氣息喘急啼聲不出或肚上青筋吊疝作痛此胎毒夾風邪入臟外用火攻內服指迷七氣湯若肚臍青腫撮口不開牙關緊閉口吐白沫爪甲青黑者皆不治所謂噤口者其症眼閉口噤啼聲漸小舌上聚肉如粟米狀吮乳不得口吐白沫大小便不通遇此先看其上齶有點子即以指甲輕輕刮破以木香白蔻仁各五分煎湯化下沆瀣丹利動臟腑氣順自愈所謂鎖肚者由胎中熱毒壅盛結於肛門大便不通即令婦人溫水漱口吮兒之前後心並臍下及手足心共七處凡四五次外以輕粉五分研末蜂蜜少許溫水調服以通為度如更不通以蔥白三五寸長用油抹潤輕透穀道納入二寸許以通為快若至七日不通者死古人之論臍風皆謂由於水濕風冷所致豫則以為古論猶未盡也蓋臍風有內外二因有可治不可治之別外因者風濕所傷內因者稟父之真陽不足也豫曾見一婦産育十數胎皆男盡殤於七日內之臍風無一存者若謂外邪所傷何以獨傷此家之兒又豈無一兒能避之者此內因之顯而易見者也凡男子之命門真陽不足者右尺脈必細澀無神生子必有臍風此豫察之詳見之確非耳聞者此也其外因者病發於二三四五日之間病生於六腑故可治內因者必發於六七日之間病生於五臟故不可治曩者夏禹鑄有類防臍風之訣謂三朝一七看兩眼角黃必有臍風不知稟受厚者生下即滿面紅黃乃為吉色誤認臍風其害不小此法不確惟令乳母每日摸兒兩乳乳內有一小核是其候也乳內有核發臍風者固多而不發臍風者亦有徒執此法未必皆合又必看小兒或不時噴嚏更多啼哭吮乳口松是真候也急宜治之第臍風之治無一成法可遵雖有疏風攻下之法莫能濟急獨豫異授燈火無論臍風痙搐以及凶危險證用藥不能挽回者此火可以生之久經效驗未肯輕傳因見幼科不知火穴往往錯誤用之反致引動風邪蔽固火毒致兒身熱不退火毒內攻每多不救故不忍隱祕盡行吐露以公諸世世之幼科治病輒曰剪風曰截風夫剪者邀遏之謂也截者堵塞之謂也以火攻用於中宮任脈所行之地豈非堵遏其邪而犯閉門逐盜之戒乎不知風邪之在人身善行數變無形無聲欲除其害無如疏散條達而去之不使久羈於營衛經絡則善矣而仲景之治傷寒而立汗吐下三法邪之在表者汗而散之邪之在上者吐而越之邪之深入者下而奪之總欲其邪盡而後已未聞有邀截之為也今幼科不但為逐邪而反閉關絶險阻其去路使邪氣進不可退不能猖狂躑躅欲其不倒刃相攻斬關逆犯者不可得也此皆為治者釀成之禍於邪何尤凡邪之傷人未有不從三陽而入驅除之法亦必使其從三陽而出故此火穴亦惟三陽有之蓋以引其出表斷不使之入里也證治歌臍為命蒂臟寒門百風總竅此為宗口鼻未通在胎候呼吸隨母相送迎産則氣才通鼻口胎元一息寄臍中一寸三分中虛一穴五色須從五處分八脈九竅均聯絡坎離交會息最真兒在初生臍最重斷時宜慎莫輕心外風侵入緣何故煎臍太短結束松或為浴兒臍帶動水入生瘡病適成客氣乘虛內傷腎肝心脾肺轉相循蘊蓄其毒臍風發症分五臟可推尋面赤啼叫為心病四肢微搐乃肝疸脾病痰涎多壅塞更兼口撮與唇青病在腎者牙關緊肺病必多啼哭聲症見一二猶堪治諸病同生醫術窮更有三症分寒熱噤口鎖肚合臍風臍風病起斷臍後風寒水濕並相乘初起口松兼腹滿多啼不乳火宜攻啼聲不出氣喘急吊疝作痛見青筋火攻治外藥治內指迷七氣湯最工口噤眼閉啼聲小舌上聚肉粟米同口吐白沫難吮乳又兼大小便難通上齶有點輕刮破木香白蔻仁湯吞沆瀣丹靈鎖肚大便閉緣胎毒壅結肛門是病根急令婦人溫水漱口吮兒七處前後心手足心及臍下四五巡輕粉五分蜜少許溫水調便通病自寧倘更不通何法治油抹蔥白三四寸長法宜遵輕透穀道須納入二寸許通則快兮否則凶諸症制方傳自古古法雖詳究未精臍風原有內外二因辨莫執水濕風冷論外因本屬風濕入稟父陽虧是內因倘謂臍風皆屬外可將往事作明徵一婦屢産皆不育豈皆風濕所侵淫男子命門真陽弱右尺細澀必無神生子必有臍風症豫曾目見豈無憑外因可治病由腑內因難治由臟生倘謂臍風憑兩眼角黃預為防救命遭傾乳內小核亦難定須將真候細心評不時噴嚏多啼哭吮乳口松真候臨斯時論治無成法異授燈火醫要明時醫誤用多貽害剪風截風技殺人疏散風邪方為美譬治傷寒可引伸去邪法分汗吐下剪截由來我未聞今不逐邪偏閉塞邪將猖獗禍彌深不知邪自三陽入驅邪之法必相從火穴亦惟三陽有引邪出表定回春方沆瀣丹川芎酒炒莊黃酒蒸黃芩酒炒黃柏酒炒各九錢薄荷四錢半滑石水飛六錢枳殼麵炒四錢半連翹去心膈六錢芍藥炒六錢牽牛炒取頭末六錢檳榔童便洗曬七錢半上為細末蜜丸芡實大月內之兒服一丸稍大者二丸用茶湯化服乳母切忌油膩但覺微有泄瀉病即減矣如不泄再服重病日三服以愈為度此方斷不峻厲毋疑畏惟胎寒怯面青白者忌之指迷七氣湯陳皮青皮藿香桔梗莪朮香附法夏肉桂公丁香益智仁上薑棗水煎母子同服辰砂殭蠶散治撮口臍風鎖肚辰砂水飛五錢殭蠶炒一錢天竺黃五分蚌珍珠三分真麝香一分上為末每用少許蜜調抹兒口內龍膽湯治身熱臍風撮口龍膽草鉤藤鉤北柴胡片黃芩炒京赤芍炙甘草芽桔梗白茯苓各五分川大黃紙包煨一分上大棗一枚水煎溫服治撮口用牛黃一分研末竹瀝調滴入口中一方取蠍虎一個即壁虎也裝瓶內用硃砂細末亦入瓶內封其口月餘合食砂取出其身赤色陰乾為末每一二分酒調下一方用穿山甲用尾上甲三片羊油炙極黃色蠍梢七個共為細末入乳汁調塗乳上令兒吮之用厚衣裹包須臾汗出即愈保生湯治胎風鎖肚口噤北防風七分陳枳殼五分小橘紅四分白茯神三分荊芥穗三分遠志肉四分制南星五分芽桔梗三分炙甘草二分燈心引二豆散治臍腫突紅飯豆淡豆豉天南星鮮白蘞各一錢上為末用芭蕉自然汁少加香油調藥敷臍四旁得小便自下即愈龍骨散治臍瘡石龍骨煅一錢真輕粉五分川黃連一錢白礬煅一錢上為末乾摻一方用大紅羊絨燒灰為末敷之效臍證簡便方小兒初生犯撮口臍風荷包風鵝口風等項在齒根邊生白點名馬牙啼哭不吮乳即看口內堅硬之處或牙根邊白點將針挑破出血濃煎薄荷湯磨京墨調勻以指攪過再以産母亂髮蘸墨滿口搽之仍用新青布蘸溫水展口即愈小兒臍風撮口用完全生蔥二根搗爛取汁又以直殭蠶三個炒去絲研細末以蔥汁調勻塗母乳頭上令兒吮之或灌兒口內亦可小兒臍風撮口以艾葉燒灰填臍上以帛縛之若臍帶已落用蒜切薄片貼臍上以艾火炙之候口中有艾氣方愈小兒臍風初生口噤不乳蟬蛻十四枚全蠍去尾毒洗去鹽泥十四枚炒乾為細末入輕粉三分每用一匙乳汁調灌即愈小兒撮口但看舌上有瘡如粟米者是也以蜈蚣炙焦研末敷之撮口噤風面黃色氣喘聲不出由胎氣挾熱流毒心脾故令舌強唇青聚口發噤用直殭蠶二枚去嘴略炒為末蜜調納兒口中小兒十日內口噤不乳取大蜘蛛一枚去足炙焦研細末入豬乳一小杯和勻分作三次徐徐灌之神效無比小兒臍瘡出血及膿用海螵蛸胭脂共為末以油潤瘡乃搽藥用火口訣夫嬰兒全身燈火誠幼科第一捷法實有起死回生之功火共六十四燋陰符易數能疏風散表行氣利痰解鬱開胸醒昏定搐一切凶危之候火到病除用火之時倘值寒冬必於房中燃燒明火使兒不致受寒燈草大小適中以麻油染用令老練婦人抱兒解衣去帽從左耳角孫起總依後之歌訣用之凡用火不可姑息勿謂火數太多憫其難受蓋小兒受病由其經絡凝滯臟氣不舒以火散之正欲使其大叫大哭方得臟氣流通渾身得汗營衛宣暢立時見功此火暗合周天不可減少少則不效若救臍風非此不可火穴圖歌並列於後集成神火圖集成神火歌仙傳神火天然理始自角孫瘛脈起凡用燈火無論男嬰女嬰皆從左邊用起角孫在耳尖上瘛脈在耳後根聽宮曲鬢本神旁次及天容仍右取聽宮在耳門前曲鬢在鬢腳旁本神在額角天容在耳輪根下左邊已完右亦如之囟會承漿左肩並曲池合谷期邪屏囟會即囟門承漿在下唇宛宛中肩井在肩上宛宛中從左起故曰左肩井曲池在肘灣上廉屈縫處合谷在虎口近叉骨處氣關已過至神門右亦如之昏可醒氣關在食指第二節神門在掌後下廉鋭骨之端左完右亦如之左乳根中七燋始右亦如之何待齒自左乳根下起從上至下七燋止右乳根亦如之臍下陰交續命關平平三點凶危止陰交在肚臍下半寸用火三燋脊中身柱至長強肺俞音恕陽陵承山當身柱在項骨三節下從上至下九燋至長強穴止肺俞在兩飯匙骨縫中陽陵泉在膝外邊下三寸承山在腳肚盡處崑崙解溪邱墟穴湧泉右亦效之良崑崙在外踝骨後解溪在繫鞋帶處邱墟在外踝骨前湧泉在腳底中心左腳燋完右亦如之宜用火者平素産子有臍風則胎胎不爽於産下第二日勿待其發先以此火散之百不失一胎嬰生下多喑不乳噴嚏呵缺吮乳口松是即臍風作發急以此火散之凡兒病面青面黑扭項搖頭仰身擦面或眼青怒視或左右斜視或上下竄視或兩目連眨或頭項牽強蜷舌露睛噓風撮口啼哭怯人或手如數物或兩手牽引或兩足跳掣忽擾忽亂失張失志但覺神情與常有異者由從前表裡不清將欲作痙此火最妙傷寒已痙角弓反張眼目斜視左右搐搦並中惡客忤癇症與食填太陰及一切風閉火閉痰閉氣閉乍然卒死者此火最神食傷脾胃肚大青筋於端午日午時用全身燈火復於青筋開叉處以火截之一叉一點其肚自消風寒痰氣閉塞之症此火實有神功凡用燈火既完俟兒啼哭已定即用金粟丹半丸薑湯化服服後以衣裹之蒙其面目令之安臥片時以復其神志其病如失忌用火者小兒四時傷風感冒身熱自汗大小便調唇舌如常口不作渴此表病輕證也疏解之則愈愚人妄用是謂輕病重治反為不祥小兒邪已入里身熱面赤口渴大小便祕唇焦舌紫眼紅或手足心熱夜熱焦煩舌上黃苔揚手擲足掀衣揭覆此里症內熱也清利之自愈不可用火如強用之不特不能使熱邪從里以達表適足以助熱而耗陰致身熱不退在夏秋燥令尤為大忌小兒大病久病身體怯弱面耳青黃唇舌白瑩搖頭斜視昏睡露眼形骸消瘦聲息輕微自汗盜汗或一切嘔吐瀉利痘麻瘡癰此皆虛極之症切忌火攻慮其汗散故也一切久熱消渴疳證形體黑瘦毛髮焦枯由陰虧血弱虛熱所為誤用燈火愈增其病慎之燈火為幼科切要今醫家不特不明火穴而並不辨寒熱虛實不當用而用之反為大害惟依前以定法則用無不當矣夏禹鑄臍風火圖夏禹鑄曰臍風初發吮乳必口松兩眼角挨眉心處忽有黃色宜急治之治之最易黃色到鼻治之仍易到人中承漿治之稍難口不撮微有吹噓猶可治也至唇口收束鎖緊舌頭強直不必治矣一見眉心鼻準有黃色即用燈火於囟門一燋人中承漿兩手大拇指端少商各一燋臍輪繞臍六燋臍帶未落於帶口一燋既落於落處一燋共一十三燋風便止而黃即退矣按古今燈火惟上全身火有經有府有理有法無有出其右者第火穴多恐倉卒之際在嫺熟者不難倘素未經練者一時不能用故附夏氏臍風火於此庶忙道之時可以濟急此火亦曾經驗第不及全身燈火耳回生艾火以前全身燈火皆為實邪升散之用並一切怪證莫可名狀者無不奏功倘涉久病體虛忽然精神潰亂人事昏沉前火則為不宜須用回生艾火挽之蓋此火能回散失之元陽收歸氣海固其根蒂免致離散其法以生薑切為紙厚大如指甲貼尾閭穴脊骨盡處命門穴在腰脊間正對肚臍以艾絨挼緊如緑豆大安薑片上用火炙之每穴以三炷為度炙完另以薑片貼臍下陰交穴如前炙之此火不特小兒可用凡男婦一切中風中痰氣厥陰症虛寒竭脫凶危之候咸宜用之有起死回生之功幸勿輕視凡小兒中惡客忤以及痰閉火閉風閉乍然卒死即以全身燈火醒之倘一時未有其人即以大指掐其人中穴病輕者一掐即啼哭而醒倘不應掐合谷又不應掐中衝若再不應其病至重則以艾丸如蘿蔔子大於中衝穴炙之火到即活蓋中衝一穴為厥陰心包絡之脈所出其經與少陰心臟相通此火一燃則心中惕然而覺倘此火全然不知則百中不能救一矣回生艾火圖胎病論兒之初生有病亦惟胎弱胎毒二者而已矣胎弱者稟受於氣之不足也子於父母一體而分而稟受不可不察如稟肺氣為皮毛肺氣不足則皮薄怯寒毛髮不生稟心氣為血脈心氣不足則血不華色面無光彩受脾氣為肉脾氣不足則肌不生手足如削受肝氣為筋肝氣不足則筋不束骨機關不利受腎氣為骨腎氣不足則骨節軟弱久不能行此皆胎稟之病隨其臟氣而求之所謂父強母弱生女必羸父弱母強生兒必弱故小兒有頭破顱解神慢氣怯項軟頭傾手足痿軟齒生不齊發生不黑行住坐立須人扶掖者此皆胎稟不足之故也胎毒者即命門相火之毒也命門者男子以藏精女子以系胞道家謂之下丹田也夫二五之精妙合而凝純粹之精熔液而成胎淫佚之火蓄之則為胎毒矣蓋人生而靜天之性也感物而動人之欲也成胎之後其母之關係尤緊凡思慮火起於心恚怒火生於肝悲哀火鬱於肺甘肥火積於脾淫縱火發於腎五欲之火隱於母胞遂結為胎毒凡胎毒之發如蟲疥流丹濕瘡癰癤結核重舌木舌鵝口口瘡與夫胎熱胎寒胎搐胎黃之類三朝之臍風百日之痰嗽半歲之真搐一周之流丹此又毒之至酷至烈而不可解者也所謂胎寒者母娠時患熱病多服寒涼之藥又或過食生冷令兒受之生後昏昏多睡間或哯乳瀉白此內因也或百日之內忽冷手足蜷曲不伸腹痛啼叫不止此生後受寒得之治宜溫散括迷七氣湯助胃膏為佳胎熱者母娠時喜食辛熱炙煿之物或患熱病失於清解使兒受之生後目閉面赤眼胞浮腫弩身呢呢作聲或啼叫驚煩遍身壯熱小便黃澀此胎熱也若不早治則丹瘤瘡癤由此而至宜集成沆瀣丹徐服解之以平為度胎搐者母娠時曾因驚恐氣傳於子生後頻頻作搐其後身熱面青手足搐掣牙關緊閉腰直身僵睛斜目閉多啼不乳此乃胎癇不治之症如因身有熱而作者必先啼叫雖曰胎病由外因也宜天麻丸後以六味地黃湯滋其化源多服自愈盤腸氣者幼科稱內吊者是也皆因胎氣鬱積壅結營衛五臟六腑無一舒暢其氣不能升降築隘腸胃之間抵心而痛其聲轆轆如貓吐惡乾啼口開手足皆冷宜疏散通氣調中散及木香丸臍突者小兒多啼所致也臍之下為氣海啼哭不止則觸動氣海氣動於中則臍突於外其狀突出光浮如吹起者捏之則微有聲用亂髮燒灰枯礬等分為細末敷突臍上以膏藥貼之自消不乳者小兒生下二三日間忽然不乳當詢問之勿以不乳作臍風治蓋臍風有多啼撮口之症此則無之但不乳耳有吐乳乳之又吐者或因拭口不淨惡穢入腹也宜用檳榔木香甘草煎湯與服如啼哭不乳者腹痛也亦胎寒之症宜木香丁香乳香當歸甘草煎湯與服如此以上諸症無故不乳宜問其母之乳汁多少乳多者傷乳也宜少節之不久自思乳矣乳少者必有他症細心察之胎黃者兒生下面目渾身皆黃如金色或目閉身上壯熱大便不通小便如梔子汁皮膚生瘡不思乳食啼哭不止此胎中受濕熱也宜茵陳地黃湯母子同服以黃退為度胎肥者兒生下遍身肌厚肉色通紅面色亦紅而黑睛多時時生痰自滿月之後漸漸肌瘦五心熱而大便難白睛粉紅色此名胎肥是亦在胎時母食甘肥濕熱太過流入胞中以致形質虛肥血分壅熱也加減大連翹飲外以浴體法浴之胎怯者生下而無精光肌肉瘦薄大便白而身無血色目無精彩時時哽氣多噦者此即胎怯也非育於父母之暮年即生於産多之孕婦成胎之際元精既已澆薄受胎之後氣血復難長養以致生來怯弱若後天調理得宜者十可保全一二調元散補之證治歌小兒胎病實難堪胎弱胎毒兩大綱稟受不足名胎弱五臟攸分可類觀稟肺不足皮膚薄毛髮不生更怯寒心為血脈稟如弱血不華兮面不光受脾不足肌如削筋不束骨弱在肝腎主骨兮稟不足骨節軟弱行步艱生女羸兮母偏弱生兒弱者母獨強病生頭破神氣怯頭傾肢軟狀如癱生齒不齊發不黑居坐行立賴扶匡諸症皆由胎稟弱再將胎毒細推詳父母命門中相火母則胞系父精藏氣凝二五精純粹豈容淫火蓄相干蓄則胎中多結毒母成胎後最宜防思慮心頭多火起怒生肝火勢難降肺為悲哀多火鬱脾中火積饜肥甘火發於腎因淫縱五欲臟胞毒結團毒發蟲疥流丹病癰癤生來與濕瘡鵝口口瘡重舌木舌胎寒胎搐胎熱並胎黃臍風痰嗽偕真搐周歲流丹病足傷胎寒因母貪生冷藥過寒涼而受戕兒生瀉白還多睡內因莫作外邪看若未百日忽戰栗口冷肢蜷哭異常生後受寒尋治法括迷七氣湯助胃膏將胎熱因母餐辛熱或因熱病失清涼兒生目閉胞浮腫面赤弩身壯熱揚聲作呢呢溺黃澀驚煩啼叫勢倉皇早治庶無瘡癤患丹投沆瀣使平安胎搐兒生頻作搐只因母孕受驚惶身熱面青肢搐掣牙緊腰直並身僵目閉睛斜啼不乳病名胎癇入膏肓若屬外因身有熱先多啼叫病症啇天麻丸進後滋補怡宜六味地黃湯盤腸氣原稱內吊胎氣鬱結營衛傷臟腑並無舒暢候氣多築隘在胃腸痛底心兮聲轆轆乾啼吐惡口開張肢冷統宜疏散藥散用調中丸木香臍突起自多啼哭觸動氣海臍故昂突狀光浮如吹起捏之聲作亦微茫發灰礬末敷臍上外將膏藥貼之良不乳兒生才數日勿作臍風病等量臍風多啼並撮口此但不乳莫渾涵更有吐乳乳旋吐拭口不淨穢濁含煎湯與服宜何藥木香甘草與檳榔啼哭不乳原腹痛此亦胎寒治宜諳煎湯甘草丁香乳香木香當歸可共嘗無故不乳尋其母乳多宜節自安康乳少必然他症現醫宜細察以求方胎黃遍體如金色目閉尤兼身熱腸大便不通溺如梔子汁哭不思乳瘡肆殃此係胎中受濕熱茵陳地黃湯擅長胎肥肌厚晴多黑肉面俱紅時有痰彌月而後漸羸瘦五心熱兮大便難白睛不異粉紅色甘肥因母孕時貪濕熱太過流胞內形質虛肥血熱探治宜加減大連翹飲外遵浴體法最臧胎怯生下肌肉薄大便白兮目無芒時時哽氣還多噦此由先天受其傷若欲後天調理善調元散進壽而昌方助胃膏白蔻肉蔻麵包煨去油人參木香丁香藿香茯苓白朮青桂西砂炙草陳皮沉香山藥上為末蜜丸芡實大每一丸炒米煎湯化服天麻丸天麻薑製法夏防風羌活膽星殭蠶全蠍上為末蜜丸芡實大每服一丸鉤藤湯下六味地黃丸熟地九蒸曬四兩茯苓乳蒸曬二兩山藥乳蒸曬三兩棗皮炒研二兩丹皮酒炒一兩澤瀉鹽水炒焦一兩上為末和地黃膏蜜丸一錢一顆半周一歲用一丸三五歲丸空心鹽湯化下煎服亦可調中散青木香川楝沒藥茯苓肉桂青皮檳榔枳殼炙草萊蔔子上加蔥白食鹽少許煎服茵陳地黃湯生地赤芍川芎當歸花粉茯苓豬苓茵陳澤瀉上水煎母子同服大連翹飲連翹瞿麥滑石牛子車前木通防風梔仁黃芩芥穗當歸柴胡赤芍蟬蛻炙草上加竹葉十片燈心水煎熱服浴體法天麻二錢全蠍去毒硃砂各五分烏蛇酒浸枯礬青黛各錢麝香一分上研勻每用三錢水三碗桃枝一握同煎十沸溫熱浴之但勿浴背調元散人參白朮茯苓橘紅當歸枸杞炙草陳粳米炒一握上為末龍眼煎湯調下木香丸黃連三錢木香厚朴制夜明砂隔紙炒各二錢訶子肉炒一錢上為細末飯為丸麻子大干艾生薑煎湯食前下指迷七氣湯沆瀣丹均見臍風外感論外感者外感冒於風寒之六淫也或謂乳子純陽陽盛外邪難入而不知質弱體薄皮毛鬆散骨節嫩脆臟腑未滿血氣未充其冒風寒暑濕之邪也較老弱與病衰之人為更易且幼稚不知自保寒熱不能自言全賴父母之顧護偶失調衛邪乘而入病斯作矣及其病作雖風寒小恙需治較急於強壯苟姑待之虛弱夭傷立至何也嫩脆未充之體傳經既易戕伐難勝譬之以拳擊壯雖甚可以強忍乳子能不斃乎是故幼稚病患為父母者不得輕忽以留日後之悔承實治者尤當審慎免蹈殺人之愆辨症固宜詳明下藥更當誠謹辨症雖的藥猶忌猛蓋以幼子質薄非同強壯可比也考古上工治法昭明其要舉不外審症慎藥二者而已彼夫外感治法當春之際症見鼻塞發熱紋浮紅鮮而脈浮者此邪在表治宜正柴胡飲若兼咳嗽宜參蘇飲氣粗者香蘇飲兼嘔者解肝煎或兼腹痛者正柴胡飲更兼寒熱者加桂枝若兼諸症其脈不浮不沉此半表半裡之症宜柴苓湯其秉體素虛弱外邪難解者宜十味人參散今日幼兒如是十有八九此方乃當時治幼發散之妙品也因類以推又豈此外感為然也哉抑豈定執此方為規也哉合病施方因體加參活潑權宜何在不可是又運用之妙者能之若夫夏月感冒則又非尋常可比也縱是風寒之感總不免暑熱之侵陰寒伏熱之候用藥最要調停雖盡露前症不可以前藥概施意惟用六和湯加入蘇葉頗為合宜然猶必辨果系中熱否也果系中熱必用竹葉石膏湯小便色黃而兼腹痛者宜五苓散若因誤用風藥致神昏心躁者須速用卻暑丹更有體冷氣短神倦無力此陰暑之症治當急進四君子湯理中湯甚至桂附亦所必進甚勿謂暑月不可燥攻且勿謂純陽小子不可熱治也幸明者治暑熱平必用調元參脈散以扶其脈庶免病後瘦削致元氣虛耗而成羸弱也夫春夏治矣不尤有秋熱生風秋金生濕風濕相搏而為病者乎其為症也初與春候無異將以春治之法而治之乎然不可不因時以驅邪也倘遇秋時外感治宜以海藏神朮散加白朮為主或加味五苓散或柴苓湯均可隨宜擇用更有異三冬之月以小兒柔脆之體不能耐寒忽爾渾身壯熱神昏疲倦治宜速以桂枝防風湯遲治無及倘以驚風調治亦危也已若或藏身母懷伏頭躲面是畏風寒為表症也治宜解肌亦以桂枝防風湯為主又或出頭露面揚手躑足煩渴便閉是寒邪入內為里症也治宜攻裡以大柴胡湯為主若或頭額手足冷汗不止氣冷色淡是寒鬱也亦為里症宜以理中湯為主如若表裡皆熱大渴而汗治宜柴胡白虎湯以上等病若因症施藥均絶無效則宜辨陰陽以分治審系邪入陰分補陰益氣煎邪入陽分隨氣而陷補中益氣湯審系血弱四柴胡飲氣虧八味養中散氣血兩虛邪閉莫達則用五柴胡飲更有夾食而兼風寒者治宜加味消痞飲若大便酸臭且兼腹脹連綿不解者用大柴胡湯以下之若體素怯弱者則宜以惺惺散分別等症制治惟宜醫者省之赤子其保全矣證治歌小兒外感冒風寒勿云乳子是純陽陽盛外邪難以入何由邪賊致悲傷豈知體質原薄弱受邪尤易邁尋常病作風寒雖小恙治須較急於剛強苟從姑待吝醫藥虛羸立至豈無妨嫩脆未充傳經易肋何容拳賊戕父母輕忽留後悔醫師療治症宜詳辨證雖的藥忌猛考古治法甚昭彰當春鼻塞兼發熱紋脈均浮作表觀醫人療治用何藥正柴胡飲可煎嘗若兼咳嗽參蘇飲氣粗香蘇飲嘔解肝煎腹痛二柴胡飲寒加桂枝半表半裡柴苓湯外邪難解因虛弱十味人參散莫忘此方治幼雖妙品因類而推莫執方夏天感冒多兼暑六和加入紫蘇臧辨症果然是中熱竹葉石膏莫畏涼五苓散藥治何病腹痛必兼小便黃昏躁原因風藥誤速投卻暑丹免驚惶體冷氣短陰暑症四君子湯兼及理中湯干甚至桂附所必進勿謂暑月幼難當暑熱既平速扶脈調元參脈散免羸殤秋熱生風金生濕風濕相搏致病殃初症與春雖無異因時驅逐有程章神朮散加白朮主柴苓湯加味五苓散堪冬月小兒體柔脆受寒壯熱神香茫桂枝防風湯宜速進驚風調治必危亡伏頭躲面風寒畏表症解肌亦桂枝防風湯煩渴便閉寒入里出頭露面手足揚大柴胡湯為主宰里攻病解自平康冷汗不止氣色淡寒鬱理中湯必速將表裡皆熱大渴汗柴胡湯白虎妙無量邪入陰分補陰益氣煎陽分氣陷補中益氣湯良血弱四柴胡飲甚美氣虧八味養中散安氣血兩虧五柴胡飲夾食消痞飲加減啇腹痛連綿大柴胡飲下此因大便氣臭酸體素怯弱惺惺散辨症制治有主張醫人省識其中法保全赤子後裔昌方正柴胡飲柴胡防風陳皮白芍乾薑甘草上㕮咀煎服各味隨兒大小加減且柴胡生用半歲用一二錢周歲用二三錢輕不發表參蘇飲紫蘇前胡陳皮半夏姜水炒乾葛茯苓枳殼桔梗人參甘草上加薑棗煎服香蘇飲香附炒紫蘇陳皮去白甘草上加薑蔥煎服解肝煎厚朴姜水炒法夏陳皮白芍茯苓紫蘇砂仁十味人參散人參白朮茯苓陳皮法夏乾薑柴胡白芍黃芩炙草柴苓湯人參柴胡黃芩法夏白朮茯苓豬苓澤瀉肉桂炙草上加薑棗煎熱服六和湯砂仁藿香厚朴杏仁法夏扁豆木瓜人參白朮茯苓甘草上加薑棗煎服竹葉石膏湯淡竹葉石膏人參炙草麥冬法夏上加粳米一撮姜三片煎服五苓散豬苓茯苓白朮澤瀉肉桂上㕮咀為末每服三錢煎服卻暑丹白朮黃芩茯苓澤瀉豬苓辰砂肉桂黃連炙草上為末蜜丸如芡實大量兒大小加減服之麥冬湯下煎服亦可四君子湯人參白朮茯苓炙草上加薑棗煎服理中湯人參白朮乾薑炙草上水煎服調元參脈散蜜耆麥冬五味人參炙草上加薑棗煎服海藏神朮散蒼朮制防風甘草上加薑蔥煎服如太陽症發熱惡寒脈沉緊者加羌活浮緊帶洪者是兼陽明加黃芩浮緊帶弦是兼少陽加柴胡加味五苓散肉桂藿香白朮豬苓茯苓澤瀉木瓜砂仁上加薑棗燈心煎服桂枝防風湯白芍防風桂枝甘草上加薑棗水煎熱服大柴胡湯柴胡大黃赤芍法夏枳實上加薑棗煎服柴胡白虎湯石膏煅知母甘草柴胡粳米人參上水煎溫服補陰益氣煎柴胡山藥陳皮升麻人參熟地炙草上㕮咀水煎服補中益氣湯人參當歸陳皮升麻柴胡黃耆白朮炙草上加薑棗煎服四柴胡飲人參當歸柴胡炙草上加姜煎服八味養中湯人參白朮茯苓黃耆柴胡紫蘇肉桂乾薑五柴胡飲白朮陳皮當歸芍藥柴胡熟地黃耆甘草惺惺散桔梗細辛人參白朮甘草瓜蔞根茯苓薄荷加味消痞飲人參白朮茯苓麥芽柴胡厚朴法夏甘草上加姜煎服積重加神麯肉食加山楂二柴胡飲細辛不可重用法夏柴胡陳皮厚朴乾薑炙草發熱論陰勝則寒陽勝則熱重寒則熱重熱則寒經言之詳矣第統之曰熱而各有表裡虛實氣血晝夜之別內熱潮熱內傷外感之分且各有臟腑之所由發言治者必別之明而下藥乃能無誤治法既均起沉原易試歷參明詳分症治稽夫風寒而發熱者其症喜人懷抱多畏縮惡風寒不欲露頭出面且面帶慘色便清不渴吮乳而口不熱或鼻塞流涕或噴嚏而渾身拘急此為表熱初起一汗可解可用桂枝湯加柴胡粉葛熱服取汗即效若元氣怯弱者四君子湯加防風柴胡粉葛若發熱時喜出頭面愛仰臥揚手足去衣被渴欲飲水吮乳不休且口熱小便赤此為裡熱宜解利之用導赤散送瀉青丸發熱面赤腮燥鼻乾喜就冷或合面臥或仰面臥露出手足揭去衣被大渴不休大小便閉此為實熱宜微下之可用集成沆瀣丹若或大病之後或溫熱或潮熱或渴或不渴大小便如常此為虛熱當補之宜用竹葉調元湯不但此也且有傷風發熱者其症自汗身熱呵缺目赤多睡惡風喘急此因解換褓裳受風所致治宜柴葛解肌桂枝湯但熱退後宜略滋陰抑有傷寒發熱者其症無汗身熱呵缺頓悶項急面赤喘急惡寒氣中熱氣此因脫換受寒所致治宜惺惺散熱退微服沆瀣丹以治內熱更有非傷風寒發熱而兼吐瀉者此脾胃虛怯不可發散治宜五苓散送理中丸然而傷於風寒固熱而傷於暑與熱者豈無發熱者乎當考傷熱發熱者多在夏月其症身熱自汗作渴昏睡手足俱熱此因天氣過熱包裹過厚而受其熱也治宜人參白虎湯以解其熱次以調元參脈散以扶其元傷暑發熱者亦在夏月有之其症身熱自汗作渴昏睡惟手足獨冷此由高垂廣廈陰涼太過中氣受傷所致治宜先以調元參脈散以補其氣矣以四君子湯以防吐瀉又有夜熱旦止者是為血虛發熱治宜六味地黃湯加龜板歸芍他若傷寒無汗服表藥而汗出其熱不退又下之熱仍不退此其熱也為表裡俱虛氣不歸元陽浮於外乃虛熱之候治宜急用四君子湯加炮姜庶乃陽氣收胃氣和而熱自退苟進寒涼治無及矣有所謂疳熱者其症色形黃瘦食不長肌骨蒸盜汗泄瀉無恆肚大腳小多起於大病之後失於將息又或傷飢食飽脾氣受傷治宜六君子湯加歸芍有所謂壯熱者其症一向熱而不已此由氣血壅塞五臟生熱鬱蒸於內睡臥不安精神恍惚蒸發於外則表裡俱熱急喘氣盛甚則搐搦治宜以導赤散送瀉青丸若大小便閉者以集成沆瀣丹下之有所謂煩熱者其症煩擾不安五心煩躁四肢溫壯小便赤澀此心經有熱治宜導赤散加麥冬梔仁有所謂積熱者其症面赤口瘡大小便黃赤此為表裡俱實或因內傷酒面煎炒炙煿或誤投峻補之藥或外因厚綿爐火溫暖過度皆能為此治宜沆瀣丹若夫汗下太過津液枯竭或大病之後元氣受傷皆能生熱此其熱也為虛熱其症困倦少力面色青白虛汗自出神漫氣竭四肢軟弱手足厥冷是為氣虛發厥血虛發熱大虛之症治宜四君子加炮姜甚則加附子熱退以平劑調之然而大虛之熱不尤有所謂客熱者乎其症乍有乍無熱邪陷於心則熱形於額其熱先起於頭面而後身熱恍惚多恐聞聲則惕此為正氣虛而熱邪勝邪正交爭故發熱無定乍進乍退如客之往來莫測也治宜導赤散先撤其邪後以團參散以護其正曰發熱之症雖繁矣而從此究治抑豈有遺誤哉雖然上所論治皆言發熱等症若熱如潮水之對時而作所謂潮熱熱由內臟之達外而發所謂內熱者詎可等於一治乎特治雖有別總不外乎虛實之辨我嘗考之心經之熱發在已午之候其症心煩咽乾熱發當蒸蒸焉有如火之熾然自畏而人不覺者為實治宜導赤散人知而自不覺者為虛治宜祕旨安神丸肝經之熱發在寅卯辰刻其症脈息多弦時急驚恐指紋滯者為實治宜柴胡清肝散指紋淡者為虛治宜六味丸腎經之熱發在亥子丑時其症唇必黑青脈息多緊辨紋系實用清腎散虛用六味地黃湯若肺家之熱輕試則有重試則無發逢日西之候則甚其症必喘咳審系實用瀉白散虛用祕旨保肺湯脾土之熱逢夜則甚其症日則怠惰疲倦不思飲食審系實用瀉黃散虛用補中益氣湯虛中有熱人參黃耆散若夫甚熱發於午前此非心熱乃氣虛之候人參清肌湯發於午後則非脾肺之熱乃血熱之症白朮除濕湯若渴而便閉併為實熱四順清涼飲發熱口渴而便如常此屬血虛之症治宜四物湯若大小便血此陰虛夾熱之病治宜保陰煎而或血熱妄行皮膚下熱外按卻無此宜清化飲或三焦火盛用徙薪飲小便熱痛用大分清飲他若實熱之症下後陰虛孤陽無附大熱煩渴治宜四物湯加參耆有汗後陽虛陰失所主亦大熱煩渴治宜四物湯若汗下之後煩渴面赤此血虛也治宜當歸補血湯兼見驚搐者此血虛生風也治宜四物湯加天麻鉤藤總之汗後血虛者六神散汗後氣陷者補中益氣湯陰虛者六味丸或理陰煎陽虛者保陰湯或八味丸溫之補之熱仍不退脈息滑大者須進五福飲加地骨皮知母雖然治幼之法在離乳之兒專從幼治若乳下之嬰必兼調母藥無論湯散務子母均服庶乃藥易入而力易至不然數月嬰兒一服難完一匙其藥之入也甚少而為力也至微其取效也不亦難乎此治幼之要法也並宜志之證治歌病生髮熱症紛紛寒熱陰陽詳內經表裡虛實尤宜別氣血晝夜又當分潮熱內熱須明辨內傷外感莫朦朧更有臟腑所由發須當觸類以明論倘因風寒而發熱喜入懷抱多畏驚頭面欲隱風寒惡色慘不渴便必清吮乳口冷鼻流涕噴嚏拘急在渾身此為表熱汗可解桂枝湯柴胡粉葛增元氣怯弱四君子湯柴胡粉葛與防風若逢發熱愛仰臥喜出頭面手足伸吮乳不休渴欲飲口熱大便閉小便紅此為裡熱宜解利散用導赤送瀉青丸發熱面赤喜就冷鼻乾腮燥渴不停臥或合面或仰面露出手足揭衣衾二便不通均濕熱微下丹投集成沆瀣工病後或渴或不渴或為潮熱或為溫二便如當為虛熱竹葉調元湯奏功傷風惡風自汗喘目赤多睡呵缺伸柴葛解肌桂枝湯進熱若退後即滋陰傷寒無汗惟身熱喘急惡寒呵缺形面赤喘急氣中熱脫換受寒是病因治法宜用惺惺散熱退沆瀣丹可庸風寒並傷兼吐瀉五苓散可送理中湯夏月發熱因傷熱肢熱汗渴睡昏昏人參白虎湯除熱調元參脈散回春傷暑發熱亦惟夏手足獨冷諸症同高垂廣廈陰涼過中氣受傷病故生調經參脈散先補氣吐瀉宜防繼四君子湯夜熱旦止血虛發六味地黃湯加龜板歸芍憑他若傷寒無汗症任醫汗下熱猶存此為表裡俱虛症氣不歸元陽外行炮姜加入四君子陽收胃和熱始寧疳熱色形黃且瘦盜汗泄瀉兼骨蒸肚大腳小因何故傷飢食飽脾受侵或因病後虧調理六君子湯加歸芍任和勻壯熱不已由五臟氣血壅塞鬱氣凝睡臥不安神恍惚表裡俱熱喘急頻盛則搐搦宜導赤散送下瀉青丸最神二便不通宜沆瀣此方通閉效無倫煩熱五心多煩躁小便赤澀四肢烘心經有熱導赤散加入梔仁與麥冬積熱二便皆黃赤更兼面赤口瘡生表裡俱實因過暖或傷酒面病厥躬或食煎炒與炙煿或投峻補以貽凶治法仍宜投沆瀣管教熱退起沉疸汗下太過津液竭或因病後元氣傾此為虛熱面青白困倦少力虛汗出神漫氣竭四肢弱手足厥逆勢幾窮血虛發厥氣虛熱四君子湯加入炮姜辛甚則更宜加附子熱退調養以和平乍有乍無名客熱熱形於額邪陷心先起頭面後身熱恍惚多恐怯有聞撤邪先用導赤散後須護正以團參散發熱已詳明且切潮熱內熱宜精核已午時發熱為心心煩咽乾如火炙虛不覺熱用安神丸實自畏熱宜導赤散寅卯辰熱屬肝經脈息多弦時恐怯指紋滯為實柴胡清肝散紋淡為虛六味丸協亥子醜熱屬腎經脈息多緊唇青黑虛宜六味地黃湯實宜清腎散多潤澤肺熱輕試有重試無日西則甚症喘咳祕旨保肺湯療虛實者散宜投瀉白逢夜則甚熱在脾困倦不思飲食啜濕用瀉黃湯虛補中益氣湯人參黃耆湯治虛中熱午前甚熱非由心氣虛人參清肌湯擇午後非由肺與脾血熱白朮湯除濕渴而便閉實熱徵四順清涼飲解厄發熱口渴便如常血虛四物湯可則陰虛夾熱保陰煎何憂大小便多血皮膚下熱血妄行外按卻無清化煎捷三焦火盛用徙薪小便熱痛分清飲徹實熱下後熱渴煩孤陽無附陰虛竭治宜四物加參耆有汗陽虛症同轍陰無所主用何方四物芎歸湯精切汗下面赤煩渴生血虛當歸補血湯切驚搐生風因血虛四物湯天麻鉤藤列汗後血虛散六神汗氣陷者補中益氣湯得陰虛六味丸理陰煎陽虛保陰煎八味丸變若反溫補熱依然更兼滑大堪憑脈五福飲加地骨皮知母同煎是良策總之治幼法宜詳用藥並母均調攝良方保赤可詳披莫嗤大海將蠡測方導赤散生地木通甘草上加竹葉七片煎好以硃砂一分調服治啼哭再加黃芩燈心祕旨安神丸人參棗仁法夏甘草炙茯神當歸白芍陳皮五味上為細末蜜丸生薑湯下柴胡清肝散山梔炒柴胡人參川芎桔梗連翹甘草瀉黃散石膏煅防風甘草炙藿香梔仁煅上水煎半飢服瀉白散桔梗陳皮桑皮地骨皮五味甘草炙上煎熱服加山梔杏仁名加味瀉白散祕旨保肺湯蘇葉防風山藥茯苓杏仁藿香百部黃芩白僵蟲炒百合桔梗五味人參黃耆散黃耆桔梗秦艽茯苓柴胡桑皮知母紫菀鱉甲人參清肌散白朮茯苓法夏當歸柴胡赤芍乾葛甘草上加薑棗煎服若午前潮熱服此更效四順清涼飲赤芍當歸大黃甘草四物湯當歸熟地芍藥川芎五福飲人參熟地當歸白朮甘草炙上加生薑煎食遠服清化飲芍藥麥冬丹皮茯苓黃芩生地石斛上煎食遠溫服清腎散即清化飲內加車前滑石甘草梢瞿麥即名清腎散理陰煎熟地當歸甘草乾薑上水煎熱服保陰煎生地熟地芍藥黃芩黃柏山藥續斷甘草徙薪飲陳皮黃芩麥冬芍藥黃柏茯苓丹皮上煎食遠溫服大分清飲豬苓茯苓枳殼車前木通山梔澤瀉當歸補血湯黃耆炙當歸上加炒米薑棗煎服六神散人參白朮茯苓甘草炙山藥扁豆八味丸熟地山藥棗皮丹皮茯苓澤瀉肉桂附子上煉蜜為丸煎服亦可保陰湯熟地枸杞當歸山藥茯苓附子炮肉桂甘草炙除濕湯法夏蒼朮厚朴茯苓陳皮藿香甘草白朮上加薑棗煎食遠服桂枝湯桂枝一錢半白芍二錢生薑一錢半大棗三枚炙草一錢上水煎熱服取微汗不可大汗瀉青丸羌活川芎黑梔仁膽草當歸防風各一兩大黃五錢上為末蜜丸青黛為衣如大豆大每服一二丸茶清下竹葉調元湯人參黃耆黃芩白朮白芍麥冬炙草竹葉上等分水煎服柴葛解肌桂枝湯柴胡乾葛桂枝白芍炙草上加生薑大棗煎服人參白虎湯人參一錢熟石膏二錢知母一錢炙草一錢晚粳末五錢上水煎熱服口渴甚加麥冬五味六君子湯人參白朮茯苓陳皮法夏炙草上加薑棗水煎服團參散人參當歸上為末用豶豬心一個切作三片每以末藥一錢用豬心一片煎湯調服四君子湯惺惺散五苓散理中丸調元參脈散補中益氣湯均見外感沆瀣丹見臍風六味地黃湯見胎病升陽除濕湯升麻豬苓神麯澤瀉各一錢防風一錢二分陳皮五錢炙草五錢柴胡一錢蒼朮一錢五分上加薑棗水煎熱服若胃寒腸鳴加益智半夏各一錢嘔吐噦論嘔吐噦分三症甚不可執一以視也稽夫有聲有物為嘔有物無聲為吐有聲無物為噦區已別矣而究其致病之由根於脾胃之虛寒經言歷歷人皆知之而嘔由於胃虛吐由於脾虛噦因於久嘔病後異途分出往往昧之遇嘔之病治脾必兼涉胃遇吐之病治胃必兼涉脾治噦必扶元氣者大皆如是然此猶未失所主也乃有遇嘔者固統之曰脾胃遇吐者亦統之曰脾胃遇噦者則統之曰嘔吐先後莫分主客失令若此者又不知幾何人也不俱此也嘔吐之作多系寒症間有熱症亦由寒為之釁而醫治者往往不遵陳法本屬寒症必故意從熱治之以標新奇以爭特識噫果系辨症之無差猶可恕也吾見其貽誤者十有八九其亦可惱而足傷也已識者曰是亦未諳先賢論著耳豫因不揣考閲群書輯編要法稽夫嘔吐作而煩渴相因且熱而脈洪大貪食炙煿心思百味者此虛寒之侯也宜五苓散治之而或備症發於夏月是為寒候治者莫不因時察症而以熱治矣而不知寒從春佚暑燥寒生縱是熱候不過因熱觸發治宜仍以寒攻意以五苓散加藿香庶幾寒熱兩解或治之不效以藿連湯主之斷無不安若僅見吐則以理中湯調六一散主之然而胃家火盛嘔吐亦作竹茹湯此宜速進痰食火併嘔吐由生二陳湯勿作緩圖至石膏黃連杏仁麥芽等味則又在因病而酌加若夫脾胃原虛因火熾而嘔吐行此則又非可專從寒治也治宜橘皮竹茹湯若或氣緩神倦額頭汗出脈息沉微此為陰寒之候輕用五君子煎或參香散重則必用四味回陽飲或復陽丹庶乃陽長陰生垂危可振若或血虛燥嘔用五君子煎加當歸若陰寒太過元陽將脫陰格其陽陽藥不納急用理中湯加豬膽汁更入童便少許服之自安更有食滯不化壅而作嘔者宜以養中煎切忌攻伐相殘若或食滯成積吐酸噯餿外症面色微黃眼胞浮腫脈弦實滑治宜消積丸或參香散其有面白唇紅者此為蛔蟲上逆宜以椒梅理中湯或溫臟丸而或外症未形莫辨為寒為蟲之候則惟以扶陽湯而或寒或蟲諸無不效更有嘔吐而渴欲水者須先以扶陽湯繼進來復丹嘔渴即止有吐而兼嗽或因嗽而吐者此痰凝之症宜二陳湯有因乳多而嘔者節理而安雖然嘔吐之作於乳子也子之病多由母使之然為尋厥由有母過厚味而致子嘔者用加味清胃飲有因醇酒而致子嘔者用解酲湯若因燒酒而致則用冷米醋有因怒動肝火抑鬱傷脾土傷血熱遂致吮乳作逆者是宜加味歸脾湯或加味逍遙散若因停食滯血乳化醋餿遂致吮之嘔逆此則子與異功散母服大安丸兩相交治自爾平安若因勞役有傷脾胃則均服補中益氣湯若或乳母久病兒發乾嘔此因其母血衰乳斷干飢成逆脾胃虛絶之候抑或因母久藥中母藥毒傷臟成嘔此皆不治之症王氏制米泔飲治干飢嘔解毒飲治中毒嘔亦保嬰兒之一法也不可不知證治歌脾胃虛寒三症生嘔吐噦分辨須精吐由脾虛嘔由胃噦因久嘔要分明症固有寒兼有熱熱亦由寒治法徵嘔吐作時煩且渴有熱其脈大而洪心思百味貪炙煿虛寒散合用五苓即在夏月疑為熱豈知寒伏在於春仍用五苓藿香入不效湯用藿連湯工吐而無嘔理中湯妙散將六一共調陳胃火盛兮嘔吐作竹茹湯投火不蒸痰食火併生嘔吐二陳湯進莫逡巡因病酌加石膏入黃連麥芽杏子仁脾胃原虛火復熾因生嘔吐病厥躬徒從寒治亦多誤橘皮竹茹湯合情氣緩神疲頭額汗脈息沉微寒屬陰重用復陽丹四味回陽飲輕用參香飲合五君子煎血虛燥嘔五君子煎加入當歸效不群陰寒太過陽將脫陰格其陽症最凶理中湯加豬膽汁調藥還須便用童食滯不化而生嘔養中煎進戒克攻食滯成積吐且噯面色微黃眼腫形脈弦實滑宜何藥消積丸參香散積自融面白唇紅蟲上逆椒梅理中湯溫臟同為寒為蟲症未現扶陽湯進豈朦朧嘔吐兼渴扶陽湯好來復丹宜步後塵吐或因嗽或兼嗽此是痰凝進二陳湯乳多而嘔宜節理病源由母更須詢母貪厚味宜清胃母貪醇酒宜解醒若因燒酒而成病冷米醋進自清新子吮乳逆皆因母肝脾血熱是病因歸脾湯與逍遙散均宜加味令肝平乳化餿酸緣食滯母服大安丸子異功散若因勞役傷脾胃補中益氣湯服宜均乳母久病兒乾嘔或因藥毒或乳窮干飢傷臟均成嘔此皆不治藥無庸王氏曾制米泔飲解毒飲投亦保嬰古人成法皆詳列好將保赤效專心方藿連湯黃連薑汁炒厚朴薑汁炒藿香葉上加薑棗煎服五苓加藿香散豬苓茯苓澤瀉白朮肉桂藿香六一散滑石研甘草二陳湯陳皮法夏茯苓甘草炙上加薑棗煎熱服加枳殼桔梗名枳桔二陳湯異功散人參白朮雲苓陳皮甘草炙上加薑棗煎服消積丸砂仁酒炒公丁香烏梅巴豆去油上研細末糊丸緑豆大每服三丸白湯送下養中煎人參山藥扁豆甘草炙茯苓乾薑上加蓮肉煎食遠溫服五君子煎人參白朮茯苓乾薑甘草炙四味回陽飲人參附子炮姜甘草炙復陽丹附子炮姜胡椒五味甘草白麵炒上為末和勻入溫湯搗丸每服一錢隨症用藥引下溫臟丸人參白朮當歸芍藥茯苓川椒桂肉檳榔乾薑吳萸使君子上為細末神麯糊丸梧子大白湯送下加味歸脾湯人參黃耆白朮茯苓棗仁遠志當歸木香甘草炙丹皮梔仁上加枝元煎食遠服來復丹硝石硫黃青皮陳皮大陰元精石五靈脂上先將硝石硫黃為末入磁碟內用微火炒以柳枝攪結砂子火不可大恐傷藥力再研極細余藥均為細末共和勻醋糊丸空心米飲下大安丸神麯陳皮法夏茯苓楂肉連翹蘿蔔子炒白朮上為細末粥糊丸米飲下清胃散生地升麻當歸丹皮黃連上加柴胡梔仁即名加味清胃飲扶陽湯附子炮姜川椒茯苓白朮武夷參香散人參沉香藿香木香公丁香上為細末木瓜湯調下椒梅理中湯人參白朮乾薑甘草炙川椒烏梅橘皮竹茹湯橘皮竹茹生薑甘草人參大棗加味逍遙散當歸白朮白芍柴胡茯苓甘草炙山梔丹皮上加煨薑薄荷煎服竹茹湯法夏姜水炒乾葛甘草上加薑棗並竹茹一握同煎溫服米泔飲大棗一枚砂仁一粒老薑三片上藥抖碎裹煨用米泔三升煎滾入微淡薑汁一升泡服解毒飲甘草銀花豬膽汁薑汁上用米泔煎服一方治熱嘔用枇杷葉去毛炙以五加皮煎湯熱服立止一方神怯氣弱是寒吐用生薑一大塊直切片勿斷層層摻鹽用麻緊扎草紙七層包之水浸慢火煨熟去麻將姜搗早米煎湯下一方用胡椒緑豆量兒大小多少煎湯服自效一方小兒初生三五日吐乳用丁香三粒陳皮三分生薑三片煎服自止一方小兒吐逆不拘冷熱諸藥不效用硫黃五錢水銀一錢同研至不見星薑汁打米糊丸小豆大陰陽湯下補中益氣湯理中湯見外感五苓散見外感咳嗽論附哮喘百晬嗽有聲無痰為咳有痰無聲為嗽有聲有痰為咳嗽咳嗽之分昔已詳矣究所由來總不外乎乳食之促風寒之賊也第有虛實陰陽宜別表裡臟腑宜分稽厥病源實熱者則面赤鼻乾而喘虛寒者則喘滿面白而涕晨嗽者屬火午前嗽者則發自胃午後嗽者則為陰虛黃昏嗽者火浮於肺也五更嗽者胸有積滯也久嗽不已者則必傳腑大約均與成人之嗽無異有所未及參觀互用一應通行然則此可以不必再述所治矣然治有不同用藥不可過峻試再詳陳之考厥治法因於寒者鼻塞身重氣壅喘促聲濁無汗治宜參蘇飲身重無痰者茯苓補心湯嗽而多痰者六安煎氣粗無痰者阿膠補肺散或金水六君煎四物湯皆可擇用但必均加桔梗杏仁面白有痰者為肺家之本病宜清肺飲咳甚者葶藶丸面赤聲啞者乃肺兼心病宜清寧散咳兼喉痛者沆瀣丹面黃吐痰者此肺兼脾病宜橘皮湯面青壅搐者此肺兼腎病宜金粟丹面黑痰咸者專系腎家之病宜八仙長壽丹聲緊兼衄者乃肺家虛熱宜人參冬花膏久咳不止者肺必被傷補肺而咳自止宜人參五味湯咳而胸高有如龜狀者乃肺虛作燥宜清燥救肺湯若胸痛吐膿則成癰矣宜桔梗湯或杏仁煎咳嗽治法大約如此更有哮喘一病乳幼恆多尋其病源亦不外乎風寒之閉大法蘇沉九寶丹但宜生脈大安丸後進千緡湯然或有所因不可不分治焉因宿食停滯痰涎橫結而致者症形內熱曰燥治宜葶藶丸久病五味湯因體虛敗忽作大喘者治宜貞元飲不應則理陰煎內加人參鹿茸若因胸膈移熱心火亢熾痰壅大喘者此名馬脾風其症原名難治速宜以牛黃奪命丹投之其有乳子百日內發痰嗽者名百晬嗽其病多因出胎之際或浴時及解脫褓裳與出懷餵乳之候暴受風寒由外傷而致又或因乳汁過多吞咽不及嗆促而成或啼哭未寧乳嗆氣逆由於內傷而然遇此者汗下之劑不再驟用治法惟令乳母禁口戒葷酒油膩酸鹹辛辣及一切發物但食香茶白飯少佐橘餅並橙片以清其乳而兒嗽自愈然亦不可執一以言治也發散清涼之劑耆朮參歸之屬異功散補肺散之類因症下方亦未嘗不可是在醫者運用之妙云證治歌有痰為嗽無為咳總由乳促風寒賊虛實陰陽更宜分表裡臟腑亦宜核喘滿面白屬虛寒面赤鼻乾為溫熱火浮於肺嗽黃昏晨嗽有火各分域午前為胃後陰虛胸有積滯五更決久嗽不已腑必傳此與成人無甚別用藥可同戒峻攻其有不同可伸說鼻塞身重飲參蘇身重無痰茯苓補心湯切嗽而無痰六安煎氣粗無痰四物湯協阿膠補肺散六君煎三方均入杏仁桔梗面白多痰清肺飲良咳甚葶藶丸解厄肺兼心病面必紅聲啞清寧散可則咳兼喉痛用何方沆瀣丹進自清冽面黃吐痰病兼脾橘皮湯進是良策肺兼肝病面必青壅搐金粟丹非拙病如在腎痰必咸八仙長壽丹醫面黑聲緊兼衄肺熱成人參冬花膏奏捷久咳不止肺必傷人參五味湯補肺克咳而胸高狀如龜清燥救肺湯無失胸痛吐膿桔梗湯桔梗杏仁煎同列更有哮喘乳幼多病源總屬風寒客大法蘇沉九寶丹大安煎千緡湯先後接內熱口渴必有因宿食停滯痰橫結治法宜投葶藶丸久病五味湯調攝大喘忽作原本虛貞元飲投無差忒不應則進理陰煎人參鹿茸加莫缺大喘病必馬脾風痰壅移熱在胸膈此症由來不易瘳牛黃奪命丹救危迫百日咳症熱兼風參觀上法原同轍異功散補肺散療氣虛醫師莫誚緒餘竊方茯苓補心湯人參紫蘇乾葛前胡法夏茯苓陳皮甘草枳殼桔梗木香熟地白芍川芎當歸上加薑棗煎服六安煎陳皮法夏茯苓甘草杏仁白芥子上加姜煎服補肺阿膠散阿膠蛤粉炒杏仁去皮尖甘草炙馬蔸鈴牛蒡子炒糯米金水六君煎當歸熟地陳皮法夏茯苓甘草炙上加生薑煎食遠溫服清肺飲前胡柴胡桑皮枳殼知母貝母薄荷茯苓桔梗麥冬荊芥炙草阿膠上煎熱服忌食油膩葶藶丸甜葶藶黑牽牛炒杏仁去皮尖炒黃色另研防己炒上為細末入杏仁泥和蒸棗肉為丸緑豆大每服五七丸薑湯下清寧散桑皮蜜炒葶藶微炒赤苓酒炒車前甘草炙上為細末每服五錢生薑大棗湯調服人參五味湯人參白朮茯苓五味麥冬甘草上加薑棗煎溫服清燥救肺湯桑皮石膏人參胡麻仁炒阿膠麥冬去心枇杷葉刷去毛蜜炙用杏仁去皮尖炙草上痰多加川芎貝母瓜蔞仁血虛加生地熱甚加犀角羚羊角桔梗湯桔梗當歸貝母瓜蔞皮防己杏仁枳殼苡仁生耆桑葉元參上用蘆茅嫩根三錢為引水煎熱服蘇沉九寶丹麻黃陳皮薄荷桂蘇葉桑皮大腹皮杏仁甘草炙上加姜煎以童便少許對服人參冬花膏人參天冬麥冬冬花貝母桑皮金井橘皮枯芩當歸五味甘草炙上為細末煉蜜為丸燈心湯下集成金粟丹膽星天麻白附全蠍制乳香去油赭石煅醋淬殭蠶炒去絲麝香金箔梅花片上為細末煉蜜為丸金箔為衣每服一丸薑湯化下但虛寒之痰無根之氣絶脫之症均不可用杏仁煎大黃酒蒸天冬去心杏仁去皮尖木通桑皮葶藶石膏上煎臨臥服橘皮湯法夏制茯苓陳皮細辛人參桔梗枳殼甘草炙旋覆花上加薑棗煎服八仙長壽丹熟地山藥茯苓丹皮澤瀉棗皮五味麥冬千緡湯法夏薑製皂角炙生薑甘草炙牛黃奪命散黑牽牛半生半炒莊黃酒潤枳殼炒上研末加蜜一匙白湯調下貞元飲熟地當歸甘草炙上煎熱服補肺散人參黃耆五味紫菀熟地桑皮上水煎入蜜少許食遠溫服一方治咳嗽紫菀炒研杏仁去皮尖炒共為細末蜜丸五味七粒煎湯送下一方治肺實用葶藶隔紙焙為末棗肉為丸白湯下一方以葶藶隔紙焙知母炒共為末白糖糊丸白湯下一方治嗽無痰用沙參濃煎熱服一方治百晬嗽用貝母薑湯潤濕飯上蒸過甘草半生半熟共為末沙糖為丸米飲下一方治喘用雪梨汁生薑汁蜂蜜薄荷研末共入器內煮滾溫服一方治喘並嗽用種系瓜燒存性研末棗肉為丸薑湯下一方治吃醋嗆喉成哮用甘草三兩去皮劈開豬膽汁浸三日炙乾研末蜜丸臨臥茶送下參蘇飲見外感四物湯理陰煎均見發熱大安丸異功散均見嘔吐沆瀣丹見臍風解囟論附囟填囟陷天柱骨倒囟者人之頂門也解囟者頭縫開解如塊然而合而不相黏也此症由先天虧弱稟受不足而成蓋人在胎中諸竅尚閉惟此竅獨開通氣過脈均繫於此此乃人身關鍵要處全賴父母精血化成稟受不足故有解之之患焉此症總歸之一虛治法內須久服六味地黃丸外用封囟法封之若目多白見久藥不愈其症難治不但此也更有囟門高腫名囟填者焉此由乳食不調氣血不和或衣服過厚陽氣被遏而致治法皆用封囟法主之然其填亦有寒熱之因因熱而填者瀉青丸因寒而填者參蘇飲且有囟門下陷如坑名囟陷者焉此其病多由病後氣血衰枯而致若枕骨與之同陷此則血氣衰竭腎元俱敗原名不治斯時下藥必峻用參苓白朮散或八味地黃湯皆妙劑也須酌而用之尤有天柱骨倒頭垂不起者焉此形雖肥壯實為陽氣弱極外強中乾之候也然亦有風熱邪入與肝部相勝而致者治法宜小柴胡湯加歸芍乾葛主之有因瀉泄日久元氣虛極陽陷陰格致頸項軟痿不振者治宜速救本元須急進十全大補湯加鹿茸主之且宜以生筋等藥敷塗從外培之然有自生下而即軟者此由腎元不足治宜以補腎地黃丸主之總之此症因別三端而要不外培補為主醫者試細思之證治歌小兒解囟果何為總屬失天稟受虧治法外用封囟法內將六味地黃丸培囟門高腫囟填別乳食不調氣血違或由厚暖陽氣遏治法皆從封囟推填因寒者參蘇飲填因熱者瀉青丸規囟陷如坑名囟陷多因病後氣血衰枕骨有時同囟陷虛衰已極最堪危峻用參苓白朮散八味地黃湯以挽頽天柱骨倒陽氣弱外強中剛頭下垂肝部或為邪熱勝小柴胡湯加乾葛芍藥當歸泄瀉日久頸項痿陽陷陰格元氣催救宜十全大補進加入鹿茸庶可追生筋等藥敷從外生下即軟更堪悲六味地黃丸主治總宜培補自春回方小柴胡湯法夏人參黃芩柴胡甘草封囟法天南星上用薑汁拌南星炒乾研極細以醋調攤於絹帛上烘熱貼於囟門生筋散篦麻子去殼木鱉子上共為末先宜抱頭兩手摩頂以口內熱津調敷補腎地黃丸熟地山藥棗皮丹皮澤瀉茯苓五味牛膝鹿茸補骨脂上研末蜜丸淡鹽湯送下十全大補湯人參白朮茯苓甘草當歸川芎熟地白芍黃耆肉桂加薑棗煎服參苓白朮散人參白朮茯苓山藥桔梗苡仁蓮肉甘草炙上研末薑棗湯調下瀉青丸羌活川芎梔仁炮膽草當歸防風莊黃上為末蜜丸青黛為衣茶清化下一方用生附去皮南星去皮以生薑搗爛貼項軟之處立效六味丸見胎病八味丸見發熱參蘇飲見外感目病論附耳鼻目為肝竅而五臟之精神俱系焉是以五臟客邪皆能上為目病則欲治目病不得專求之目且不得專求之肝矣考厥辨治目赤者心熱也治宜導赤散加黃連防風目黃者脾熱也治宜瀉黃散胞腫者風熱也亦宜瀉黃散主之若或目之上下左右有如風吹而莫能開則為肝風兩角俱緊珠不能運青而直視則為肝熱二者均宜瀉青丸治之黑白分明視物不見肺熱也治宜桑白皮散目閉覺見火光閃灼如電而開視則如見黑影者腎熱也宜生地黃湯目干無淚閉若飛蚊集舞者腎虛也宜六味地黃丸治之生下數月忽不見物者肝虛也謂之雀眼治宜六味丸以豬肝煮熟取汁壓下之又有初生目閉不開者此乃胎中受熱宜內服生地黃湯外用膽草湯洗之抑有久嗽之後忽眶黑而珠如血者此謂之血眼治宜內服瀉白散外用生地黑豆抖膏貼之若或羞光喜暗是感風熱之常病以清陽散火湯主之更有初生目內出血閉而不開眼眶浮腫或不腫此因胎中受熱內服導赤散合黃連解毒湯外用真金散點之自爾光明無患至若腎之開竅則為耳其為治也專求之於腎乎而不然也有因內損而生病即有因外損而為病者安得專治其腎乎彼其耳成膿流汁因腎熱而成者固多因沐浴散水入耳而成者亦正不少制治無論內生外入內服以蔓京子散主之外更以龍骨散搽之其流汁自止抑有耳環前後生瘡者是為腎疳俗名蝕瘡內服消毒散外宜以黃柏散搽之或用地骨皮末和香油搽之又有耳外生毛忽長寸許粗硬如發者是為腎風用松香散搽之服藥宜六味地黃湯加白芷生黑豆姜皮之屬更有耳中大痛狀如蟲走或出血或不出血者宜以蟲蛻散吹之且有耳旁忽然赤腫者內服消毒散外用消毒散貼其腫自消有耳內腫壅無聞久之潰敗流濃出水不幹者未潰之時照前旁腫治法治之既潰以石榴花吹之若或無腫無痛忽聾閉無聞是因風邪入腦氣閉而然治宜導赤散加防風或通竅丸主之若非因風邪系先天稟弱腎元虛虧此當以培補為本宜服六味丸或十全大補湯若因中氣不足宜服補中益氣湯此則治耳病之大略也夫耳之前不有鼻乎鼻亦恆多病也顧鼻為肺竅治雖不必專於肺要亦不可離其本是故鼻竅閉塞不聞香臭者以川芎膏開之鼻流青涕者以細辛散收之尤可異者鼻齆一症膿涕結聚香臭不聞是宜萬金膏主之以上三症均有所蔽而成疏利惟通氣散概宜用之更有名鼻淵者常流腥臭穢莫可近是宜以辛夷散治之又有初生鼻塞出入息阻吮乳莫能者此症多因其母抱臥胸前鼻氣吹入囟門或因沐浴不避風寒致風寒之邪乘入為殃治宜以通關散主之至若鼻衄乃血妄行之候內宜服加減地黃湯外用吹鼻散吹之不但此也且有鼻疳一症鼻頭破爛此乃肺家熱毒所致以杏仁丸吹治自愈又有疳瘡蝕鼻者此以五倍子燒灰存性研末和豬油塗之自效他若鼻流黃水謂之鼻癰非控腦丹莫治若或鼻被破傷久而不愈須以貓頭毛以口津調而敷之不然亦足為患也總之治耳目鼻病治小兒之法與治成人大同小異治有所遺不妨參用然有不可拘執者醫者省之證治歌目為肝竅本先天五臟精神俱系焉病則邪從五臟入專求肝木已多偏目赤心熱導赤散防風加入並黃連目黃脾熱瀉黃散胞腫風熱治同前肝風兩目難開關肝熱直視難轉旋丸號瀉青均堪選自然清白目光圓黑白分明視不見桑白皮散肺熱宣目閉見光開見黑生地黃湯腎熱捐目干閉目如蚊集腎虛六味地黃丸填雀眼兒生才數月忽不見物病堪憐肝熱宜投丸六味壓以豬膽汁古方傳初生目閉為胎熱生地黃湯膽草內外煎久嗽眶黑珠如血內服瀉白散最便外將黑豆兼生地抖膏貼目自安全羞光喜暗為風熱清陽散火湯最妍初生眶腫或不腫目閉更出血漣漣黃連解毒導赤散金針散點痛不延耳為腎竅治法辨若專求腎則多愆或因內損或外損治法尤宜內外權內服蔓荊子散好搽用龍骨散和研腎疳瘡生耳前後消毒散服毒不淹外搽香油和地骨或用黃柏散亦痊耳外生毛長寸許搽用松香法古賢地黃湯加生黑豆棗皮白芷可同煎耳中大痛如蟲走蟲蛻散吹痛可拈耳旁赤腫消毒散外將敗毒散貼耳邊腫壅無聞久而潰未潰治法可相沿既潰石榴花吹入更或腦受風邪牽無腫無痛亦聾閉導赤散加防風通竅丸若非風熱先天弱腎元虛損補為先十全大補湯丸六味中氣不足補中益氣湯恬鼻為肺竅治宜悉閉塞不開膏用川芎若流清涕細辛散鼻齆尤異可申言香臭無聞膿涕結萬金膏好解倒懸三症均宜通氣散疏通其蔽是真詮常流腥臭穢難近辛夷散可醫鼻淵初生鼻塞氣息阻吮乳莫能是母愆囟受風寒或沐浴通關散服自安眠鼻衄外用吹鼻散內服地黃湯病不纏鼻疳症屬肺家熱杏仁丸吹是針砭疳瘡蝕鼻燒五倍豬油和塗蟲自殲鼻癰控腦丹最善何憂黃水似流泉鼻被破傷而不愈敷取貓毛調口涎治法倘遺參互考成人治法有陳編方控腦丹紫貝子俗名南蛇牙齒粵人呼狗㿉螺取二三枚火煅醋淬為末紙包放地上去火毒上每服一錢以絲瓜藤煎湯調空心服杏仁丸杏仁去皮尖搗碎以紙包壓去油成粉為度二錢輕粉一錢上共研和勻吹患處松香散黃丹一錢松香八分輕粉一錢上為細末香油調搽桑白皮散桑白皮郁李仁赤茯苓木香防己大腹子蘇子木通檳榔青皮上每服三錢姜三片水煎服黃連解毒湯炒黃連炒黃柏炒梔仁炒黃芩上等分水煎服生地黃湯生地赤芍川芎當歸甘草炙天花粉酒炒上加燈心十莖長流水煎熱服膽草湯龍膽草上治小兒胎毒初生目閉煎湯洗之一日七次清陽散火湯荊芥穗條芩防風連翹梔仁炮黑當歸尾羌活甘草炙石膏煅川芎上加燈心十莖水煎食後服蔓荊子散蔓荊子粉葛赤芍前胡木通生地桑白皮麥冬茯苓升麻甘草炙上加燈心十莖煎服龍骨散治小兒聤耳流膿出汁石龍骨煅白礬煅真鉛丹胭脂當門子上為細末以綿展干耳內膿水用竹管吹藥入耳內黃柏散黃柏枯礬滑石石龍骨煅海螵蛸上研細末瘡濕干搽瘡干豬油調搽蟲蛻散蟲蛻上燒灰存性研末用鵝管吹入耳通竅丸雄磁石煅真麝香上為細末以棗研爛和丸如棗核大綿裹塞耳中又以生鐵一小塊熱酒泡過含口內須臾氣即通消毒散羌活防風黃芩連翹人參川芎當歸柴胡甘草桔梗上加生薑燈心煎服敷毒散緑豆粉上以醋調成膏敷腫處干則易之川芎膏川芎細辛藁本白芷甘草炙梅花片杏仁去皮尖當門子上為末蜜丸龍眼核大每服一丸燈心湯化下細辛散人參前胡細辛防風川芎甘草炙上為末每服一錢薑蔥湯調服萬金膏羌活川芎細辛木通麻黃石菖蒲上為末每服一錢以蜜和勻薑湯化服通氣散羌活獨活蒼朮防風升麻荊芥穗乾葛白芷川芎木通麻黃細辛甘草炙上加薑棗煎食後服辛夷散辛夷白芷薄荷黃連蒼耳子上為末每服一錢蔥湯調下通關散治小兒鼻塞不能吮乳香附川芎殭蠶細辛豬牙皂荊芥穗上為細末以蔥白搗成膏和勻攤軟帛上臨臥烘熱貼囟門上加減地黃湯生地黃芩梔仁炮赤芍白茅根上水煎空心服吹鼻散梔仁炮亂油發燒存性上為細末吹入鼻中真金散當歸赤芍杏仁去皮尖川連黃柏上銼細以乳汁浸一宿飯上蒸過取濃汁點眼內目生胬肉及雲翳取雄麻雀屎用水飛過曬乾研細以乳汁調點取雀屎法豎者為雄倒者為雌赤眼腫痛用朴硝一撮放豆腐上飯上蒸之俟硝化去腐不用取汁點之風熱火眼用生南星五錢紅飯豆五錢共為末取生薑自然汁調作二餅貼兩太陽穴火眼痛急用大紅棗肉五六枚蔥三四莖共搗如泥作二小餅閉目貼之爛弦風眼用鮮色銅緑三錢研細以生蜂蜜濃調塗粗碗內將碗覆轉下用陳艾葉燒煙燻之焦黑為度刮取令冷以乳汁調勻飯上蒸過搽眼皮上爛弦處此方最神百不失一眼毛倒睫不起用五倍子為末蜜調敷眼皮上又方以無名異為末紙卷作燃點火吹滅閉目熏之赤眼腫痛不消以豬眼睛肉切一片如指甲大洗淨其血貼於眼皮上良久易一片即消一方用生地大黑豆共浸一宿取出搗為膏貼眼皮上其血自散血淚既出腫自消耳內腫痛流膿出水用虎耳草搗取汁灌入耳中此治耳聾之妙藥略加枯礬更佳耳內膿水不幹用千層石榴花焙乾為末吹入耳內耳後生瘡為腎疳以地骨皮研末香油調搽並煎水洗諸蟲入耳取貓尿滴入耳中其蟲自出若用麻油滴之則蟲死難出取貓尿法以生薑搽貓鼻尿即出或用稻草燒灰淋汁亦可鼻流濁涕名鼻淵用蛇床子炒辛夷仁白芷薄荷等分為細末臨臥蔥湯下鼻被破傷急以貓頭上毛剪碎以口中津唾調敷之自愈疳瘡蝕鼻破爛不堪用五倍子燒灰存性研末以臘豬油調和塗之導赤散瀉黃散瀉白散均見發熱瀉青丸見解囟六味丸地黃湯即六味地黃湯見胎病十全大補湯見解囟補中益氣湯見外感口瘡論附齒咽喉脾土之氣上通於口脾有所傷口病作焉是故治口之病不能不求其故於脾矣而亦未可概論也有因外傷者有因內生者豈得拘泥從治哉彼夫滿口赤爛乃口瘡也其故在脾乎實由奉養過溫或多著焙燥衣裳積熱薰蒸有以致之耳治法宜內服沆瀣丹外用地風擂水搽之滿口白屑如刺者乃鵝口瘡也治宜以保命散吹之內仍服沆瀣丹若生瘡潰爛而痛是謂之口糜此因膀胱積熱移於小腸治宜導赤散合五苓散若蒸熱如火反畏寒水投涼藥不效此因肝脾不足虛火上升治宜理中湯有上齶腫懸痙者治宜以針刺之使去惡血而後服沆瀣丹吹以碧雪散其效如神又有脾虛中氣不足致口頻撮者是宜補脾須進異功散若面青多哭而口撮者此陰寒之故治宜用理中湯以溫之若兩頤流涎是脾胃之寒治宜溫脾丹有急欲吮乳而口難吮者是必舌硬乃脾熱之故治宜瀉黃散主之此治口之大略也至如齒也生有定期而有過期不生者是體虛而髓弱也治宜六味地黃丸若牙床疼痛用涼膈散必加知母石膏升麻若牙齦腫者須知用針刺去其惡血繼用鹽湯洗之自愈或以黃柏研末敷之亦宜若潰爛腥臭內服沆瀣丹外用荊瀝薑汁和漱之或牙疳初則臭不可聞次則染牙黑色甚則齦爛血流是熱火也治宜內服沆瀣丹外以如聖散敷之又有夢中咬牙者此係風熱相搏治宜宣風散亦有因病戰栗而咬者此宜培本補元自爾無患抑有齒落不生因牙齦頑厚之故者此宜先行針刺次用鼠骨散治之若夫俠口而進則為咽喉咽喉者乃水穀之道人身之要區者病則更宜速治是故有積熱而喉閉者宜甘桔湯重則化毒湯若系諸骨所梗用鵝毛掃之即化骨小能下食者用海上方治之顧咽喉為病大小不甚相異其病繁矣茲但姑指一二蓋前男雜病內已詳列之遇有病症可參觀一例同治故不贅云證治歌小兒脾傷口病作國手醫脾占先著然亦未可概論焉外傷內生宜揣度滿口赤爛有何因積熱薰蒸衣焙烙治法內服沆瀣丹地風擂水搽即脫白屑如刺滿口生鵝口瘡病症亦惡治宜保命散吹之內服沆瀣功最碩生瘡爛痛名口糜膀胱移熱小腸絡導赤散投食五苓散熱清口愈古方博蒸熱如火反畏寒虛火上升理中湯豁針刺出血何症宜此是懸癰腫上齶沆瀣丹服碧雪散吹其效如神人自樂又有脾虛致困疲中氣不足口頻撮補脾用散進異功脾扶氣復起羸弱面青多哭口撮頻陰寒理中湯吉可卜兩頤流涎脾胃寒溫脾丹進天工奪舌硬有乳口難吮脾熱瀉黃是大略齒生有定已過期六味丸進無阻遏牙床疼痛涼膈散宜知母石膏升麻加配合齦腫針刺去血淋繼用鹽湯勤洗濯外將黃柏研末敷熱退毒消齦自若潰爛腥臭沆瀣丹荊瀝薑汁口含咯又有牙疳一症生齦爛血流熱火灼沆瀣丹內服如聖散敷夢中咬牙風熱搏宣風散進莫遲遲因病戰栗本元薄鼠骨散治頑厚牙服之無患齒久落積熱喉閉何藥療甘桔湯化毒湯自優渥諸骨所鯁海上方症治分明宜玩索方保命散治小兒鵝口瘡箭頭砂枯白礬明牙硝上為細末吹之溫脾丹南木香半夏炮姜白朮陳皮青皮上為末蜜丸龍眼核大每服一丸米飲下如聖散人中白煅煙盡銅緑麝香上為末先以蠟樹葉浸米泔水洗淨後搽此藥涼膈散連翹梔仁煅大黃薄荷黃芩芒硝甘草淡竹葉上加燈心十莖煎入蜜少許兌服宣風散檳榔陳皮甘草黑牽牛炒取頭末上為末每服一二錢蜜湯調空心服鼠骨散雄鼠骨炙枯麝香上研細末先針刺去其血後以此藥搽其刺處良久以薑湯漱之甘桔湯桔梗粉甘草上以淨水煎咽之化毒湯桔梗薄荷硼砂荊芥穗甘草炙芒硝山豆根馬牙硝明雄黃鏡面砂上為細末每服一錢白湯調下仍以此藥末吹入喉中海上方金鳳花根上搗碎以米醋濃煎用有嘴瓶盛之口銜瓶嘴仰面吸藥吞之其骨即下吞藥勿令沾牙又方以玉簪花根亦可碧雪散蒲黃青黛硼砂牙硝甘草上為細末吹之治口瘡破爛並治咽喉喉癬喉癰用鳳凰衣微火炙黃橄欖燒存性兒茶共為末加冰片少許研勻口瘡搽患處喉痛吹之即進食口瘡久不愈虛火也用生附子一個切焙為末醋和作餅男左女右貼腳心引火下行自愈口角流涎瘡爛以亂髮燒灰存性米飲調服外即以此敷之又方蒸飯時收甑上流下氣水搽之即愈口唇腫黑癢痛不可忍先以磁鋒砭去惡血以古銅錢磨豬油塗之治走馬牙疳及各樣口疳多年田野中白螺螄殼研爛少加兒茶為細末吹患處即愈口疳瘡及咽喉痛用吳茱萸研末加麵粉醋調作二餅貼兩足心以布扎之過夜即愈牙齦潰爛諸藥不效用鹽欖二三個火煅存性加冰片少許研勻搽之神效走馬牙疳臭爛出血用紅棗三枚去核以明雄研末填滿棗內新瓦盛之火煅存性研末搽之方用鳳凰衣未見水者焙黃少加枯礬研末搽之喉閉乳蛾用雞內金勿洗陰乾燒存性研末吹入即破而愈喉內生瘡鼻孔亦爛若作喉風治立死用白霜梅一個燒存性枯礬穿山甲炙枯為末吹喉中即效喉瘡已破瘡口疼痛難進乳食用豬腦髓蒸熟姜醋調和服之愈喉中結核水食不通危困欲死用百草霜蜜和為丸白湯化開灌之甚者不過二次即愈誤吞金銀銅鐵多服米飯久之自出至銅錢用生慈菰搗汁多飲自然消化又方以鹽欖燒灰存性研末水調下自出神驗豬骨硬咽不下用威靈仙煎湯咽之其骨即軟如綿而下或取狗涎咽之亦化取狗涎法將狗倒吊而涎自出倘狗涎中帶微血加砂糖半盞調服導赤散瀉黃散均見發熱沆瀣丹見臍風五苓散理中湯見外感異功散見嘔吐六味丸見胎病舌病論附重舌木舌吐舌弄舌絆舌舌乃心苗抑屬脾系心脾積熱舌病生焉彼其為病不一有名重舌者焉其候舌根下腫短小似另生一舌是積熱甚盛內服沆瀣丹外用針刺出血繼以蒲黃黃柏末搽之有名木舌者焉其候舌腫漸長塞口不能飲食不能言語此症雖亦由心脾之熱上衝而不從速治之十難二生治法服藥針刺均與重舌同例倘照服不效可用碧雪散加竹瀝調敷清之又有名吐舌者焉其候舌長出不能反縮此症與舌生瘡渴欲飲冷一候同為心脾積熱而成瀉黃散可即獲效抑有名弄舌者焉其候舌微露而時出時縮即出即收如弄物然且有似蛇舌出入俗名蛇絲驚此症因心脾虧損治法宜進溫補之劑即夾有熱用瀉黃散亦宜輕下等分如服之不應以四君子湯主之若渴欲飲水以七味白朮散主之如午後甚者此又系脾血虛衰宜急進參苓白朮四物湯若仍不效即宜扶脾補胃補中益氣湯當速進焉此症若系病後見之最為危候速進十全大補湯庶可保全且有名絆舌者焉其候舌根下有筋一條絆其舌尖致舌斷續不能吮乳細視之乃見有筋如絲絆其舌尖此症亦因熱甚而然治法外用針輕輕挑斷其絲切忌致傷舌根內以瀉黃散主之甚矣一舌也而為病不一醫之不可不精也有如此哉證治歌舌為脾系與心苗心脾積熱是病由舌根下腫為重舌積熱甚盛沆瀣丹饒外將針刺繼用搽蒲黃末與黃柏交木舌漸長致塞口不從速治生難聊醫治均同重舌法不效碧雲散竹瀝調舌長難縮吐舌症瀉黃散好治法昭弄舌微露時出縮蛇絲驚症俗名標心脾虧損宜溫補醫師臨症莫輕佻夾熱可用瀉黃散不效四君子可療渴欲飲水宜七味白朮散午後更甚脾血凋急進參苓白朮散四物湯投救可邀不效補中湯益氣扶脾補胃莫辭勞此病若從病後見十全大補湯最超絆舌舌斷難吮乳根下如絲筋一條此症原來因熱甚針將絲斷貴輕挑倘傷舌根難挽救內服瀉黃散自消治法如斯頗詳悉豈嫌饒舌太嘵嘵方七味白朮散人參白朮茯苓乾葛甘草藿香南木香上等分水煎服舌或脹大腫硬即時氣絶名翣舌用皂礬不拘多少新瓦上火煅變紅色為度放地上候冷研細搽舌上立愈重舌木舌皆效舌腫滿不能出聲以梅花冰片研細敷之或食鹽百草為末並花水調敷即效舌斷重生用活蟹一隻炙乾為末敷之此方至神至驗沆瀣丹見臍風瀉黃散四物湯見發熱四君子湯補中益氣湯見外感參苓白朮散十全大補湯見解囟碧雪散見口瘡
