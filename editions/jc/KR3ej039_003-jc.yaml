body:
  text: 卷三天釣論附內釣龜胸龜背慨夫育子之難也自胎孕以至於懷抱飲食起居風寒暑濕不可稍失調護偶失所養子病作焉曾考經書乳子有天釣內釣二病究所由來天釣之證因乳母厚味過傷致小兒吮乳之下心肺生熱凝痰阻滯抑或懷抱失衛護之宜致風寒戕賊邪壅為殃故其形而為證頭反懸目仰視驚悸壯熱淚出不流手足搦搐如附鬼祟然而悲啼不絕甚者爪甲皆青凡遇此候治當速解其邪以鉤藤飲進之病即消矣若氣喘而息不靜以烏蠍四君湯主之其氣即平至如內釣一證乃在胎中母失自保或受風寒之賊或被驚恐之傷且或在懷抱之中乳母飲食未節怒郁未平亦能殃及兒身而為此證故形為候也腹痛氣喘唇黑傴僂角弓反張其囊則腫其眼尾則帶赤色此內證之的候也夫內證既備外亦隨之或兩足屈縮不停或啼哭狂叫不息或瀉泄如傾或抽掣作痛此外證之因證而作也考厥治法內證以聚寶丹主之外證以鉤藤飲治之然審證必尋所由言治必清其源審系因母傷於醇酒厚味而然此必積毒在胃治宜以加味清胃飲主之審系因母素鬱怒未平此必積熱在肝治宜加味消遙散主之或加味歸脾湯亦可但均宜加漏蘆若因乳母過食厚味宜先去宿食而後與兒吮乳此治兒又必先治其母清源之最遠者也然母之失養貽殃於子豈止此哉吾聞乳母多食五辛積成宿乳熱乳兒誤吮之則熱入肺臟肺受熱而肺氣壅遂脹滿於胸壅填不通而成龜胸之證焉抑或早坐貪涼風吹入骨賊邪為禍遂致背彎起如龜身而成龜背之病焉考厥治法龜胸之證宜防風丸百合丸杏仁煎皆可擇用龜背之證外用龜尿以塗脊骨兼行灸法內服松蕊丹然兒本體虛弱亦成此病是宜以六味丸加上桂鹿茸主之或四君子湯亦可總之嬰兒之病由母失養而致者十有八九使母勤斯調護不懈夠勞未有不安然無故也吾因此不禁有感於父母之恩勤若此極也兒之生也自胎孕以至於分娩自懷抱以至於成人為父母者不能一意失持不能一時失護飲食起居朝夕動止風寒暑濕言笑語默為兒之故不能稍適好惡苦何如之夫謂父母勤以育子或聞醫者之言或聞妯娌之諫必何如撫養奉者雷霆即謂之朝不食夕不眠亦無不尊於君命嗚呼父母之心總期子之無病總期子之成人雖至苦至勞無辭焉一旦撫之成人為子者知識日開天良日漓習俗相染渺然不顧父母之衣食不體父母之寒暑不計父母之安危者大抵如是不如是而思父母撫我之苦教育之恩體父母之心為心思父母之苦事父母者十中難云有二也此之凌夷風氣之漓薄坐忍天良滅絕喪本忘恩言念及之殊斷肝腸第人靈於物者也彼慈鳥知反哺之情羔羊有跪乳之義竹木何知旦知顧本末體寒暑以人之靈豈不及之感物反思同歸於孝庶幾旦暮遇之吾論病至此見凡嬰兒病由於母則不病亦由於母不禁有感於父母恩勤之至極而世俗人子忘親之太甚用不揣附數語以互相驚策後之覽者亦將有感於斯奮激而盡孝思以報父母一日之苦者矣證治歌小兒何以病天釣熱生心肺痰阻留懷抱失宜風寒賊雙眸仰視反懸頭手足搦搐如祟附驚悸壯熱淚不流邪宜速解鉤藤飲氣喘烏蠍四君子湯修內釣一證全由母驚恐風寒是病由飲食未調兼鬱怒兒身殃及又誰尤內證腹前兼氣喘唇黑傴僂角弓遒囊腫更兼眼尾赤內證已的外證諏抽掣作痛足屈縮瀉泄如傾哭不休外證鉤藤飲同善內證聚寶丹可求母貪醇酒毒積胃加胃逍遙飲一甌母多鬱怒肝熱積加味逍遙定解愁加味歸脾湯亦美均加漏蘆始無憂母傷厚味先醫母吮乳先教宿食抽母食五辛乳宿熱兒吮熱入肺臟幽肺因熱壅胸脹滿證發龜胸豈易療或以貪涼風入骨兒背彎起與龜侔龜胸防風丸百合丸杏仁煎與龜胸丸投龜背龜尿塗脊骨兼行炙法慮宜周內服松蕊丹最善兒體虛弱古方搜六味丸加鹿茸上桂四君子湯亦最優總之見病多由母母因兒病實多憂父母恩勤真罔極顧復何能萬一酬方聚寶丹人參茯苓琥珀天麻殭蠶全蠍炙防風膽星白附生用烏蛇肉酒焙硃砂麝香上為末蜜丸梧子大每服二丸菖蒲湯下烏蠍四君子湯人參白朮茯苓甘草川烏全蠍上為末每服半錢薑棗煎服次服去川烏枳殼防風丸當歸大黃前胡麻黃枳殼獨活防風上為細末米粉糊丸每服十丸米湯下百合丸桑皮蜜炙木通朴硝杏仁大黃煨天冬百合上為末蜜丸酒下十丸松蕊丹黃松花枳殼獨活防風麻黃前胡大黃肉桂上為細末蜜丸黍米大量兒大小加減粥飲下神授治雞胸良驗方淮山八錢白朮五錢全歸四錢甘草錢半上銼散用全身紫蘇一蔸先煎數沸後入諸藥加生薑濃煎服此劑服至三劑外用蔥白一握白胡椒五錢生附子一個上四六二分元寸一分生薑一大塊共抖爛為餅貼於胸上用紙七層蓋上將烙鐵燒熱就紙上熨之若冷再炙再熨必熨至肉內知熱方止日熨三次良效鉤藤飲鉤藤茯神茯苓川芎當歸木香甘草芍藥上加薑棗煎服若心經熱臉紅舌白小便赤澀本方去木香加硃砂末木通湯下加味清胃飲加味歸脾湯加味逍遙散均見嘔吐六味丸見胎病四君子湯見外感杏仁煎見咳嗽腹痛附蟲痛盤腸氣痛腹之痛也證不一焉有因風寒暑濕冷熱食積邪正相搏而痛者有蟲積中而痛者且有盤腸氣滯而痛者故痛同為證各別所因各分醫治所當詳辨倘執一以下方豈有濟哉稽夫邪正相搏為痛有因脾寒者焉此證口中氣冷不思飲食治宜異功散或理中湯有挾熱而痛者焉此證身體壯熱面赤心煩其痛手按不止治宜瀉黃散若大便調用甘芍湯結用清涼飲有因食積停滯而痛者焉此證面黃或白口中氣溫噯酸睛光朦朧治此輕用消乳丸重用保和丸有體虛弱中夾實邪而痛者焉此證神疲體倦痛按不止口渴心煩胸作飽脹治宜消痞丸有脾虛肝燥木乘土衰而痛者焉此證痛必連脅宜柴芍六君子湯更有腹痛瀉泄如傾而口渴者焉此證雖系實證必先防瀉泄虛陷宜七味白朮散若審系虛寒必用六君子湯加附桂炮姜主之至蟲痛其候必紅唇面白口吐清水脈必見洪其腹按之有股其痛必時止時作治宜椒梅理中湯加使君子蕪荑之屬或烏梅丸亦可但宜除黃柏一味設仍不應體實者用安蟲散體弱者於椒梅理中湯內加附桂自然蟲下病安若夫盤腸氣痛其候腰曲乾啼額上有汗此皆肝風為虐然下藥尤必詳辨如下利青糞者用鉤藤膏小便不通者用導赤散額汗足冷者用沉香降氣湯不應用理中湯若因乳母食滯而然或素稟母性如此則宜用加味歸脾湯或加味逍遙散加味消痞飲治之自無不愈甚矣一腹而分證各異如此治者可不詳慎哉證治歌腹之痛也證不一風寒暑濕辨宜的邪正相搏致痛疼又有冷熱兼食積蟲痛盤腸各有因辨證詳明方有益脾寒氣冷進理中湯兼進異功散寒可避挾熱面赤並心煩瀉黃散煎服自大吉大便調兮甘芍湯清涼散用療便結食積停滯面白黃口內氣溫酸噯逆輕用消乳丸重保和丸服之病去自怡懌體虛中夾實邪疼飽脹消痞丸須蜜脾虛肝燥木乘脾證見痛疼連脅腋治宜柴芍六君子湯脾旺肝平愈可必腹痛口渴瀉如傾證實先防虛陷溺七味白朮散宜投脾扶瀉止生津液審系虛寒用六君附桂炮姜必加入至若蟲證水吐清面白唇紅脈有力按之有股痛隨時椒梅理中湯投宜急加入使君並蕪荑烏梅丸除黃柏章程立弱用椒梅理中湯實安蟲散自然蟲下病安輯盤腸氣痛曲腰啼肝風為虐額汗滴用藥詳辨莫倉惶下利青糞鉤藤膏覓小便不通導赤散投額汗足冷宜沉香降氣湯服之不效用理中湯醫師療治宜精細若因乳母食滯然或稟母性致斯疾歸脾消痞加味投加味逍遙散難剔腹痛分證原各殊詳明百病自辟易方甘芍湯芍藥甘草消乳丸香附炒砂仁陳皮去白神麯麥芽炒甘草炙上為末米粉糊丸黍米大每服二十丸薑湯下烏梅丸烏梅細辛附子炮桂枝人參黃柏乾薑炒黑黃連當歸蜀椒上為末用酒浸烏梅一宿去核蒸之與米飲搗和丸梧子大每服十丸白湯下沉香降氣湯香附二兩半沉香砂仁各一錢甘草七錢半上為末每服一錢入鹽少許沸湯點平旦空心服鉤藤膏乳香沒藥木香薑黃木鱉子去油上為末蜜丸皂角子大鉤藤煎湯磨半丸入蜜服安蟲散胡粉鶴蝨川楝檳榔枯礬上為末米飲調下消痞丸枳實黃連厚朴姜水炒法夏麥芽人參白朮茯苓乾薑甘草上為末蒸餅糊丸白湯下保和丸連翹檳榔陳皮半夏枳殼厚朴楂肉神麯麥芽甘草炙南木香上為末以神麯糊丸米飲下柴芍六君子湯人參白朮茯苓甘草柴胡白芍酒炒陳皮法夏上等分水煎服腹痛用花椒不拘多少研細面少許醋和成餅貼痛處上鋪艾絨火炙一切腹痛均可愈腹痛用生薑一斤捐爛略去汁炒熱用布包作一包先以一包熨痛處冷以第二包換熨勿令間斷如姜炒乾略加水炒再熨一方治盤腸氣寒熱不和用梔仁五錢附子三錢拌炒取起去附子只用梔仁再入白芷末一錢共為末每服五錢小茴香湯調下一方治盤腸氣用蔥炒熱熨臍腹久尿出自愈一方取蟲方逢月初取苦楝子根浮出面者有毒勿用要取土中者去粗皮用白皮四五錢兒大六七錢另於別室濃煎勿令兒聞其氣聞則蟲伏次早以油煎雞蛋令兒食半刻即服藥不可進飲食候蟲下盡方可一方用使君子肉三錢細研又用小瓣巴豆一枚去盡油與君肉搗和焙篩先以油煎雞蛋食之次以砂糖半匙和藥調服瀉黃散清涼飲六君子湯導赤散均見發熱異功散椒梅理中湯加味歸脾湯加味逍遙散均見嘔吐理中湯加味消痞飲見外感七味白朮散見舌病腫滿論考夫腫滿之證由於脾胃之虛蓋脾土喜燥惡濕凡人中氣素弱脾虛無火則水濕得以乘之遂使脾氣不運乳食凝而不化停積於中腫滿之病作焉故治此者當以脾胃為本以浮腫為標斯庶幾矣若以消伐為能事未有不致危殆者也伊古治法分上下為要經曰面腫者為風足腫者為濕自上而起者皆因於風其治在肺宜用參蘇飲合五皮散以發散之自下而起者因於腎虛水泛或因於脾家受濕宜用五苓散加防己檳榔以滲利之故仲景云治濕不利小便非其治也若或一身盡腫此非因胎稟不足卒冒風寒則必系病後脾虛而致輕者宜用胃苓湯重者加味胃苓湯若元氣本虛又遇病後渾然浮腫四肢厥冷不煩不渴小便清長大便滑瀉不思飲食此陰寒之極脾胃將絕治腫諸方皆不可用惟急進四君子湯加青化桂炮薑砂仁白蔻公丁香以救其脾胃庶可挽回如再行消伐無及也已若夫腫非發於病後而突然腫滿是又有表裡陰陽之辨又不可執一也彼夫腫而頭痛身熱者此乃風寒在表之候治宜微汗之五苓散少加麻黃葛根杏仁蘇葉以發之若身無熱五苓散重加肉桂使膀胱氣化小便利而腫自消至若陽水發腫其證身熱燥渴大便必秘小便赤澀治宜五皮散送沆瀣丹以微下之陰水發腫其證身冷怯寒口不渴二便調治宜平胃散加白苓草果木香藿香溫散之總之小兒之腫先起四肢後歸於腹者不可治先起於腹後散於四肢者可治醫者欲於不可治中以求治是又在於神而明之也證治歌腫滿之證脾胃虛脾土喜燥惡濕汙中氣素弱脾無火水濕乘之泛厥軀治此當以脾為本浮腫為標其庶乎伊古治法分上下面風足濕內經區自上因風治在肺五脾湯合飲參蘇腎虛水泛從下起脾家受濕不自如治宜五苓加藥進防己檳榔濕自驅一身盡腫脾虛致胃苓丸加味把脾扶元氣本弱病後腫四肢厥冷煩渴無小便清長大便滑不思飲食證堪虞此屬陰寒脾漸絕四君加味莫躊躇桂姜砂蔻宜加入胃和脾健病旋除突然腫滿證宜辨表裡陰陽詳審諸身熱頭痛寒在表五苓散進表邪疏加入麻黃紫蘇葉粉葛杏仁同類輸無熱五苓倍加桂膀胱氣化自安舒身熱燥渴陽水腫二便秘澀交相愈五加皮湯送沆瀣丹古人治法不為迂陰水發腫口不渴身冷怯寒用藥殊平胃散加藿香葉茯苓草果木香俱先起四肢後歸腹此證不治徒嗟吁先腹後肢猶可治醫師臨證戒模糊方五皮散生薑皮大腹皮桑白皮五加皮茯苓皮上加燈心大棗水煎空心服胃苓湯蒼朮厚朴陳皮白朮雲苓豬苓澤瀉各一錢炙草五錢青桂五分上生薑水煎食前服加味胃苓湯即前胃苓湯隨證加減上方頭面腫初起略加麻黃作喘加桑白皮杏仁小便黃赤加木通身腫加五加皮腹脹加砂仁白蔻丁香枳殼腳冷不溫加附子上桂防己平胃散蒼朮陳皮厚朴炙草上加薑棗水煎服一方治水腫從腳起入腹用紅飯豆煮極熟取湯浸兩膝冷則又熱若已入腹以紅飯豆煮湯日日服之亦消一方治腳腫掘杉木根切斷見其內色紅者為油杉可用若色白者不堪用以紅根切碎濃煎湯將腫腳先熏後洗一二次自消一方治頭面手足俱腫用豆葶藶一兩隔紙炒熟研極細末以大紅棗蒸過去核杵爛和前末為丸每服七丸白湯下一方身浮腫坐臥不得取向東桑枝燒灰淋汁煮紅豆數升每飢食之不得別飲湯水參蘇飲五苓散四君子湯均見外感沆瀣丹見臍風脹滿論脹滿者何腹脹氣滿也病何以作經曰太陰虛則鼓脹胃中寒則脹滿又曰濁氣上行則生嗔脹自予究之腹脹氣滿總由於脾肺氣虛不能健運故也然而亦有虛實寒熱之分不可統治也而要之虛冷之致十有七八實熱之致十隻二三蓋實熱之證多因傷食傷寒人所易見虛冷之證多由中氣虛脾氣損不能運化故令人難見醫者此中當慎若虛冷而以實熱治之其變固不可測實熱而以虛冷治之其害亦正不淺試詳分所因明別證治醫者其明察之考夫虛脹之為候也每因吐瀉之後或服攻下之藥太過凡因此而脹者定從虛治宜用厚朴溫中湯虛中兼寒者加附桂主之實脹者必腹中原有食積或飲食過飽固結於中外證則胃口胸前高脹身熱口渴倦臥不語腹痛微喘目閉不開儼然虛極之象小兒此證最多昧者不察而見其四肢不舉口閉不開誤為慢驚而以寧神導痰之藥置之死地不知凡幾矣不知實有羸然之候即此謂也遇此者急宜用沆瀣丹合集成三仙丹下之庶克有濟熱脹者因傷寒熱邪入里其證大便閉結小便短赤渾身壯熱面赤煩躁此亦宜以沆瀣丹下之寒脹者由中氣素寒冷氣鬱結外證無身熱但口渴而唇青手足厥冷而氣喘治宜先以塌氣丸後以異功散庶乃脾胃和則腹脹自消矣若或因生瘡疥淋洗塗搽逼毒歸內遂致腹脹者輕則用荊防敗毒散升散之重則用集成沆瀣丹微利之此瘡出脹消者吉瘡不出者凶總之脹滿之證臟寒生脹滿者因脾陰之濕有餘無陽不能施化治宜辛熱以從溫脹發脾胃素實形體氣質壯實之人多因濕熱飲食有餘治宜消伐以從利脾虛內寒者仍溫補辛熱以為宜倘固執一下以求通非不暫快一時恐如鴆酒止渴耳凡為醫者尚其省之證治歌腹脹氣滿病何因證候分明詳內經虛實寒熱宜分別虛多實少更須明實熱之證人易見傷食傷寒大略同寒冷多由中氣弱醫師臨證莫輕心吐瀉之後攻下過定從虛治宜厚朴溫中湯虛中兼寒加桂附食積固結實脹名外證胃口胸前滿口渴倦臥熱蒸身腹痛微喘目常閉儼然虛極究非真小兒此證恆多有昧者不察作慢驚用藥置死猶不悟輒用導痰或寧神不知此證宜從下沆瀣三仙用集成熱脹傷食熱入里小便短赤大難通渾身壯熱兼煩躁沆瀣丹下不嫌頻寒脹中寒多冷滯無熱口渴面唇青手足厥冷並氣喘治先塌氣丸繼異功散若生瘡疥毒歸內皆由搽藥或洗淋輕以荊防敗毒重沆瀣瘡出則吉否則凶總之脹滿因寒起治宜辛熱以從溫脾胃素實飲食積消導藥進自然松脾虛內寒仍溫補固執求通必不靈脹後一時非不快譬如止渴酒飲鴆聊抒淺見成歌語後醫省察細推尋方塌氣丸胡椒仁一兩全蠍尾五錢揀去行子洗淨炒乾上以胡椒略去皮取淨一兩炒過和蠍尾研末麵糊丸極小每服一二錢陳皮湯下厚朴溫中湯厚朴一錢半廣皮黑姜灰雲苓各一錢草蔻仁南木香炙草各五分上加姜水煎服虛寒加熟附子五分青化桂五分荊防敗毒散荊芥穗連翹防風枳殼升麻薄荷羌活獨活乾葛木通銀花黃芩川芎黑梔仁炙草各一錢上上身腫加蔥三莖下身腫加燈心水煎服集成三仙丹五靈脂一兩南木香五錢巴豆仁四十粒上將靈脂木香研細末巴豆去殼取淨肉四十粒去其肉上嫩皮紙包浸湯入慢火中煨極熟取出另以綿紙包之緩緩槌去其油紙濕另換以成白粉為度與前二味末和勻醋打麵糊丸綠豆大以硃砂為衣每服五丸或七九丸量兒大小合沆瀣丹二三丸同研爛茶清調下一方治氣脹水脹用羯雞屎乾者一升炒焦黃色出火毒研末以百沸湯淋汁每服一盞調木香檳榔末各五分此中滿蟲毒脹有一無二之方也一方治食脹氣脹用蘿蔔子一兩研細末水調濾汁用砂仁一兩以蘿蔔子汁浸一宿炒乾又浸又炒共七次為末每服一錢米飲下沆瀣丹見臍風異功散見嘔吐癇證論小兒有危候焉最甚莫如癇之一證彼其病狀卒然僵仆眼則直也口則噤也口角則流涎四肢則厥逆其形儼然如死之莫可再生尚言治乎哉雖然未嘗無治也稽考薛立齋張仲景二先生博古通今明垂治法伊古迄今其獲保救者不知凡幾矣考厥治法要不外觀形察色聞聲辨證分臟尋根以為治我嘗觀之面黃而聲如牛者為脾癇面白而聲如雞者為肺癇面黑而聲如豬者為腎癇面赤而聲如羊者為心癇面青而聲如犬者為肝癇然根發五臟而究其源總由元氣極虛極敗之候因痰留膈里被風寒觸動大絡填塞脾經絕其升降之隧道陰陽不接上下關格不通遂致暈頭卒然倒地此飛霞陳氏之言九稱括要妥貼庶幾制治不紛心有把握其如錢仲陽萬密齋雖有分臟之法然用藥專以寒苦毒劣之劑言之殊亦寒心即有行補益者則專以八味丸紫河車丸或補中益氣湯十全大補湯究其為治亦無等次淺深之法失疏通補益之宜未免立法之疏也惟陳氏樹幟特見各有等次初次以消風丸七服每服一丸一錢疏散之以開經絡繼進定癇丸並用河車八味丸或薛氏紫河車丸養心丸六君子湯皆可擇用蓋以此病雖由虛極中必夾寒如此下方虛寒並治然豈無實熱之秘而然者乎此證必壯熱審定下沆瀣丹亦無患也且有因年歲疫染而致者此宜大極丸主之更有因飲食填中而致者此宜用三仙丹若系表裡兩急肝燥熱甚則宜瀉青丸庶乎熱退肝平而病愈矣證治歌小兒危候惟癇證僵仆直視並口噤四肢厥逆口流涎儼然死狀藥難進張薛二公通古今垂明治法久傳信考厥法治無他奇分臟尋根一言盡面黃聲出似牛鳴病源省識因脾困雞聲面白自肺生聲出如豬面黑腎面赤心癇聲如羊肝癇面青犬聲應根發五臟究其源總由元氣虛敗中飛霞陳氏括要言制治不分心明洞其如錢萬二先生分臟之法雖如病用藥不忌寒苦投言之寒心非正論即行補益有專方八味丸紫河車丸不須問十全大補或補中益氣湯究其立法何疏甚惟有陳氏樹幟明淺深等次有評定消風丸七服疏散之繼以定癇丸吞送紫河車合八味丸或將薛氏紫河車丸並六君子湯或養心丸數方隨時可擇用實熱秘兮壯熱形沆瀣丹投可勝任年歲疫染大極丸飲食填中三仙丹敬表裡兩急宜瀉青丸熱退肝平國手頌方河車八味丸紫河車以初生男者為佳用白礬煎湯揉洗極淨薑汁與酒煮極爛熟地棗皮肉桂附子炮麥冬五味茯苓丹皮澤瀉山藥炒鹿茸炙上依法炮製細研蜜丸龍眼大淡鹽湯化服以食壓之臨臥服定癇丸消風丸膽星羌活獨活防風天麻人參荊芥川芎細辛上為末蜜丸梧子大每服二丸薄荷紫蘇湯化下定癇丸人參白朮土炒茯苓姜水蒸陳皮酒炒法夏當歸肉桂去皮白芍酒炒蒼朮白蔻酒炒龍齒煅酒淬硃砂研石菖蒲南木香赤金箔上研末蜜丸龍眼大硃砂為衣貼以金箔曬乾磁器收貯每日早午晚各服一丸薑湯化下大極丸天竺黃膽星大黃酒蒸殭蠶麝香梅花片上端午日午時修合研末蜜丸如芡實大硃砂為衣凡遇疫證薑湯化服一丸神效養心湯黃耆蜜炙茯苓茯神當歸川芎法夏棗仁炒遠志五味肉桂甘草炙柏子仁去油薛氏紫河車丸人參當歸紫河車如上制上將人參當歸研末搗勻為丸淡鹽湯下補中益氣湯見外感十全大補湯瀉青丸均見解囟沆瀣丹見臍風六君子湯八味丸均見發熱三仙丹見脹滿痙病論附內痙痙病由來有之自宋人鑿空妄談抹煞經訓削除痙名別立驚風門類後之無識接踵效尤隨遇抽掣搐搦之候悉以驚風治之赤子無知父母寡識隱受其害強促之死者不可勝計何幸道無久晦之理人有並育之時特出嘉言喻氏獨開千古之識指明病痙之說避破驚風疑陣然疑城已固欲破實難喻氏雖詳而其如執迷不悟者何又幸繼盛有人更出飛霞陳氏得喻氏之金針踵其說而更為發明指實痙病之由分別剛柔之異且即所誤兩相勘校而切指實之彼謂衛傷有汗為柔痙即俗慢驚之名營傷無汗為剛痙即俗急驚之謂不彰彰較著乎詳明其誤以搐易之真特識也夫搐即喻之所謂痙也陳與喻氏真後先相輝映也已為考厥治凡頭汗強脊背反張其目上視頭身俱熱面目紅赤此為太陽之候或則手足拘急低頭下視而口噤此為少陽之候若陽明也則目斜視或左或右手足拘搐總之此為三陽全痙而剛柔則以有汗無汗分之審系柔痙則邪在太陽陽明以桂枝葛根通其營衛其病自平昔海藏桂枝加川芎防風湯比前藥性較微須酌外邪輕重施之若汗後不解乍靜乍躁目仍直視口噤往來寒熱此證太陽陽明雖已罷而邪尚未解傳入少陽半表半裡宜小柴胡湯加防風以和解之若汗過發熱頭搖口噤背反張者太陽兼陽明候也速宜去風養血救陰營而以靜勝躁宜海藏防風當歸湯若審系剛痙發熱脈弦則以金匱瓜蔞根桂枝湯以通其營衛若身熱無汗頭項強直四肢疼痛煩躁心悸睡臥不寧宜急以羚羊角散主之柔痙者又謂之陰痙其候汗多而手足厥冷筋脈拘急汗出不止頭項強直頭搖口噤此由汗多亡陽也速宜以海藏附子散以回其陽抑有小兒血虛體弱寒邪傷營以致眼目翻上身體反張者速宜以當歸四逆湯以養其營至若久病吐瀉之後脾胃虛敗昏睡不醒露睛不動寒痰鳴咽遂而畢見二痙俱證者此為脫候斯時宜急投六君子湯不應以桂附理中湯庶可挽回萬一若猶迷昧不惺仍執慢脾驚風之說以為治一用剪風化痰金石鎮墜之劑是殺人於無形為喻陳之罪人童子之仇敵也其受慘報不知其幾何矣願醫者細省之夫痙之一證前賢之立論既詳而制治議方亦周且晰所言痙者皆驗之於外非驗之於內也而予考之往古驗之當今之世有所謂外者即有所謂內痙之為病有外證實有內證非謂內亦有痙內之云者病不從外之三陽經入而由內臟之相搏相擊而生耳且夫木勝者其子必來助母風火相搏外之拘攣生焉欲挾所勝以乘土則脾家受侮而少食嘔瀉之病出焉中洲既克則土不能生金而金隨弱矣不惟不能制木反以受其欺侮金既失職則自敗莫顧焉能生子母不能生而腎水其涸矣倘能滋潤肝木乎肝失所養風斯起而火斯燥矣輾轉循環各不相顧各受其傷內不顧內安能護外況外之五官百骸全視內臟之敷布生活內無以生病旋作焉吾見手足搐搦外痙之證莫不愈甚而畢露矣此其痙也非有外邪之侮悉由內戰以生吾故曰內痙云以言治也使分類以求藥若梔丹逍遙散為本臟之妙劑其如肺也有阿膠補肺之功扶之即以勝克其於腎也則有六味地黃加芍藥之全功滋生即以扶弱而伏強從此治之非不詳且善也然而繁矣何如統一以求全功之為愈乎則有聚綿湯為萬全云後之醫者於斯求法以為治則庶乎外證明而內證晰一遇其證夫復何遺良方保赤吾卜其無夭札者矣證治歌病名痙證出先民別立驚風始宋人幸有名賢相繼起獨能闢謬定章程衛傷有汗為柔痙即屬慢驚從俗稱剛痙營傷無汗別急驚俗號本相同太陽病證頭項強脊背反張目赤紅口噤低頭兼下視四肢拘急少陽徵陽明斜視左還右手足均成拘搐形三陽全痙已明晰更將二痙逐條陳柔痙太陽陽明合桂枝葛根湯可平湯投桂枝川芎防風益藥性較微宜酌斟汗而不解躁復靜直視如初口噤仍往來寒熱邪猶在半表半裡少陽經醫治宜從和解法小柴胡藥可益防風汗過發熱證繁見太陽證更合陽明養血去風靜勝躁海藏防風當歸湯最靈剛痙脈弦而發熱桂枝湯與瓜蔞根身熱無汗頭項強煩躁心悸四肢疼睡臥不寧剛痙的羚羊角散勿逡巡柔痙即為陰痙證汗多手足冷如冰筋脈拘急汗不止頭搖口噤證最凶汗多亡陽原有故海藏附子散回春血虛體弱營受損身體反張如角弓眼目翻上何藥治當歸四逆湯養營久病吐瀉脾胃敗露睛昏睡並痰鳴斯時二痙證隨作防脫急宜投六君子湯不效若祈回萬一急投附桂湯理中更有內痙尤須辨內戰非由外邪侵木勝子必來助母風火相搏勢莫禁愈挾所勝以乘土少食嘔瀉脾病深中州既剋金隨弱難以制木反受凌金自失職難顧子腎水既涸木難榮輾轉循環不相顧手足搐搦外痙成本臟梔丹逍遙散補肺阿膠獨建勳於腎六味地黃妙再加芍藥有全功尤須統一以求治聚綿湯進是良箴方海藏桂枝葛根湯嫩桂枝芍藥粉葛甘草炙上加薑棗煎服取微汗不可令其大汗致傷營氣海藏桂枝加川芎防風湯嫩桂枝芍藥防風川芎甘草炙上加薑棗煎服此方不特治痙凡小兒外感初起發熱不論有汗無汗皆宜用之海藏防風當歸湯防風當歸川芎大生地上煎熱服金匱瓜蔞桂枝湯瓜蔞根嫩桂枝白芍甘草炙上加薑棗煎熱服羚羊角散羚羊角屑犀角屑防風茯神枳殼麥冬去心人參粉葛柴胡石膏煅甘草炙龍齒上研粗末水煎溫服海藏附子散肉桂附子白朮川芎獨活上加紅棗煎服當歸四逆湯當歸桂枝白芍木通細辛甘草炙上加紅棗煎服海藏柴胡加防風湯柴胡黃芩各一錢人參七分法夏防風各一錢甘草炙五分上加薑棗水煎熱服聚綿湯熟地人參白朮茯苓枸杞當歸柴胡北味阿膠山藥甘草炙上煎溫服若嘔吐寒證加附桂炮姜理中湯見外感阿膠補肺散見咳嗽逍遙散見嘔吐六君子湯見發熱六味丸見胎病五硬五軟論附鶴膝風凡人生之壽夭與有病無病皆視先天胎元之稟受足否足則耐寒暑勁風霜六淫不能貽其疾而且膺其壽不足則畏寒暑怕風霜六淫皆能致其病而且使之夭夫雖年長者且視乎此況小兒肉脆骨嫩之候乎姑無論他彼小兒五硬五軟之病不由稟受之不足而發乎五硬者何手硬足硬腰硬肉硬頭硬也其候仰頭取氣難以動搖氣壅頭痛連於胸膈手心足心恆常冰冷此為陽氣不榮於四末乃孤陽不生為難治之證若肚見青筋則為木乘脾之候治宜六君子湯加薑桂升柴以補脾平肝若或面青而小腹硬者不治五軟者何頭項軟手足軟身體軟口軟肌肉俱軟也為究厥由頭項軟者肝腎病也肝主筋腎主骨肝腎不足故頭項軟而無力手足軟脾胃病也脾主四肢脾胃不足故手軟而懶於舉足軟而疲於步至若身體軟者乃陽衰髓竭故遍身羸弱而不能強立口軟者虛舌出口而懶於言肌肉軟者肉少皮寬肌體虛尫之象也總之本於先天不足其咎究歸於脾胃治法用六味地黃丸以補肝腎吾謂不若用左歸丸右歸丸以補真陽真陰固本根之更愈然胃為臟腑之化源必用補中益氣湯以升舉其脾氣使脾胃一旺則臟氣之稟於脾氣者健又何軟之不健哉夫所謂鶴膝風者多因稟受腎虛血氣不充以致肌肉瘦削形如鶴膝外色不變膝內作痛屈伸艱難此病焮腫色赤而作膿者為外因可治若腫硬色白而作膿者為內因不可治外因者以十全大補湯加蒼朮黃柏防己內因者以六味地黃丸補其精血尤須調補脾胃以助生化之源醫者慎之證治歌五硬五軟證分區總屬先天稟受虛手足腰肉頸俱硬仰頭取氣難展舒氣壅頭痛連胸膈足心冷與手心俱陽氣不榮於四末孤陽不生最堪虞肚見青筋六君子湯薑桂升麻與柴胡五軟頭項口俱軟身體手足並肌肩頭項軟由肝腎病手足軟由脾胃愈陽衰髓竭體故軟口軟舌出言懶敷肉少皮寬肌肉軟咎歸脾胃莫模糊左歸丸與右歸丸好地黃丸好尚難如究竟化源真屬胃補中益氣湯更符更有一證名鶴膝血氣不充肌肉枯焮腫色赤外因是十全大補湯不迂蒼朮黃柏防己並加入服之並可除腫硬色白內因證丸投六味莫踟躕尤須調養補脾胃神明此理其庶乎方左歸丸熟地山藥枸杞棗皮牛膝菟絲龜膠鹿膠上研末蜜丸白湯下右歸丸菟絲山藥枸杞熟地鹿膠肉桂附子上研末蜜丸白湯下補中益氣湯見外感六君子湯六味地黃丸均見發熱十全大補湯見解囟疳疾論疳之為言干也為小兒之惡疾凡形不魁色不華者即為的候第疳之名在十六歲以前若十六歲以後則為癆皆真元怯弱氣血俱衰之所致究其源莫不由脾胃之傷蓋胃為水穀之海凡人身之氣血借水穀之灌溉人身之形氣顏色資氣血之充盈所以胃健而水穀則強病無所起胃弱而水穀則減病因以生凡病疳而形不魁者氣衰也色不華者血弱也氣虛血弱脾胃必早傷之矣為究病因或因幼少乳食食物太早耗傷真氣或因肥甘肆進飲食過飧積滯日久或因乳母寒熱不調或因喜怒房勞之後乳哺而致或因治積取積過傷或因大病之後吐瀉瘧痢乳減少脾胃失養搜其所因差等不一要總因於一虛故其為證頭皮光急毛髮焦稀囟縮鼻乾口饞唇白兩眼昏爛操眉擦鼻脊聳體黃鬥牙咬甲焦渴自汗尿白瀉酸肚脹腸鳴癖結潮熱酷嗜瓜果莫不畢露治法無論積熱寒滯總以治虛為要甚不可峻溫過涼以為治也然驗證下方尤宜審臟分治彼夫青面目生白膜泄瀉夾水或來青色者肝疳也治宜八味地黃丸咬牙舒舌舌上生瘡愛飲冷水唇紅面白喜伏地臥身或壯熱者心疳也治宜硃砂安神丸兼投異功散愛食泥土冷物飲食無度身面俱黃頭大項小發稀焦枯腹脹腳軟間或瀉泄晝涼夜熱者脾疳也治宜四味肥兒丸兼服異功散或益黃散鼻下赤爛手足枯細口中腥臭或作咳嗽氣促右腮㿠白者肺疳也亦名氣疳治宜地黃清肺飲兼服補中益氣湯遍身生瘡喜臥濕地腳如鶴膝頭縫不合者腎疳也亦名骨疳治宜九味地黃丸手足極細項小骨高肌削體瘦腹大臍突號叫胸陷者丁奚疳也治宜蘆薈丸或大蘆薈丸虛熱往來頭骨兩分翻食吐蟲煩躁嘔噦者哺露疳也治亦宜蘆薈大蘆薈二丸口臭齒黑齦爛齒落腦熱肌瘦手足如冰寒熱時作滑瀉腹痛爪甲黧黑身多瘡疥者走馬疳也治宜始用清胃散或蟾蜍丸外用雄黃散敷之瘡以白粉散擦之身體發熱日漸黃瘦腦後項邊有核如彈丸按之隨動軟而不痛此中有蟲如米粉此因浣衣夜露被無辜鳥落毛所汙小兒服之隨成此證是名無辜疳治宜刺破其核以膏藥貼之內服蟾蜍丸繼進蕪荑湯久瀉不止胃虛成疳者疳瀉也治宜香蔻丸肥兒丸久痢不止胃虛成痢者疳痢也治宜木香丸有因胃氣下陷津液不生而成疳渴者治宜七味白朮散有因脾胃虛弱陽浮於外氣不歸元而成疳熱者治宜參苓白朮散或兼陰虛者宜間服六味地黃丸有因瘧久未已胃虛成疳此中有癖謂之疳瘧治宜鱉甲丸有曰腦疳者其候皮毛光急滿頭瘡餅腦熱如火髮結如穗遍身多汗腮腫囟高令兒眼痛此病發於肝治宜九味地黃丸有曰脊疳者發熱黃瘦積中生熱煩渴下痢拍背如鼓鳴脊骨如鋸齒或十指皆瘡頻咬指甲此有蟲食脊膂治宜安蟲丸有皺眉多哭嘔吐清沫腹中作痛痛時成塊摸之硬起滿肚青筋唇口紫黑者腸頭齧癢者此蛔疳也治亦宜安蟲丸若蛔從口鼻出者難治有食積久而成疳者其證形瘦腹緊時發潮熱羞見生人見之則哭治宜保和丸且有鬼歺之一病其證寒熱時作微微下痢毛枯眉縐甚則面色痿黃腹脹青筋瀉青多吐日漸尫羸竟成疳疾此蓋因兒未周歲母復懷孕兒飲其乳而然或因母患別病兒飲其乳因類母病治宜龍膽湯抑有骨蒸一證形似乎疳其候能食善飢久之口穢煩躁夜熱朝涼毛焦口渴氣促盜汗形如骨立謂之消癉若大便日十餘行肢瘦腹大頻食多飢謂之食並此皆由胃之邪火為害耗傷津液所致治宜大肥兒丸總之疳證不一例治亦繁究其致病有由治必先培其本所謂治虛為要甚不可峻溫過涼二語須切記之庶臨證不失所措而下方亦無誤焉證治歌小兒疳疾本非輕的候須從形色徵年逾十六名癆疾疳疾之生未成童總由氣血真元弱脾胃兩傷源可尋胃為谷海資氣血健則無病弱則𤵜色不華兮血本弱形不魁兮氣不豐或因乳少食物早或饜肥甘積滯濃喜怒房癆後乳哺乳母寒熱失調停或因取積過傷損或因病後瘧痢刑尋源總屬因虛致可將病證細分明頭急發枯兼囟縮鼻乾口饞或白唇操眉擦鼻眼昏爛脊聳體黃證自形鬥牙咬甲渴自汗尿白瀉酸腸肚鳴癖結潮熱嗜瓜果諸證畢露治宜精寒熱積滯治虛妙溫涼過峻不可從肝證面青眼生膜瀉泄夾水色來青九味地黃丸合法驗證下方庶有功咬牙舒舌瘡生舌飲冷麵白並唇紅身熱惟喜伏地臥此疳原發自心經治法異功散投善硃砂丸美號安神愛食泥土並冷物嗜甘黃遍面和身頭大項小發枯落腳軟腹脹瀉泄臨晝涼夜熱脾疳證四味肥兒丸最靈異功散並進益黃散數方均可免災凶鼻下赤爛手足細咳嗽氣促口臭腥右腮㿠白是何證肺肝亦是氣疳名地黃清肺飲宜進兼服益氣號補中遍身生瘡喜臥濕腳如鶴膝頭縫松腎疳骨疳均此證九味地黃最合情項小骨高肌瘦削腹大臍突並陷胸丁奚疳證本如此蘆薈二丸均可庸哺露疳證往來熱煩躁嘔噦頭骨分蘆薈二丸亦服美何愁翻食及吐蟲口臭齦爛兼齒落腦熱肌瘦四肢冰寒熱時作腹痛瀉爪甲黧黑瘡疥生走馬牙疳宜清胃散蟾蜍丸可服之馨白粉散擦瘡疥好牙疳敷藥用明雄身體發熱漸黃瘦腦項有核按不疼此內有蟲如米粉洗衣夜露是原因無辜鳥落毛汙壞小兒服之必不寧疳號無辜宜刺核貼用膏藥須避風內服蟾蜍丸甚善繼進蕪荑湯可平久瀉不止疳瀉病治宜香蔻丸肥兒丸並胃虛成痢名疳痢木香丸用白湯吞有因胃弱氣下陷津液不生疳渴成治宜七味白朮散醫師下藥莫朦朧脾胃虛弱陽浮外疳熱白朮散用參苓六味地黃宜間服此是虛弱必兼陰瘧久胃虛成疳瘧鱉甲丸投莫囫圇滿頭瘡餅熱如火髮結如穗汗淋淋腦疳病證由肝發九味地黃丸可飲脊疳發熱肌黃瘦下痢拍背如鼓聲頻咬指甲脊如鋸蟲食安蟲丸最工皺眉多哭吐清沫腹痛塊硬肚生筋唇口紫黑腸頭癢此是蛔疳證候真安蟲丸好宜速進口鼻出蟲醫術窮食積成疳形削瘦腹緊發熱羞見人見之必定呱呱哭保和丸進自消融鬼歺之一病寒熱作毛枯眉皺下痢頻面色痿黃腹脹滿瀉青多吐體欠充此因小兒未周歲母復懷孕飲乳侵母病飲乳證類母龍膽湯進不須驚能食善飢口臭穢夜熱朝涼名骨蒸毛焦口渴氣短促盜汗骨立甚堪憐頻食多飢謂食並大便一日十餘行皆由胃受邪為害大肥兒丸服免耗津總之疳病先培本說與醫人仔細聽方龍膽湯赤芍川芎柴胡桔梗茯苓人參炙草鉤藤龍膽草上以井水煎服外用夜明砂不拘多少以紅紗作袋盛系胸前九味地黃丸丹皮川楝赤苓熟地山藥使君棗皮當歸川芎上為細末蜜丸溫酒下硃砂安神丸生地當歸甘草黃連等分上為細末水糊丸硃砂為衣津液下四味肥兒丸黃連蕪荑神麯麥芽上為細末水糊丸空心白湯下益黃散青皮陳皮訶子肉丁香炙草上每服二錢水煎服地黃清肺飲生地天冬桔梗赤苓桑皮前胡當歸黃芩連翹紫蘇炙草防風上為散水煎服蘆薈丸蘆薈胡黃連黃連炒焦木香白蕪荑炒青皮各五錢當歸茯苓陳皮各兩半甘草炒七錢上為末米糊丸米湯下大蘆薈丸胡黃連黃連白蕪荑蘆薈木香青皮白雷丸破開赤者不用鶴蝨微炒各兩半麝香二錢另研上為末粟米飯丸每服一二丸米湯下此方肝脾疳積食積發熱目生雲翳或疳熱頸項結核或耳內生瘡肌體消瘦發熱作渴飲食少思肚腹膨脹或齒齦蝕落頰腮腐爛或陰囊玉莖生瘡胸脅小腹作痛並效內青皮以龍膽草代之麝香不用尤效清胃散黃連當歸升麻生地丹皮白芷梢細辛上水煎服木香丸黃連三錢木香厚朴制夜明砂隔紙炒各二錢訶子肉炒一錢上為末飯丸干艾生薑湯下蟾蜍丸蟾蜍一枚夏月溝渠中取腹大不跳不鳴身多㿔者上取糞蛆一杓置桶中以尿浸之卻將蟾蜍跌死投與蛆食一晝夜用布袋盛浸急流中一宿取出用瓦焙乾為末入麝香一字粳米飯丸麻子大每服二三十丸米湯下其效如神雄黃散雄黃一錢銅綠二錢上同研細量瘡大小干搽其上白粉散海螵蛸三分白芨二分輕粉一分上為末先用漿水洗拭干敷大蕪荑湯梔仁三分黃柏炙草各二分蕪荑五分黃連麻黃根各一分羌活二分柴胡三分防風一分白朮茯苓各五分當歸四分上水煎服香蔻丸黃連炒三錢肉豆蔻木香訶子肉煨砂仁茯苓各二錢上為末飯丸麻子大米湯下肥兒丸黃連炒神麯炒木香各一兩半檳榔二十個肉豆蔻炮二兩君肉酒浸麥芽炒各四兩上為末麵糊丸麻子大每服四五十丸米湯下鱉甲丸夜明砂炒君肉南木香人參川連黃耆鱉甲醋炙柴胡法夏神麯三稜乾蟾蜍上為細末飯糊丸米湯下安蟲丸蘆薈酒蒸靈脂炒夜明砂炒君肉南木香人參川連薑製乾蟾蜍醋炙苦楝根取內白皮貫仲檳榔蕪荑上為末用公豬膽汁和勻粟米糊丸米飲下諸疳日久身面生瘡爛成白孔如楊梅瘡樣用蒸糯米時甑盆四邊滴下汽水以碗接之搽瘡上數日即愈小兒疳破爛用人中白煅過黃柏蜜炙焦等分少加冰片共研末先以鹽茶洗口後以藥搽之走馬疳及牙齦腐爛腥臭用溺壺內多年積垢煅紅一兩兒茶五錢薄荷青黛各一錢水兌三分細研先以溫水漱口然後吹藥於疳上每日六七次吹藥之時涎從外流者吉涎向內收不治異功散見嘔吐補中益氣湯見外感參苓白朮散見解囟七味白朮散見舌病六味丸見胎病保和丸見腹痛大肥兒丸肉豆蔻煨檳榔柴胡酒炒胡黃連炒川芎炒人參山楂炒白朮土炒陳皮炒蓬朮炒地骨皮酒炒厚朴薑製六丁翹炒川連薑製青皮醋炒雲苓乳蒸澤瀉炒白芍酒炒君肉炒乾蟾蜍煅炙草各五錢五穀蟲兩上共為細末蜜丸彈子大米飲化下消渴論附黃疸胎黃經曰心移熱於肺腑為膈消又曰二陽結謂之消嘗因而考證之消渴者枯燥之病也其名有三凡渴而多飲者為上消肺熱也多食善飢者為中消胃熱也渴而小便數膏濁不禁者為下消腎熱也然雖為火盛水衰之候究由於虛熱者多實熱者少而亦不可拘泥而不深詳察也詳參治法集成雖列定方其中不免執一蓋其病亦未必盡由之腎肺胃熱耳我嘗考夫景岳諸家因證下方彼不有熱結膀胱者乎是宜五苓散果由胃熱而口焦者則以竹葉石膏湯抑不有膏梁過厚而積熱者乎是宜清胃散且不有脾虛作渴者乎是宜七味白朮散或系腎水虛熱則以六味丸津液枯亡則以生津四物湯繫心火動炎作渴小便最多不停飲水無饜飲一溲一是宜蓮花飲次以生津四物湯若小便渾濁加味地黃湯此治三焦之定不法也倘日久不愈時醫以黃連花粉苦寒之類進之當時非無小效特亦鴆酒止渴耳最宜慎之若黃疸一證集成謂之黃癉其證身痛而色微黃或善飢能食或齒垢面黃或溺尿黃赤而安臥時師皆謂由濕熱而成顧予思之黃者脾土之真色深藏不露黃之見於外也內必虧甚治宜固脾為本過攻多利必見危亡然亦不可執一也特脾虛發黃者多濕熱發黃者少耳治法果系濕熱之黃其證必身熱煩渴或躁擾不寧或消穀善飢或小便熱痛或大便閉結其脈必實而有力集成謂之陽黃此證不拘外感風濕內傷飲食皆能致之但察兒之元氣尚強脾胃未損濕熱果盛可進茵陳五苓散或胃苓湯加茵陳亦佳若大便甚秘集成沆瀣丹亦可進也若全無以上等證但見發黃此由氣血之敗氣不生血血不華色或因大病之後或脾胃久虧故本色發露於外此候外證必喜靜惡動喜暗畏明神思困倦言語輕微畏寒少食四肢無力或大便不實小便如膏此甚陽虛之候與濕熱發黃反如冰炭此非速救元氣大補脾胃斷無復生之理然時之庸醫猶有謂濕熱之閉濕熱蒸暈而以茵陳梔子清利之者臆其殺人也多矣予考集成以四君子湯五君子煎溫胃飲主之深為得意若面目俱黃而帶虛浮唇白舌淡口不渴身不熱夜無煩熱小便不澀急宜進四君子湯或六君子湯以救脾胃更有黃病分利之後黃久不退以致口淡心慌肢軟便濁憎寒發熱皆為虛甚宜以四君子湯送八味丸若胎黃初生不久身見黃色並無別證此則顯是胎中所受濕熱而成治宜茵陳地黃湯主之甚矣黃之為病之不一也治者可不慎乎證治歌小兒消渴病奚若厥證有三詳大略渴而多飲為上消病由肺熱邪相搏胃熱中消食善飢腎熱下消小便數火盛水衰候須明實少虛多宜省覺總宜通變戒拘墟驗證下方當審榷熱結膀胱宜五苓胃熱口焦竹葉酌膏梁過厚清胃良脾虛作渴七味白朮散卻腎水虛熱六味丸津液枯亡生津四物湯合心火動炎小便多飲水無饜難止卻蓮花飲後生津湯病退何憂心火灼小便渾濁地黃丸三消治法要已撮黃疸身痛色微黃善飢面黃齒垢惡溺色黃赤臥亦安此中虛實宜詳奪濕熱必然渴且煩消穀善飢身熱作小便熱痛大便難脈實有力宜探索不拘外感與內傷元氣尚存脾不弱胃苓湯內加茵陳茵陳五苓散亦良藥大便甚秘集成沆瀣丹醫治濕熱非防虐若無俱證但發黃此由氣血本先撥或為脾胃已久虧或因大病元氣剝喜靜惡動更畏明神思困倦言語縮肢倦少食兼畏寒大便不實小便濁此屬陽虛候最危大補脾胃為先著四君子湯或五君子湯溫胃飲調效匪薄面目俱黃帶虛浮唇白舌淡口不渴夜無煩熱身不烘小便不澀脾虛確四君子湯合六君子湯脾胃早救庶能活更或分利黃久延肢軟便濁心慌霍憎黃髮熱八味丸四君子湯送下效可卜胎黃證見在初生顯系胎中濕熱鑠治宜茵陳地黃湯治法詳明傳後學方竹葉石膏湯人參竹葉法夏甘草石膏麥冬去心上加生薑粳米煎服本方除石膏加小麥名人參竹葉湯生津四物湯白歸身生地白芍知母麥冬人參各一錢川芎雅連天花粉黃柏炙草各五分上加烏梅一個燈心水煎熱服蓮花飲白蓮鬚粉葛雲苓生地各一錢黃連天花粉人參五味知母炙草淡竹葉各五分上加燈心水煎熱服加味地黃湯熟地二錢淮藥一錢五分山茱肉一錢二分澤瀉六分丹皮芡實麥冬各一錢知母五分雲苓一錢二分五味十四粒蓮肉七分上水煎清晨空心服茵陳五苓散茵陳二錢白朮豬苓建瀉各一錢雲苓一錢五分肉桂炙草各五分上加薑棗水煎服溫胃飲人參白朮扁豆陳皮乾薑當歸炙草上水煎食遠服茵陳地黃湯生地川芎赤芍當歸天花粉赤苓建瀉豬苓茵陳上等分水煎服一方治消渴用蠶繭殼煎湯代茶或用絲綿結塊煎湯亦可一方用豬肚一個洗極淨淡豉五錢入內線縫定煮爛取汁時時服之肚亦可服能除此病一方用豬血煮湯勿用油鹽服之愈但脾虛者服恐作瀉一方治黃疸種絲瓜連皮帶子燒存性研末米湯調服一方用糯米稻草濃煎湯飲之數次愈一方山間苡仁根洗淨煎湯服之愈一方用生薑茵陳各半斤搗爛布包擦周身六味丸見胎病八味丸見發熱五苓散見外感七味白朮散見舌病四君子湯見外感五君煎見嘔吐六君子湯見發熱沆瀣丹見臍風清胃散見嘔吐胃苓湯見腫滿自汗論附盜汗自汗者不時不動而汗自出也經曰陽之汗以天地之雨名之又曰陽加於陰為自汗又曰心汗我嘗繹之心之所藏在內者為血在外者為汗蓋汗乃心之液自汗者由心腎兩虛而得之也然陰虛而陽必湊自汗故發熱陽虛陰必湊自汗故厥冷自汗皆因陰陽偏勝之所致也不亦著乎小兒臟腑嬌嫩膚未密或重衣厚被致內臟生熱熱搏於心故心液不能藏而額汗自出夫額為心位見此者宜急進團參湯然亦不可概論也有因傷風而自汗者宜實表桂枝湯有因傷寒而自汗者其汗自頭至頸而止證必漸欲發黃宜茵陳湯有因實熱在內煩躁汗出不止者此胃實也宜集成沆瀣丹以利之若自汗上至胸下至臍此胃虛也宜四君子湯加黃耆以補之自汗而面白唇白六脈無力此因久嗽脾肺皆虛也宜四君子湯加麥冬五味以斂之至如大病之後氣血兩虛津液自汗或寒熱或潮熱發過之後身涼自汗日久令人黃瘦失治則變蒸疳宜黃耆固真湯又或瀉泄自汗泄止即收收後遍身冰冷時或瀉而不汗不泄反汗此皆為大虛之候宜急進理中湯以救脾氣瀉止繼進黃耆固真湯若氣血兩虛以大補元煎加防風麥冬心口汗頭額汗此為血虛四物湯加參耆有熱者當歸六黃湯手足獨汗此為氣虛宜補中益氣湯胸腹獨汗以四君子湯當心一片宜茯苓補心湯抑有血汗者以血餘散敷之此皆治自汗之法也若夫睡中汗出醒來則止此盜汗也然有因心虛者宜斂心氣養心血以團參湯為主有心熱者其證素必生煩宜導赤散有心腎不交者宜六味丸有血脫而汗者宜當歸補血湯氣血俱傷宜用人參養營湯虛寒者宜八味丸或加減八味丸亦可如若睡中遍身有汗覺來久不幹者此食積盜汗因脾冷所致宜益黃散外此而有痰鳴氣喘汗出如油而不流者此陰陽兩脫不治之候用十全大補湯蓋亦有挽回於萬一者重加陰陽兩救之藥是在醫者之隨時變通耳證治歌心臟內血外為汗汗乃心液內經判自汗皆因心腎虛陽虛厥冷陰熱壯小兒臟腑必嫩嬌裡衣厚被熱生臟熱搏於心額汗淋團參湯進自無恙傷風實表桂枝湯傷寒湯進茵陳尚實熱在內煩躁生集成沆瀣丹無上汗出心前下至臍四君加耆氣自旺面白唇白脈無神脾肺皆虛因嗽犯四君子湯正合宜麥冬五味加之當大病氣血兩虛之熱後身涼病多狀治宜黃耆固真湯醫人用藥莫輕妄瀉泄自汗瀉即收遍身冰冷當惆悵又或瀉時汗反無不瀉汗流皆虛看急進理中以救脾黃耆固真自伴矣氣血兩虛大補元煎防風麥冬加之免後患心口頭額汗不收血虛四物參耆贊有熱當歸六黃湯手足獨汗氣虛斷補中益氣最為良胸腹獨汗四君喚當心一片宜茯苓補心湯血汗血餘散敷暢睡中汗出醒來無此名盜汗古方訪團參湯進因心虛斂養氣血為保障心中有熱證生煩散投導赤自平曠心腎不交六味丸血脫當歸補血亮氣血俱虛用何方人參養營無他讓加減八味丸治虛寒單進八味丸亦寅諒睡汗覺來久不幹脾冷食積益黃散痰鳴氣喘汗不流陰陽兩脫必淪喪十全大補救陰陽挽回萬一憑壽算隨時變通在良醫憑證下方戒孟浪方人參養榮湯人參白朮黃耆蜜炙陳皮炙草桂心當歸熟地五味茯苓遠志白芍上加薑棗水煎服桂枝湯嫩桂枝一錢五分白芍二錢炙草一錢上加薑棗水煎熱服取微汗不可大汗茵陳湯茵陳一錢半黃柏梔仁各一錢上加燈心水煎熱服大補元煎人參山藥熟地杜仲當歸山茱萸枸杞炙草上㕮咀水煎食遠溫服黃耆固真湯黃耆當歸各一錢人參白朮炙草各五分上加枝元水煎服當歸六黃湯當歸熟地生地炒黃柏黃連炒黑黃芩炒黑黃耆炒上等分水煎服血餘散用男子亂髮一握燒存性為末以絹袋盛置干撲之加減八味丸熟地淮藥茯苓棗皮丹皮建瀉肉桂五味上等分為末蜜丸或作湯亦可加味四君子湯人參白朮茯苓炙草麥冬五味上等分加薑棗水煎服一方用五倍子一個研細以醋和作餅裹臍上一宿可止一方用舊蒲扇燒灰多加糯米粉和勻以夏布袋裝之自頭至足遍身輕撲之使其粉入毛竅元府自閉虛汗即止神治也此方男婦小兒產婦一切虛證偶然大汗諸藥莫能止者皆可治均先以前方裹臍後用此方導赤散六味丸當歸補血湯八味丸均見發熱沆瀣丹見臍風茯苓補心湯見咳嗽補中益氣湯理中湯見外感益黃散見疳疾十全大補湯見解囟團參湯見發熱四君子湯見外感不寐好睡論附喜笑不休悲哭不止夜啼人之生也賴陰陽二氣之薰陶氣之化也形氣血兩途之和煦顧陽主動其氣則行於晝陰主靜其氣則行於夜一晝一夜陰陽消息之道於滋寓焉而人氣感之當夜則眠當晝則興晝興夕眠人之動靜即陰陽消息之顯見者也人必順乎陰陽消息之道乃得以生如或當眠反醒當興反寐是失人道之常反天地陰陽之大道也況寤則魂魄動志意行氣血布散臟腑志氣役夫四肢寐則神氣歸於官器氣血行於經絡氣息無驚神志安定順之者百病不生反之者則當安不安是謂悖亂病斯生焉是以聖賢立法救世其於反常悖亂者治法雖幼小不遺焉我嘗考之凡當睡常醒者為胃氣逆而不和治宜四君子湯加遠志棗仁然其不寐豈盡無故而然有因腎經虛熱者宜六味丸有心血不足者宜珍珠母丸或精神短少宜養榮湯若因病後不寐宜酸棗仁湯而有膽虛不寐者其口必苦宜人參竹葉湯有肝火不寧不寐者其心必煩宜加味小柴胡湯有振悸不寐者其心必怔宜四君子湯但宜加生薑棗仁至若好睡不醒其證有別因脾虛者雖醒亦困倦未寐亦閉睛且其睡也每在當食未完之候治此者宜四君子湯加木香半夏若俗之用溫膽湯未合宜也然同一脾虛而有脾虛夾痰者其證睡時多鼾而似哮治宜平補湯有脾虛水穀不化飲食停滯而好睡者其證小便必間出如米泔治宜加味消痞飲虛弱者以五味異功散更有因母好飲致兒吮乳醉而好睡者治宜甘草甘葛湯顧好睡不眠小兒之常病也特喜笑不休或惡哭不止者何為哉蓋笑者亦心之聲心神有餘則發為笑其故因肝臟盛熾而生心火心火盛故笑不休治此者宜柴胡清肝散亦有因腎水虛涸水不勝火者治宜六味地黃湯至若悲哭不止亦肝旺火炎之故治宜六君子湯加山梔柴胡不應用瀉青丸若兼身熱煩躁用導赤散加燈心為引其哭自止雖然其哭亦似小兒之常也獨有當晝則平而當夜則啼也誠何故哉為考厥由多系脾寒心熱神不守舍故病為夜啼蓋脾為至陰寒則腹痛此候每啼必曲腰手冷不欲吮乳以手按腹則止治宜加味當歸散或鉤藤飲若或見燈愈啼息燈稍靜者此心中有熱二陽相搏心神不暢故發為啼其候啼必仰身手足溫熱且必面赤舌苔黃色而尖紅赤口中氣熱治宜導赤散加麥冬燈心甚加黃連膽草熱退自平若面色白而眼中黑睛少是水虧火勝之候宜六味地黃丸若兼瀉不已是脾腎虛弱治宜六神散若睡而忽啼驚悸者是因心神不安其候必於沉睡之際驚啼一二聲若無所附手必抱母面色紫黑者宜用十味安神丸若病後而啼是因虛弱心神不安治亦宜用安神丸更有富厚之家初生兒女夜不息燈致小兒習慣愛戲燈光一遇息燈則啼燃燈則止此則母以藥治但勿燃燈久之自平由此推之治病之貴察其幾也可略乎哉證治歌晝興夜寐本常情原與陰陽消息通病則反常陰陽戾夜不寐兮晝不興小兒治法無須辨可將醫藥逐條論當睡常醒胃氣逆遠志棗仁入四君子湯心血不足珍珠母丸腎經虛熱六味丸勻精神短少養營湯貴病後不寐酸棗仁湯膽虛不寐口必苦竹葉湯投膽自寧心煩不寐因肝火小柴胡湯肝火平振悸不寐心必怔四君子湯生薑棗仁憑好睡不醒證宜別所因不一莫朦朧脾虛醒後常疲倦未寐之時亦閉睛睡在當食未完候四君子湯加半夏木香從夾痰睡後汗似哮平補湯投痰自融水穀不化食停滯好睡便與米泔同加味消痞丸最善虛弱散宜投五味異功散母因好飲兒醉睡甘草乾葛湯能醒更有喜笑不休證由來喜笑亦心聲心神有餘因發笑肝臟盛熾心火生多笑只緣心火盛柴胡清肝散最工腎水虛涸不勝火六味地黃湯奏勳悲哭不止亦有故肝旺火炎是病因山梔柴胡六君子不應丸宜用瀉青倘兼身熱並煩躁導赤散引用燈心夜啼因神不守舍脾寒心熱兩相侵脾寒因之腹疼痛啼時腰曲手如冰不思吮乳腹喜按加味當歸散鉤藤飲陳見燈啼甚息稍止心中有熱病斯成二陽相搏神不暢啼則仰身手足溫苔黃舌尖面俱赤口中氣熱導赤散靈麥冬加與燈心並甚加膽草黃連清倘逢面白黑睛少火勝六味地黃丸醇兼瀉不已脾胃弱治法散宜用六神睡而忽啼驚且悸面色紫黑抱母身病後啼必因虛弱二證安神丸可均燈息則啼母用藥只因徹夜燈長明所貴察幾而治病庶幾宇宙自同春方十味安神丸人參茯神麥冬淮藥龍齒煅各一錢鏡面砂水飛寒水石水飛粉草各五分梅花片一分赤金箔十片上為細末蜜丸芡實大每服一丸燈心湯下加味當歸散當歸吳茱萸肉桂川芎黑姜灰小茴南木香炙草上水煎臨服加鹽七分空心溫服酸棗仁湯知母炒茯苓芎藭生薑酸棗仁甘草真珠母丸真珠當歸熟地人參酸棗仁茯神沉香龍齒犀角柏子仁上為末蜜丸小豆大辰砂為衣每服二十丸白湯下平補湯人參白朮茯苓黃耆五味當歸芍藥棗仁甘草乾葛湯乾葛甘草加味小柴胡湯法夏人參黃芩柴胡丹皮梔仁甘草上加薑棗煎服鉤藤飲鉤藤茯神茯苓川芎當歸木香芍藥甘草各一錢上每服一錢薑棗煎服若心經熱面紅舌白小便赤澀去木香加硃砂一錢木通湯下一方治夜啼用硃砂牛黃共為細末一二錢以犀角磨湯泡服一方用青黛少許細研篩過以燈心煎湯調服小兒百二十日夜啼用蟲蠍四十九隻剪去前半截並足翅焙乾細研每服四分鉤藤湯下一方用蟲蛻十四隻去翅足焙研入米炒一分共研塗乳頭上或納兒口中亦可一方用五倍子研末口中津液作餅納肚臍中以帶裹之或用燈心研水調服一方用伏龍肝二錢硃砂一錢水飛過麝香少許蜜丸水調下四君子湯加味消痞飲見外感六味丸導赤散柴胡清肝飲六君子湯六神散均見發熱異功散見嘔吐瀉青丸見解囟人參竹葉湯見消渴人參養營湯見自汗諸血論稽夫血者營也經曰營為水穀之精調和於五臟灑陳於六腑乃能入於脈要其生化則在於脾總統則在於心藏受則在於肝宣布則在於肺施泄則在於腎濡潤宣通皆血之流行也血顧可不重哉偶或吐衄便泄其治豈可緩哉況小兒百體嫩脆營血未充一經病痛其治尤難緩待考古明論咸謂吐血由於胃氣逆逆則氣有餘余則生火火乘於血血得熱以妄行遂上奔而為吐血之病究其所以每因傷食之後鬱熱胃家或不然必因襁褓重帷暖閣火熱熏逼或因母過啖辛辣流於乳房兒吮之後積溫成熱熱極上奔遂致或吐或衄或溺或便而血病作焉要其治法吐血者因胃中積熱宜清胃湯若因脾胃有傷營衛虛損證見氣虛神倦唇無紅色者切忌寒涼宜四君子湯以救其脾脾實而血自止若精神如舊唇舌如常者血虛也宜四物湯加參術補氣而血自生鼻血者因脾熱傳肺虛火上炎宜加味四君子湯咳嗽而吐血者因心腎水火不濟火炎無制肺胃枯燥故也宜滋陰降火湯均勿作童癆論治大便血者糞前見為近血由大腸而來宜黃連解毒湯糞後見者為遠血從胃脘小腸而來宜清胃湯久不止者宜補中益氣湯小便血而痛者此熱血也宜清腎散不痛者命門虛火之故也宜滋陰降火湯此治血病之大略也證治歌血為水穀之精英調和五臟腑灑陳臟腑溉兮方入脈要其生化在脾經藏受於肝宣布肺施泄在腎統在心濡潤宣通皆血宰血在人身豈可輕小兒百骸皆嫩脆其時營血未充盈一經病漏尤難緩考之前輩有明論吐血由於衛氣逆逆則有餘火即乘血得熱兮行便妄致隨氣逆遂上衝或因傷食熱鬱胃或因過暖火熏蒸或因乳母啖辛辣遂致吐衄證斯成治法吐由胃積熱清胃湯進熱旋清脾胃有傷營衛弱氣虛唇色必無紅此證寒涼宜切禁救脾止血投四君精神唇舌俱如舊血虛四物加白術人參生血法宜兼補氣氣壯血旺自流行又有吐血因咳嗽水火不濟火爍金滋陰降火湯為主若作癆治誤孩童鼻中出血名鼻衄脾熱傳肺虛火薰四君子湯必加味服之數劑自安平大便來血分前後近由大腸黃連解毒靈胃脘小腸為遠血湯投清胃有殊功血久不止宜補中益氣湯小便熱痛清腎通不痛為虛何藥治湯宜降火號滋陰此治血病之大略神而明之存乎人方清胃湯黑梔仁生地丹皮當歸各一錢川連五分上水煎熱服加味四君子湯人參白朮雲苓各一錢粉草八分桔梗一錢麥冬一錢梔仁炒黑一錢黃芩錢半上加燈心十莖竹葉七片水煎熱服滋陰降火湯生地當歸白芍知母蓮肉元參麥冬各一錢川連花粉炙草各五分上濃煎清晨空心服吐血鼻血低頭掬損肺臟而吐血以及上下一切血證用百草霜掃下研為細末米云米煎湯大人服三錢小兒一錢調服百草霜須取燒茅草鍋底上的燒柴炭者勿用鼻血如注急將病者頭髮解開將發浸新水盆內良久即止止後仍服涼血清火之藥治鼻血不止用大蒜一枝去皮研如泥作餅左出血貼左足右出血貼右俱出貼兩足心立時即止血止即以溫水洗去之治鼻血以韭菜搗汁一杯童子小便一杯和勻溫暖服之即止大便瀉血用亂髮雞冠花側柏葉俱燒灰研末每服一錢用水酒調溫服一方便血用霜後乾絲瓜燒灰存性為末每服一錢酒調空心服小兒小便血淋用雞屎尖白如粉者炒焦研末酒調服五分即愈小兒尿血烏梅燒灰存性為末每服一錢米飲調下四君子湯補中益氣湯見外感四物湯清腎散見發熱黃連解毒湯見目病二便色白論經曰北方黑氣入通於腎開竅於二陰然統為陰實二氣之所化蓋前陰主氣後陰主血氣血者陰陽也此便溺之流通見氣血之依附究陰陽之運行也而其為病雖實兩門主之其或發於陰臟或出於陽臟豈可不辨而謬言治哉試以白論彼夫赤為熱白為寒前賢顧有定論而吾謂不然寒能為白濕熱之侵亦有為白者特臟腑異受有不同不可不辨耳我嘗考之脾胃濕熱者二便多白第必審其小便來忽少停久變如泔大便來如魚凍久亦如泔乃為濕熱之證是證也初服茯苓散胃苓湯繼服四味肥兒丸若服後漸淡須兼服益氣異功散加柴芍庶肝補而免疳疾之憂若溺白如精便白成塊此非實熱正屬虛寒溺白進益智散加吳萸便白以附子理中湯或姜附六君子湯若或二便不通亦有虛實寒熱之辨熱結膀胱以五苓散主之脾肺燥結清肺飲主之心火有餘便或赤澀宜瀉心滋腎以加味導赤散主之腎水不足便必白遺宜溫腎益心以益智散主之若陰不生閉結不出以六味丸陽無從化閉結不通以八味丸主之若或因乳母厚味過傷以清肺飲暴怒有害以清肝散若便閉不塞不痛但不通而腹脹緊滿此由臟氣虛受熱壅滯宣化不行之故五苓散加車前燈心若病後氣虛津液不足小便閉澀宜以人參散若病後氣虛食少脈弱大便閉結宜以保和丸但加枳實微利之血不足者以潤腸丸或蜜煎導法通之若因大腸有熱而閉以清涼飲主之總之小兒大便閉結雖實證不可輒下可用濟川煎與蜜煎導法主之病後氣虛小便淋濁宜以六味丸若淋瀝作痛多系火熱宜海金砂散利之若小便自出不禁或睡中自出此皆腎與膀胱之虛寒也宜以益智散加桂附龍骨主之若或初溺黃赤落地良久凝白膏此飲食傷脾所致久必成疳宜速以鹽湯下胃苓丸治之抑有出時色白渾濁隨尿而來謂之白濁此心虛所致宜清心蓮子飲主之且有大便血者此熱入大腸之故有小便紅者乃熱入小腸之由但有虛實之分實熱小便紅以清心蓮子飲大便紅以犀角地黃湯虛小便以六味丸大便以補中益氣湯有因風邪外侵致大便血者以倉廩散病後元氣陷者以補中益氣湯有糞前紅而後不紅或後紅而前不紅者均以四君子湯加吳萸此二便諸證之治醫者恪循精心察證對證下方其無失矣證治歌二便色白究何辜以寒為白論多拘濕熱所侵亦為白猶貴分明臟腑區脾胃濕熱二便白論色均與米泔符胃苓湯與茯苓散四味肥兒丸是後圖服後漸淡益氣異功散宜加白芍與柴胡溺白如精便成塊此屬虛寒可舉隅便白附子理中湯姜附六君子湯溺白益智散加吳萸二便不通亦須辨虛實寒熱莫模糊熱結膀胱五苓散脾肺燥結清肺飲除腎水不足必遺白溫腎益心益智散孚陰不生兮成閉結六味丸投病可驅陽無從化仍陰塞丸投八味免欷歔若因乳母味過厚飲以清肺莫踟躕暴怒有害清肝散更或便閉證懸殊不塞不痛為閉結腹脹緊滿臟氣枯用藥宜進五苓散車前加與燈心俱病後氣虛津液少小便閉塞人參散扶食少脈弱大便閉保和丸加枳實舒潤腸丸療血不足蜜煎導法亦非迂大便熱閉清涼飲總之議下須慎諸縱然實證宜蜜導濟川煎進其庶乎病後肺虛小便濁六味丸兮美可茹淋瀝作痛系火熱海金砂散利堪娛虛寒若客膀胱腎小便不禁睡亦如治法宜投益智散桂附龍骨加不誣初溺黃赤久變白久必成疳病可虞胃苓丸用鹽湯下此時切勿緩須臾虛在心經成白濁清心蓮子飲愉愉大小二腸因熱入二便紅赤如應桴實熱溺紅蓮子飲虛宜六味挽桑榆大便實熱宜犀角地黃湯補中益氣以療虛風邪外侵大便血用藥散宜倉廩散諸病後因之元氣陷補中益氣起孱軀大便前後紅變異湯用四君子加吳萸精心察證宜無失聊將褊見附方書方保和丸神麯炒廣皮炒半夏雲苓炒各一兩楂肉三兩連翹炒蘿蔔子炒各五錢上共為細末蜜丸每服一錢薑湯下茯苓散三稜煨蓬朮煨砂仁赤茯苓青皮陳皮滑石甘草上為末每服一錢燈心湯調下益智散補故紙鹽水炒三錢白雲苓酒炒益智仁鹽水炒各五錢上為末每服一錢鹽湯調下姜附六君子湯人參白朮茯苓陳皮法夏附片炮姜炙草上加薑棗煎服加味導赤散木通生地炙草黃芩黑梔仁澤瀉柴胡各一錢車前子一錢上加淡竹葉七片燈心水煎空心熱服人參散人參麥冬川柏炙草上加生薑煎服潤腸丸火麻仁去殼杏仁去皮桃仁去皮歸尾酒洗枳殼各七錢半金井膠炒蘿蔔子炒蘇葉各三錢上為細末蜜丸每服一二錢量人加減白湯下蜜煎導法治二便不通以此通其大便則下焦氣行而小便自便矣用冬蜜煉至滴水成珠入皂角末二錢和勻冷捻如小指大以蔥涎塗上插入穀道中氣通則便利矣濟川煎當歸肉蓯蓉牛膝澤瀉升麻枳殼上水煎服人參熟地黃芩任加海金砂散香附酒炒川芎酒炒赤茯苓酒炒各五錢滑石枳殼炒建瀉炒石葦焙檳榔各二錢半上為末每服一錢淡鹽湯調下清心蓮子飲雲苓一錢半蓮子二錢益智麥冬各一錢人參遠志石菖蒲車前子各五分白朮六分澤瀉四分甘草三分上加燈心水煎空心服犀角地黃湯犀角丹皮各一兩生地八錢赤芍七錢上每服二錢水煎服倉廩散川芎枳殼茯苓法夏甘草柴胡羌活獨活桔梗前胡上加陳粳米一握水煎服一方小便不通用食鹽一兩溫水調服之良久探吐之自通一方用皂角末吹入大鼻中取其噴嚏小便自通小便不通致身腫用蘇葉一斤濃煎湯入腳盆內安一小凳令患者坐上蒸薰外用食鹽炒熱熨臍上及遍身腫處而腫消便通治大便不通用連須蔥七莖生薑一塊豆豉三錢共搗爛為餅烘熱掩臍上以帛束纏定自通一方大小便不通用皂角燒灰一錢米湯調服一方用蜜一錢皮硝一錢白湯一盞調服外以皂角燒桶內令兒坐桶上薰自愈一方用草烏一個去皮麝香擦更以香油塗之輕插穀道中愈胃苓湯胃苓丸即胃苓湯加分為丸均見腫滿四味肥兒丸見疳疾附子理中湯四君子湯五苓散補中益氣湯均見外感清肺飲見咳嗽六味丸見胎病八味丸清肝散清涼飲均見發熱瀉泄論當聞瀉泄之病由於脾胃蓋胃為水穀之海而脾主運化使脾健胃和則水穀腐化而為氣血以行營衛病無由作矣苟其飲食失節或寒溫不調致脾胃受傷則水反為濕谷反為滯精華之氣不能輸化遂致含汙下降而瀉泄作矣參古治法凡瀉泄腸鳴腹不痛者為濕治宜燥滲飲食入胃不住或完穀不化為氣虛宜溫補腹痛腸鳴瀉泄痛一陣瀉一陣為火宜清利時瀉時止或多或少為痰宜豁之瀉時腹痛瀉後痛減為食積宜消之體實者下之如脾瀉已久大腸不禁者宜澀元氣下陷者升提之然而猶有五證寒熱虛實食積尤不可不辨凡暴注下迫便黃赤口氣蒸手煩渴少食是為熱候治宜五苓散加梔仁水液澄清瀉多完穀神疲而口舌俱白是為寒候治宜理中湯或六君子湯若因寒極不效則宜以九氣丹四全丸口噯酸氣吞酸腹脹一痛即瀉一瀉痛減者是為傷食治宜保和丸若食消痛止瀉猶不止者是為氣下陷宜急進補中益氣湯若瀉色青而稠黏此為風瀉乃肝木乘脾之候治宜柴芍六君湯加防風體重水瀉腸鳴而腹不痛者此為濕瀉治宜升陽除濕湯若夫大瀉渴其病不論新久皆宜用七味白朮散以生津液凡久瀉不止者多屬虛寒治宜參苓白朮散加肉蔻山藥久瀉不止將成疳者亦同此治總之瀉泄之病凡脈細皮寒少氣泄不止食不進者死能食者生瀉不止精神好者脾敗也吐瀉而唇深紅者內熱也色若不退者死面黑氣喘者死遺尿不禁者腎絕也不治辨明諸候審慎下藥庶無誤焉證治歌瀉泄之病由脾胃脾健胃和氣血粹飲食失節寒溫乖脾胃受傷輸化昧因濕腸鳴腹不疼治宜燥滲法深會飲食入胃不能留完穀不化氣虛最溫補之法最為良醫師用藥宜精配腸鳴腹痛因火炎痛後即瀉清利貴時瀉時止須豁痰瀉痛後減食積在脾瀉腸通必澀腸元氣下陷升提遂暴注下迫便赤黃口氣蒸手煩渴備此為熱候宜五苓加入梔仁熱自退瀉多完穀水液清口舌俱白精神瘁寒證宜用理中湯六君子到寒邪畏寒極四全並九氣傷食保和丸莫昧食消痛止瀉猶存氣虛下陷證宜辨補中益氣可升提依分配合豈猶墜肝木乘脾風瀉名色青稠黏此其候治宜柴芍六君湯加入防風藥一味水瀉腸鳴腹不疼升陽除濕湯妙無對大瀉作渴用何方七味白朮有誰懟久瀉不止屬虛寒參苓白朮亦精銳肉蔻山藥必須加瀉久成疳治同類辨證詳明慎下方吉雖鄙陋宜時佩方九氣丹熟地附子制肉豆蔻麵炒焦姜吳茱萸補骨脂酒炒五味炒炙草上白蜜為丸或山藥糊丸白湯下四全丸石硫黃附片茯苓炮姜白朮升麻赤石脂上為細末蜜丸淡薑湯下一方治瀉用生薑搗爛陳茶各三錢濃煎服效一方治瀉用白朮茯苓各三錢煎服腹痛加白芍炙草一方治瀉用雞子一個取一小孔入胡椒七粒幣封孔慢火煨熟酒送下胡椒吞不能吞不拘一方治瀉用淮藥酒炒白朮土炒蓮肉去心蒸熟砂仁酒炒各等分共為細末加白沙糖米飲調服一方治瀉用早米飲鍋巴四兩蓮子去心蒸熟共為細末以白沙糖和勻二三錢白湯調服一方久瀉不止用車前子二兩青鹽二兩微炒七次茯苓山藥各二兩共為細末米飲或烏梅湯調服二三錢五苓散理中湯補中益氣湯均見外感六君子湯升陽除濕湯見發熱柴芍六君子湯保和丸均見腹痛七味白朮散見舌病參苓白朮散見解囟痢疾論痢之一證前已詳明治法幼兒豈有不同而復別立證治者蓋以幼兒體氣柔弱且受病之因亦殊然究其制治卒不外乎寒熱虛實陰陽六字我嘗考之凡身熱作渴脈數有力而能食者為熱身涼不渴脈沉無力而不能食者為寒要其主治初起腹中苦痛裡急後重者屬實證宜集成沆瀣丹三仙丹下之即效若身有寒熱是兼外感不可遽下急宜發散以倉廩散疏解之有因風而起者其證純下清血治宜胃風湯下之若積重按而愈哭者加味消痞飲痢下赤白相兼者多因傷熱而致治宜芍藥湯或以黃連阿膠丸加木香當歸總之治血痢必於血中行氣以胃苓丸加歸芍主之治白痢必於氣中養血以保和丸主之若寒痢不止或寒瀉兼嘔者以復陽丹主之痢後瘦削而成鶴膝風者以補腎地黃丸加虎骨鹿茸牛膝主之有瀉變痢者加味四物湯痢變瀉者加味四君子湯痢而噤口者宜參苓白朮散痢而脫肛者內服升麻湯外用托洗法有痢而腹脹者此中氣虛損以胃苓丸調之若因誤治早服澀藥而致腹脹者此為實證宜保和丸以消導之抑有痢久不止者是名休息痢治法切忌止澀宜初以和中丸繼以集成至聖丹總之痢疾乃病中險候治法不可不詳而危候尤當先識彼凡痢下五色或如煙塵水或如屋漏水或肛門如竹筒或下如魚腥又或久痢唇紅白苔氣促心煩坐臥不安大渴飲水面容似朱者皆不治之證一日不能食者凶能食者吉此皆醫人所必究者也故並錄之證治歌痢疾一證前已明豈有幼兒治不同茲將證治復贅論小兒體氣異成人究其制治無別法寒熱虛實陰陽分熱渴脈數兼有力此為熱證熱宜清寒證身涼口不渴切脈無力必細沉腹中苦痛急兼重實證宜下不須驚三仙沆瀣二丹效此方原出自集成身有寒熱兼外感急宜發散莫遽通倉廩散投一二劑寒散熱除病自松純下清血因風起服藥湯宜用胃風下痢積重按愈哭加味消痞飲可斟赤白相兼因熱致湯投芍藥有殊功黃連阿膠丸亦美當歸加與木香均總之血痢宜行氣歸芍加之入胃苓丸白痢氣中須養血保和丸主莫朦朧寒痢不止瀉兼嘔復陽丹進自安寧痢後瘦削成鶴膝補腎地黃丸必靈此丸為主宜加味虎骨牛膝及鹿茸瀉變痢者用四物痢變瀉者宜四君痢而噤口用何藥參苓白朮散最工脫肛外用托洗法內服升麻湯可提升痢而腹脹氣虛損胃苓丸調治保無凶誤治澀藥服之早保和丸消導進宜勤若久不止成休息切忌止澀再叮嚀集成至聖丹繼進初服丸兮號和中總之痢疾證凶險危候詳列亦多名或下五色如屋漏或似煙塵或魚腥又或飲食服即下肛門不斂如竹筒久痢舌苔兼氣促坐臥不安面色紅大渴飲水渴不止此皆不治枉勞心方胃風湯白芍白朮人參肉桂當歸川芎茯苓上為末每二錢入粟米薑棗水煎空心熱服芍藥湯白芍一錢半當歸一錢川連五分黃芩八分大黃五分檳榔二錢木香三分桂心三分上水煎熱服黃連阿膠丸川連雲苓歸身木香各一錢阿膠二錢上為細末水丸每服一二錢米飲下加味四物湯當歸川芎白芍生地雲苓川連木香上等分水煎空心服加味四君子湯人參白朮雲苓當歸白芍炙草上薑棗水煎溫服升麻湯升麻人參白朮雲苓荊芥穗陳皮當歸白芍防風炙草上烏梅一粒水煎食後服和中丸人參炙草當歸川芎車前豬苓澤瀉神麯麥芽蓮肉各二錢白朮雲苓廣皮白芍木香炮姜灰肉豆蔻各一錢上為末酒煮麵糊為丸每服一二錢米飲下至聖丹鴉膽子去殼上用龍眼肉包每包三粒空心下忌葷酒三日禁鴨肉一月倘服次日肚中虛痛用白芍一根甘草一根俱重三錢紙包水濕火內煨熟取起搗爛煎湯服之立止一方治痢用干馬齒莧煮爛紅痢用蜂蜜白痢用沙糖紅白痢用蜂蜜沙糖同拌日進二次一方久痢不止紅糖白糖飴糖各三錢甘草一錢陳茶三錢共水煎露一宿次日溫服脫肛洗藥五倍子五錢白芒硝一錢荊芥穗一錢半煎湯薰洗仍以五倍子研末敷之以軟帛托入一方噤口痢用臘肉骨濃湯徐徐服之沆瀣丹見臍風三仙丹見脹滿倉廩散見二便色白胃苓丸見腫滿保和丸見腹痛復陽丹見嘔吐補腎地黃丸參苓白朮散見解囟加味消痞飲見外感疝氣論經云邪客於足厥陰之絡令人卒疝暴痛其證內則小腹絞痛不得大小便外則卵丸腫大此證多得之寒發原專屬於肝與腎無涉蓋肝主怒小兒性急多因叫哭而得之者此氣動於內謂之氣疝治宜行氣開鬱初以柴苓湯升散之繼進加味二陳湯或木香內消丸若因久坐濕地得之者此冷氣入腹謂之寒疝治宜溫中散寒以加味當歸散或茱萸內消丸主之有卵腫無熱而腹不痛者此由中濕所致宜行濕消腫以加減守病丸主之有素有疝氣或一年半載而發者發則外連睪丸內貫小腹腫硬一條如小杵約長五六寸大小便不通此宜當歸木香湯主之有腎腫大如木而不痛連年不消者最須急以茱萸內消丸加牽牛子半生半炒取頭末炙旁章門穴庶乃有效不然恐成終身痼疾取穴法以本兒手掌第五指本節橫紋對臍中心其中指頭盡處即是此穴有因坐濕地之上為蚯蚓吹其卵致腫大而垂者切勿誤作疝治但以鹽湯洗之或以蒼朮煎湯入鹽少許洗之即效有陰囊生潰爛者此謂之脫囊用紫蘇葉研末敷之外以荷葉包之或用生荷葉火烘令軟包之雖睪丸露出亦可治也有外腎臊臭時復癢者以柴胡龍膽湯主之癢甚不可止以胡椒煎湯洗之備錄明治內外並集誠詳慎而用之其無失矣證治歌疝氣邪客足厥陰令人卒疝暴痛疼內則小腹必絞痛外則睪丸腫大侵此證多因寒邪犯發源專屬在肝經小兒性急多啼哭氣動於內氣疝名治宜行氣開鬱結初服柴苓湯繼二陳湯木香內消丸亦好氣疝之證此調停冷氣入腹寒疝證調治散寒或溫中方進加味當歸散茱萸內消丸亦可吞卵腫無熱腹不痛行濕消腫法宜明加減守病丸甚美中濕先宜把濕行素有疝氣或間發內外牽痛背難伸腫硬一條如小杵二便秘塞苦不通此證必宜何藥主當歸木香湯可平腎腫如木雖不痛連年不消也困人茱萸內消丸加黑醜半生半炒炙章門穴有坐濕地蚓吹卵腫大而垂不須驚蒼朮煎湯入鹽洗誤作疝治必不靈陰囊生瘡或潰爛脫囊之病亦無凶紫蘇研末調敷好包用生荷葉須火烘軟外腎臊臭時復癢柴胡龍膽湯服之馨癢甚不止胡椒湯洗推詳治法後醫聽方加味二陳湯川芎廣皮法夏茯苓小茴各一錢肉桂炙草各五分上生薑三片水煎溫服木香內消丸青皮醋炒二錢陳皮酒炒三稜煨澤瀉炒豬苓川楝肉炒香附酒炒南木香各七錢上為末酒煮米糊丸鹽湯下茱萸內消丸元胡醋炒棗皮蒸大茴炒吳茱萸醋浸一宿炒青皮醋炒陳皮肉桂各一兩桃仁炒蒺藜炒南木香各五錢上為末酒煮麵糊丸如龍眼大每服一丸淡鹽湯下加減守病丸南星制蒼朮鹽炒白芷各一兩楂肉炒橘核炒川芎炒神麯炒吳萸炒法夏各二錢半上為末酒煮麵糊丸龍眼大每服一丸小茴湯下當歸木香湯當歸川芎橘核小茴川楝木通澤瀉青皮南木香豬苓黑梔仁上等分水煎熱服柴胡龍膽湯柴胡一錢二分澤瀉木通生地各一錢車前八分歸尾六分龍膽草五分上水煎空心服以飲食壓之一方治疝氣用荔核五錢炒焦大茴酒炒二錢五分為末溫酒調下一錢一方治疝氣及一切諸般氣痛荔核四十九個陳皮九錢生硫黃四錢共為末鹽水調麵糊丸綠豆大酒研九丸空心服良久又進三服自愈小兒疝久陰囊堅硬如石名為木腎用瓜蔞連皮帶子二錢蓽撥二錢生薑二錢蔥白二錢酒煎熱服被覆暖臥取汗出效柴苓湯見外感加味當歸散見不寐時疫論附類搐十治小兒時疫醫多誤之集成辨之最詳參觀自得何庸贅論吾謂凡疫癘流行之時小兒作熱即為時疫乍然眼目上竄角弓反張手足搐掣者切勿誤為驚風但以時疫治之用薑湯送大極丸即愈夫固有不待他求者也噫病無不可治惟誤認證者不可治慨自驚風門立輒以驚風言治諸小兒之病十九驚風其凡似是而非被誤殺者不知凡幾矣此辨集成最詳試輯錄之以為訓稽夫藜藿小兒外遊日多家居日少當伏暑之天坐臥烈日之中澡浴寒澗之內其常也詎知暑氣乘入浸而入里迨夫夏秋之交忽而內熱外寒心神昏悶煩躁不安甚則搐搦此傷暑證也慘遇庸醫指為驚風妄用風藥逼至死者多矣斯時救急惟連進卻暑丹庶可保全有夏傷暑熱秋為痎瘧者痎瘧者二日一發瘧也其證初起呵欠懶悶喉內痰鳴一笑即嘔嘔則痰出每日如此者即為瘧證甚至神情憒亂臨瘧而搐此切勿治搐但以清脾飲專治其瘧自愈有因飲食不節起居不時秋為痢疾者然此證雖因內傷飲食亦必由於外感治法但當升散以人參敗毒散主之有宿食停積者輕行消導重則疏通此定法也庸醫不察急投止澀之劑遂致神昏搐搦者有之急用沆瀣丹三仙丹二藥同服立效有咳嗽之病因誤服藥致咳聲不轉眼翻手搐者斯時若以驚風治之又無不死者急進集成金粟丹一服即愈有丹毒一證其候由心火熾盛熱與血搏或起於手足或發於頭面胸背遊移上下其熱如火形如錦紋赤如丹砂其痛非常凡自胸腹散於四肢者易治自四肢而入胸腹者難治按此證初起即宜砭去惡血內服沆瀣丹庶不致內攻作搐若醫者不知針砭妄用搽敷逼毒入內必致作搐而死切宜慎之有瘡癰未能先內托解妄用砒硫毒藥搽之逼毒入內致瘡平而轉為腹痛便閉身無血色目閉不升手足搐搦者此毒氣內攻也宜速進雄黃解毒丸下之瘡出則吉不出而喘者死有出痘未行疏散致腠理固閉熱盛神昏而搐者此為常候宜先以人參敗毒散升散之次用導赤散加硃砂以制其猖厥此痘出則吉屢搐者凶若或收靨之後作搐此為痘毒倒陷宜雄黃解毒丸或紫草湯下之痘復出者吉搐不止者凶有霍亂髮搐一證其候先傷於食後感風寒邪正相爭心腹絞痛有上吐下瀉者有上不得吐下不得瀉者所以煩躁悶亂其證最急宜速以鹽湯探吐之吐瀉之後以藿香正氣散分理之但見喘而搐者不治按此為乾霍亂俗名絞腸痧有客忤一證其證因兒真元不足神氣未充故外來人畜之氣得以忤觸其兒之正氣此病之發或因生人遠來或因六畜暴至或戲騎牛馬或父兄騎馬遠歸未及薰衣即抱其兒則馬汗不正之氣從鼻而入經曰五氣入鼻藏於心肺則正氣受忤此外因之客忤也其證口吐青黃白沫面色變異喘急腹痛反側不安手足瘛瘲第此證神不昏亂為異耳治宜外用塗囟搐鼻二法內服攝生飲更有內因客忤或兒平日所喜者戲而奪之平日所畏者戲而恐之凡親愛之人喜食之果玩弄之物心之所繫口不能言一時不得遂逆其心志旋至昏昏喜睡寐不惺惺不思乳食即其候也治宜先順其心意內服沉香安神丸並惺惺散又有中惡一病比之客忤為更甚蓋客忤無非受外來人畜不正之氣中惡則中惡毒之氣如老樞腐屍淫祠古樹冷廟古井敗屋陰溝皆有惡毒之氣焉小兒觸之從鼻而入肺先受之閉其清道填塞胸中忽然而倒四肢厥逆兩手握拳上氣喘急者即其候復有食惡毒之物者亦謂之中惡如菌蕈河豚瘟牛疫馬自死六畜並水雞蝦蚌之類自口而入則腸胃受之故心腹刺痛腹皮青黑悶亂欲死二證均宜先以霹靂散搐其鼻令自嚏噴出其毒氣然後服藥前中毒氣者用返魂湯後中毒物者用雄黃解毒丸更有慢證咸以慢驚名之誤矣自夏氏發明定論千古之疑城以破無庸贅辨其病成於大病之後誤汗誤下夫汗多亡陽吐久亡胃吐瀉久而脾胃虛極故成慢證其證眼翻手搐握拳形狀似驚故以驚名使以驚治萬無救也惟以六君子湯加炮姜或附子理中湯庶可保全抑有吐瀉作搐者經曰少陽所至為湧嘔吐又曰春傷於風夏主飧瀉其證先傷乳食後感風邪乃致脾胃受傷吐瀉不止漸至遍身四肢口鼻俱冷手足微掣昏睡露睛蓋小兒全賴乳食以為命吐多則乳食不入瀉多則乳食不藏吐則傷氣瀉則傷血乳食既絕氣血復傷速救真元庶免竭脫以六君子湯或理中湯主之又有大驚卒恐一證幼科妄名急驚賴張氏景岳力言闢之謂小兒忽被大驚最傷心膽之氣內經云卒恐則氣血分離陰陽離散經絡厥絕脈道不通陰陽相逆經脈空虛氣血不次乃失其常是雖強壯不免為病況小兒氣血未充更難免患故凡受大驚卒恐神氣失散憤亂不堪其證名為陡離之病治當以收復元氣為主宜速進秘旨安神丸團參散獨參湯之類加金銀等物煎服之以上所言治誤搐類搐非搐之證原以闢謬正訛也前賢歷有定論後之明達詳參互究對證下方尋源臨證赤子之死於誤搐者吾知其必無矣證治歌時疫緣何病小兒真候驗從發熱時角弓反張目上竄更兼搐掣在四肢誤作驚風定貽害薑湯送下大極丸宜貧兒當暑日遊佚澡浴寒澗曝朱曦詐知暑氣侵入里夏秋之際病旋滋內熱外寒神昏悶煩躁甚而搐搦危遇此證本為傷暑卻暑丹進復何疑夏傷暑熱為痎瘧初起呵欠懶悶隨喉內痰鳴哭即嘔嘔即痰出日如斯甚則神情必憒亂臨瘧而搐治宜思不必治風專治瘧此時飲合用清脾飲食起居失調養秋為痢疾更堪悲雖由內傷實外感人參敗毒散主之宿食停積輕消導重則疏通是定規藥投止澀必搐搦沆瀣丹三仙丹效可期誤藥咳嗽聲不轉眼翻手搐苦難支若作驚風治必死丹投金粟勿遲遲心火熾盛成丹毒熱與血搏發各岐手足頭面及胸背遊移上下熱如熾赤如丹砂形似錦疼痛非常證若茲由腹散肢堪救藥由肢散腹最難醫初起惡血宜砭去內服沆瀣丹可施瘡癰未能先內托誤擦毒藥致凶羅瘡則平兮旋腹痛身無血色目若迷手足搐搦兼便閉雄黃解毒丸是明師出痘未疏腠理固熱甚神昏搐若羈人參敗毒宜先進導赤散加朱砂制紛馳收靨之餘搐忽作痘毒倒陷治宜咨雄黃解毒丸偕紫草湯痘出搐止我心夷霍亂髮搐先傷食風寒復感正氣虧邪正相爭心腹痛上吐下瀉或差池煩躁悶亂從斯辨鹽湯探吐古方垂吐瀉後投藿香正氣散病痊搐止定怡怡客忤病由真元虐外來人畜氣相欺五氣入鼻藏心肺正氣受忤是病基證發吐青黃白沫喘急腹痛難轉移面色變異肢瘛瘲神不昏亂證獨奇外用塗囟搐鼻法攝生飲進福履綏更有內因客忤證小兒願欲與心違昏昏喜睡不思乳寐不惺惺若醉癡先順心意後圖治沉香安神散與惺惺齊中惡證危緣有故毒因老樞與腐屍敗屋陰溝偕古井冷廟古樹暨淫祠惡毒氣從兒鼻入清道閉塞忽昏頹四肢厥逆手拳握上氣喘急候宜知更有惡毒物多類小兒肆食貪朵頤毒從口入腸胃受心腹刺痛腹皮青黧二證總宜先出毒搐鼻丸投霹靂丸威中毒氣投返魂湯妙中物雄黃解毒丸司若因大病誤汗下慢證莫作慢驚治眼翻手搐兼拳握誤以驚治定多非炮姜加入六君子湯附子理中湯可挽回吐瀉作搐內經悉風邪乳食傷胃摧周身俱冷肢微掣昏睡露睛是重災必救真元防竭脫理中湯六君子湯兩相培大驚卒恐傷心膽誤作急驚治已疪其證神氣多失散憒亂不堪名陡離治法元氣宜收復秘旨安神丸是藩籬獨參湯與團參散金銀等物可相資正訛願繼前賢軌付質高明等管窺方清脾飲青皮半夏黃芩各一錢草果仁五分雲苓柴胡陳皮白朮厚朴各一錢炙草五分上加薑棗煎熱服雄黃解毒丸明雄黃一錢川鬱金二錢巴豆霜一錢上為末醋打米糊丸綠豆大每服三五丸白湯送下以利為度紫草湯紫草人參白朮當歸川芎白芍茯苓甘草木通上每服三錢或五錢加糯米煎服藿香正氣散藿香蘇葉大腹皮廣皮桔梗雲苓半夏神麯白芷各錢厚朴炙草五分白朮錢半上加薑棗水煎熱服塗囟法灶心土一錢明雄黃五分真麝香五分上為末棗肉和搗作餅須照囟門寬窄為樣以餅貼囟上取艾絨作豆大一粒灸三炷即止搐鼻法川芎霍香葉藜蘆各三錢元胡丹皮辰砂各二錢上為末以少許吹鼻中得嚏則邪氣出矣攝生飲制南星南木香法夏各錢半細辛蒼朮菖蒲炙草各一錢上生薑三片水煎熱服沉香安神丸人參白朮廣皮枳殼桔梗青礞石煅各五錢炙草上沉香各一錢辰砂水飛一錢川連一錢五分上為末蜜丸芡實大每服一二丸麥冬湯下返魂湯麻黃去節二錢杏仁去皮七粒炙草一錢上加蔥白三寸水一盞煎至半盞分數次服霹靂散豬芽皂三分細辛川芎白芷各五分躑躅花半分明雄黃一分麝香半分上為極細末每少許以燈心三寸長蘸藥點鼻孔內以得噴嚏為驗人參敗毒散人參桔梗枳殼川芎甘草雲苓羌活前胡柴胡防風荊芥穗獨活上生薑三片水煎熱服忌油膩若脾怯倍雲苓加懷山扁豆脾肺若寒倍雲苓懷山藿根兼肝證倍柴胡加白芍微加青皮兼心證倍獨活加連翹木通兼脾證加神麯山楂麥芽兼肺證倍枳殼加北芥子兼腎證倍獨活導赤散生地三錢木通一錢生甘草一錢上加竹葉七片水煎臨服加硃砂末一分調服六君子湯秘旨安神丸團參散均見發熱惺惺散理中湯卻暑丹均見外感大極丸見癇證沆瀣丹見臍風三仙丹見脹滿金粟丹見咳嗽
