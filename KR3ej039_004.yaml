body:
  text: 卷四傷寒論附乳子傷寒傷寒原同一病而乳子與小兒治各有異何也蓋曰小兒八歲以後氣血充足經脈完固傷寒與強冠同治乳子筋骨柔脆傷寒初入太陽即人事昏沉渾身壯熱筋脈牽強醫不詳辨誤指驚風其禍立至所以乳子傷寒貴於急治是以歷古調治辨症既不繁雜用方亦甚簡約倘遷延時日則無力耐之矣所以與小兒論治不同也特吾參考群書議論雜出而得其宗者惟集成一書今並宗之試詳論治明者察之稽夫經義凡治小兒傷寒仍自表達里先皮毛次肌肉又次筋骨腸胃絲毫不爽其始也先從太陽寒水一經有惡風惡寒頭痛脊強等症寒鬱皮毛是為在表脈浮緊無汗是為傷寒麻黃湯發之得汗即解脈浮緩有汗為傷風以桂枝湯散之汗止即解太陽既罷無頭痛惡寒脈又不浮為表症罷而在中乃陽明少陽之間脈不浮不沉則在乎肌肉之間皮毛之下然有二焉若微洪而長陽明脈也外症鼻乾不眠用葛根解肌脈弦而數少陽脈也外症脅痛耳聾口苦寒熱往來以小柴胡湯和之蓋陽明少陽不從標本從乎中治若有一毫惡寒邪尚在表雖入中還當兼散邪若邪在陽明則解肌邪在少陽則和解然病猶未退既為傳裡實熱脈不浮而沉按之筋骨之間所謂陽明胃腑病也與經病不同蓋陽明經病已罷至此傳入脈中之胃腑矣若脈沉實有力外症不惡寒而反惡熱譫語大渴六七日不大便皆腸胃燥實致之輕則用大柴胡湯重則用大承氣湯大便通而熱自愈矣至若寒邪直入三陰之經名曰直中三陰乃三陽主氣已衰無熱拒寒也故初起而即手足厥冷或戰栗蜷臥不渴或腹痛嘔吐瀉泄或口吐涎沫而如刀割不發熱而脈沉遲無力此不從陽經傳入同治之例更當看外症如何輕則用理中湯重則用薑附湯四逆湯治之雖然不可概論矣症有反乎常者如發熱面赤煩躁揭衣去被飲冷脈大非陽症乎乃多投涼劑而死者何也內有伏陰也切其脈不論浮沉大小必指下無力按之筋骨之間皆然甚者服一切茶湯及藥皆吐此陰盛格陽乃白通湯加人尿豬膽汁症仲景將傳經直中並論正謂有陰症似陽陽症似陰耳如太陽症頭痛發熱當脈浮而反沉又似少陰矣故用麻黃附子細辛湯少陰症脈沉應無熱而反發熱又似太陽矣須用甘草乾薑附子湯陰症四肢厥逆而陽症亦有厥逆此四逆湯與四逆散不同也陽症下利陽症亦有漏底此理中湯與黃龍湯不同也總之治小兒傷寒與大人無甚分別凡遇脈浮發熱身疼惡寒脊項強而氣喘咳嗽頭痛而四肢拘急口舌和口不渴脈不沉大便如常者以麻黃湯桂枝湯大小青龍湯之屬主之此謂病在表宜發表也若尺寸俱長目痛鼻乾漱水不欲咽以葛根湯升麻葛根湯之屬主之此謂病在肌當解肌也若脈不浮不沉往來寒熱嘔吐脅痛胸前脹滿耳聾頭汗盜汗目眩口苦以大小柴胡湯主之此謂病在表當和解也若脈至沉而有力潮熱惡熱腹痛下利轉矢氣手足心腋下有汗咽乾齒燥目不明譫語發狂小腹滿下利清黃水不得眠小便多而自汗外症頭痛發熱俱罷以白虎湯小承氣湯六一順氣湯之屬主之此謂病在裡宜攻裡也若脈沉無力下利清穀小便清長四肢厥冷嘔吐清水涎沫苛惡寒倦臥多眠夢縮爪甲青吐蛔乾嘔舌卷手足拘急身體痛如被杖以理中湯四逆湯真武湯白通湯之類主之此謂陽微當救里也此上言通治小兒傷寒之病也然此特姑舉大略其詳須參前傷寒門治但有所謂乳子異乎小兒之治者何故則又當驗症施方大凡初起男體重面黃而帶慘色女面赤而帶慘色喘急惡寒口中氣熱呵欠煩悶項急者為傷寒治法風寒者必偎藏其身於母懷是為藏頭伏面為表症可與解肌桂枝防風湯如惡熱出頭露面揚手擲足煩渴便祕掀衣氣促者是為里症略疏通之宜小柴胡湯加大黃中病即止若頭額手足口中氣出俱冷面色暗淡大便瀉青此為陰症裡虛當救其里宜理中湯主之若大熱大渴而自汗此表裡實熱宜和解之宜柴胡白虎湯清之抑有先傷風寒後傷飲食或先停飲食後感風寒者名夾食傷寒其症壯熱頭痛噯氣腹脹大便酸臭留連不解宜大柴胡湯下之體素弱者以惺惺散主之此言治乳子之傷寒病也或有謂小兒八歲以前無傷寒此則不經談集成已詳闢之茲無容贅證治歌乳子傷寒異小兒骨節柔脆病難支初入大腸身壯熱筋脈牽強症昏迷誤作驚風端速禍是宜急治莫遊移日久病延無力耐古人論治可詳披厥病仍由表達里次在肌肉先在皮又次筋骨和腸胃此中原不爽毫釐始自太陽風寒惡頭痛脊強證如斯寒鬱皮毛為在表傷寒脈與傷風歧浮緊無汗傷寒症麻黃湯進勿猜疑傷風有汗脈浮緩止汗湯宜用桂枝太陽既罷猶須辨頭痛惡寒病早離脈又不浮仍為表罷而在中當細思此在陽明少陽界脈不浮沉又貴知肌肉之間皮毛下中有二端莫混窺微洪而長陽明脈鼻乾不眠宜柴葛解肌湯少陽脈見弦而數外症寒熱往來隨脅痛耳聾兼口苦和解小柴胡湯最宜邪在陽明肌宜解邪在少陽和解是成規病猶未退傳裡熱脈沉不浮宜審之陽明經病原已罷脈中胃腑已傳施脹如有力兼沉實症反惡熱病已滋譫言口渴不大便總由腸胃燥實罹輕則大柴胡湯可用重則大承氣湯莫辭直中三陰陽氣敗初起厥冷在四肢戰栗蜷臥兼不渴腹痛嘔吐瀉泄危口吐涎沫身不熱脈無力兮並沉遲重用薑附湯四逆輕用理中湯可醫症有似陽涼反死內有伏陰理可推陰盛格陽白通湯妙人尿豬膽汁加莫遺太陽反似少陰脈麻黃附子細辛湯持少陰反似太陽症甘草乾薑附子奏勳奇陰陽俱有厥逆證四逆湯散各分司陽症下痢陰漏底理中湯黃龍湯亦差池小兒母以成人治憑脈施方古法垂脈浮發表桂枝好麻黃湯青龍湯可挽頽尺寸俱長肌宜解升麻葛根效可期不浮不沉和解妙大柴胡湯有必需沉而有力病在裡小承氣湯白虎湯六一順氣湯齊沉而無力宜救里理中湯真武湯解人頤或投白虎湯與四逆湯傷寒門悉可參稽乳子原與小兒異初起男女不同達男則面黃女面赤俱帶慘色不揚眉喘急惡寒口中氣熱呵欠煩悶項急弛此為傷寒尋治法表裡虛實貴圖維伏面藏頭為表證解肌桂枝防風湯一卮惡熱出頭揚手足煩渴便閉復掀衣氣促為里症大柴胡湯進加入大黃其庶幾頭額手足口中氣俱冷面色暗淡不怡怡大便瀉青為何症陰症裡虛此其時藥當救里方為妙理中湯進定無疵大熱口渴兼自汗表裡定為實熱羈柴胡白虎湯堪用自然和解引清機風寒先賊後傷食停食復受風寒欺名為夾食傷寒症壯熱頭痛氣歔欷大便酸臭兼腹脹大柴胡湯進我心夷體素弱者惺惺散通治乳子法堪依方麻黃湯麻黃桂枝杏仁炙草上水煎熱服桂枝湯桂枝一錢半白芍二錢生薑錢半紅棗五枚炙草一錢上水煎熱服得微汗不可大汗葛根解肌湯葛根麻黃桂枝芍藥炙草生薑紅棗黃芩上等分水煎服大承氣湯莊黃厚朴枳實芒硝上加生薑水煎熱服薑附湯附子制乾薑上等分水煎冷服四逆湯即薑附湯加炙草白通湯即薑附湯加蔥白三莖濃煎冷服麻黃附子細辛湯麻黃熟附子細辛上等分水煎冷服甘草乾薑附子湯即前四逆湯四逆散柴胡白芍枳實炙草上等分水濃煎熱服黃龍湯柴胡三錢黃芩炒赤芍炙草各二錢上加生薑三片大棗三枚水煎熱服大青龍湯麻黃熟石膏各二錢桂枝一錢杏仁五粒炙草四錢上加老生薑一錢大棗一枚水煎溫服惟恐汗多小青龍湯麻黃桂枝白芍各一錢三分炙草乾薑細辛各一錢五味十二粒半夏薑水制一錢三分上水煎溫涼得所徐服葛根湯乾葛一錢半赤芍桂枝炙草各六分麻黃去節一錢蔥白三莖老生薑三片大棗二枚上水煎熱服升麻葛根湯升麻乾葛赤芍炙草上等分水煎熱服白虎湯熟石膏三錢知母二錢炙草一錢上加粳米一撮水煎熱服小承氣湯莊黃二錢半芒硝一錢半桂枝一錢桃仁十粒炙草一錢上水煎空心熱服凡用三承氣湯須以手按病人自胸至小腹果有硬處手不可近又看其舌之燥滑何如然後分別當急下者宜大承氣湯可與少者小承氣湯宜微和胃氣者調胃承氣湯調胃承氣湯莊黃三錢芒硝二錢炙草一錢上生薑五片水煎熱服六一順氣湯莊黃芒硝厚朴枳實柴胡黃芩甘草上入鐵鏽水三匙水煎熱服真武湯熟附子白芍雲苓各二錢白朮一錢半老生薑二錢上水煎溫涼得中服桂枝防風湯桂枝防風各一錢半白芍一錢老生薑一錢大棗五枚炙草一錢上水煎熱服有痰加芥子嘔吐加陳皮法夏熱多加柴胡胸緊氣急加枳殼桔梗大柴胡湯理中湯柴胡白虎湯惺惺散均見外感小柴胡湯見解囟傷風論幼兒體嫩最易傷風夫風何時則無人豈無遇風之一頃蓋風之傷也賊風之為害耳然人中氣足腠里密者雖甚受其吹撼莫能為害而受邪致病者皆怯弱嫩脆之體故風邪得以乘之或有不慎而感受者頓然發為頭痛鼻塞呵欠喘急咳嗽身熱脈浮指紋紅紫而長此為傷風正候通治宜用人參敗毒散復有傷風自利腹脹而手足冷者此脾怯也宜本方倍雲苓加懷山扁豆有見為潮熱多睡氣分嘔吐乳食不消大便黃白而嗽者此脾肺受寒之候也宜本方倍雲苓加白朮懷山藿根又有傷風多淚脅痛目腫而咳嗽者此兼肝症宜本方倍柴胡加白芍青皮若或舌苦而赤汗流而嗽此兼心症也宜本方倍獨活加連翹木通若面黃唇腫少食噁心則又兼乎脾症宜本方加六曲山楂麥芽若外見面白眶腫上氣喘急是為肺家不症宜本方倍枳殼加芥子若嗽而腰痛則兼腎症宜本方倍獨活主之此言傷風之治然傷風即前所謂感冒也奚必另列此特為括要備治云證治歌幼兒何事被風傷病同感冒可參觀治法亦同須括要不妨重論逐條詳只緣體嫩兼怯弱賊風為害易相干發為頭痛兼咳嗽呵欠喘急塞鼻端身熱脈浮指紋紅紫通治人參敗毒散將傷風自利兼腹脹手足俱冷勢難當脾怯前方雲苓倍更加扁豆與懷山潮熱多睡兼嘔吐氣分乳食欲消難大便黃白兼多嗽脾肺原來已受寒本方加懷山白術藿根仍倍雲苓服自安傷風多淚更脅痛目腫咳嗽症兼肝本方加入青皮白芍倍用柴胡是妙方舌苦而赤汗流嗽症兼心病貴精參仍用本方倍獨活連翹加與木通良症若兼脾必少食噁心唇腫面多黃此貴本方加六曲山楂麥芽可其嘗肺症定多氣喘急外見面白腫在眶仍用本方加芥子枳殼倍用定無妨嗽而腰痛兼腎症本方倍獨活罔不臧治法如斯詳且晰醫師精究普慈航方人參敗毒散見時疫傷暑論嬰兒之患夏秋為甚蓋火土旺於長夏正當金水受傷稚陽陰微已失和加之暑熱陽氣外浮生冷中賊夏失長養則不能生金其病為暑然有中暑而病者有因暑而致病者雖病有不同而總由於暑故其為病有陰陽二症曰陰暑曰陽暑治法冰炭不可不詳辨也何為陰暑因暑而受寒也凡膏粱之兒畏暑貪涼不避寒氣又或居深堂廣廈或乍熱乍寒之時不謹衣被以致寒邪襲於肌表其症頭痛無汗惡寒身體拘急四肢痠痛此以暑月受寒雖名陰暑即傷寒也治宜溫散須進五積散及清暑益氣湯不惡寒而發熱者人參白虎湯熱退後以調元生脈散主之抑有不慎口腹過食瓜果涼茶冷水以致寒涼傷臟而為嘔吐瀉利腹痛等症此亦因暑受寒寒邪在內治宜以溫中為主加味五苓散主之不應以理中湯主之何為陽暑藜藿之兒常在烈日之中坐於熱地之上澡浴寒澗之中其症發熱頭痛煩躁大渴大汗大便乾結小便赤痛其脈洪滑者宜白虎湯主之若體虛煩渴而少氣者宜人參白虎湯若眩暈者宜生脈散兼吐瀉者宜薷苓湯總之醫治暑症最當詳辨陰陽虛實凡外中熱邪內亦煩躁而熱者此表裡俱熱方是陽症治宜清補如前若脈虛無力或為惡寒背寒或為嘔惡腹痛瀉泄或四肢鼻尖微冷或不喜涼茶冷水或息促氣短無力以動之類皆陽中之陰症也凡見此等症皆當專顧元氣以四君子湯主之或理中湯加芍藥亦可若虛寒甚者則又當舍時令而從症治附桂亦在所必用若因暑熱之名而執用寒涼解暑則禍不可勝言矣後之醫者須詳察之證治歌小兒傷暑果何由火灼金兮在夏秋病為中暑或因暑總以陰陽二症求陰症因暑兼寒受畏暑貪涼是病由以致客邪襲肌表惡寒無汗病在頭身體拘急肢痠痛五積散清暑益氣湯投發熱不惡寒宜白虎湯熱退調元生脈優寒涼貪食因傷臟嘔瀉腹痛實堪愁治宜加味五苓散不應理中湯可謀陽暑病多因烈日煩躁大渴汗遍流大便乾結小便赤其脈洪滑白虎湯諏體虛煩渴兼少氣人參白虎湯是無訅眩暈則宜生脈散兼之吐瀉薷苓湯修總之暑症須詳辨陰陽虛實慮必周陽症表裡必均熱治宜清補與前侔至若脈虛無力者症發多端可細搜陽中陰症宜培本四君子湯定解罘或用理中湯加芍藥虛寒甚者更須籌是宜舍時而從症桂附堪投勿刻舟倘執寒涼醫暑症恐將速禍又誰尤方五積散白芷陳皮厚朴桔梗枳殼川芎白芍雲苓蒼朮當歸法夏桂枝炮薑炙草麻黃上加薑棗水煎服清暑益氣湯人參六分黃耆乾葛白朮各一錢神麯澤瀉黃柏青皮炙草各五分五味三分上入薑棗水煎熱服一方有蒼朮升麻陳皮當歸薷苓湯白朮雲苓豬苓澤瀉各二錢香薷扁豆各錢半肉桂厚朴各一錢炙草五分上入薑棗燈心煎服生脈散人參二錢麥冬三錢五味七分上水煎溫服調元生脈散加味五苓散理中湯四君子湯均見外感白虎湯見傷寒人參白虎湯見發熱傷濕論經曰諸濕腫滿皆屬於脾又曰風雨則傷上清濕則傷下是濕之為病有出於天氣者雨露是也有出於地氣者泥水是也有出於飲食者酒漿生冷是也有出於人事者汗衣臥濕如小兒之澡浴糞機衣襁不幹是也然所因雖異悉由乎脾氣之虛而辨治之法其要惟二曰濕熱曰寒濕盡之矣病而發熱者謂之濕熱病而多寒者謂之寒濕濕熱之症發熱身痛多煩渴小便赤澀大便閉結脈見洪滑治宜清利柴苓湯茵陳飲主之若果濕熱之甚或元氣壯而祕結不通者方可以推蕩之以集成沆瀣丹主之寒濕之症惟脹滿瀉泄嘔吐凡小兒喜弄冷水坐臥濕地症見為頭痛身重寒熱往來宜胃苓湯主之如兼嘔吐加藿香砂仁因中濕浮腫者以胃苓湯合五皮散主之不效則當用溫補俟元氣漸復則陰邪始退如理中湯八味丸隨擇用之若濕出於飲食因酒面停滯嗜瓜果喜生冷燒炙肥甘以致濕熱壅溢而為病者此內因也復有坐臥濕地霧露陰雨所客澡浴為風所閉涉水為濕所郁鬱於肌腠則發黃此濕由外生也通觀外內所感皆由脾氣虛弱而濕邪得乘而襲之中濕發黃者茵陳五苓散主之不效以六君子湯治之燥脾而黃自退大法治濕先治脾願醫者通觀之證治歌傷濕總由脾氣虛濕熱寒濕兩分沖熱症發熱多煩渴小便赤澀病在膚大便祕結脈浮滑柴苓湯與茵陳飲俱濕熱之甚元氣壯祕結宜投沆瀣丹濡寒證腫滿兼嘔泄病由飲食與起居寒熱往來身更重頭痛胃苓湯可茹若兼嘔吐宜加藥藿香砂仁嘔可除若因中濕而浮腫五加皮散與胃苓湯儲不效宜投溫補進元氣漸復陰邪除兼服理中湯和八味丸隨時擇用不宜拘內因外因雖分別總為脾虛病厥軀中濕發黃茵陳五苓散不效則用六君子湯扶治濕先從治脾始大法如斯已舉隅方茵陳飲茵陳蒿二錢黑梔仁錢半赤苓葶藶各一錢枳實甘草各五分上入燈心水煎食前服柴苓湯理中湯均見外感沆瀣丹見臍風胃苓湯五皮散均見腫滿八味丸六君子湯均見發熱茵陳五苓散見消渴傷食論附食積傷食一病小兒最多歷古明賢論治甚詳雖有寒傷熱傷暫病久病實症虛症之分治要不外乎固脾胃為主脾胃氣壯者攻之無不可脾胃虛弱者攻之不惟無益而又害之是其從治也宜察其性情喜忌偏勝之故且宜辨其貧賤富貴奚若與其兒體貌肥瘦強弱何如察之詳辨之明制治庶幾無誤試詳別之考夫因乳食停滯中焦不化而成病者其症必發熱惡食或噫氣作酸或惡聞食氣或欲吐不吐或吐出酸氣或氣短痞悶或腹痛啼叫此皆傷食之候也便宜損之損之者謂姑置之勿與食也使其自運經謂傷之輕者損谷則愈正此謂也損之不愈用胃苓丸以調之調之不減則用保和丸以導之導之不去則攻下之輕則木香檳榔丸重則消積丸噫傷食一症最關利害如遷延不治則成積成癖治之不當則成疳成癆故小兒之強壯者脾胃素實持其能食父母縱之以致太過停留不化此傷食真候也可用前法治之若小兒之怯弱者脾胃素虛所食原少或因略加即停滯不化此脾虛不能消穀也非真傷食作傷食治則誤矣惟宜六君子湯助其健運多服自愈若傷食經吐瀉則其所傷之物俱去治此者只宜和其胃氣以異攻散或六神丸主之有傷食而致面黃吐瀉者此脾弱之至宜潔古枳實丸主之有飲食停滯胸膈痞悶而腹脹者宜保和丸主之總之小兒傷食傷於食冷果食者症必形為腹痛瀉利此為寒傷須從寒治偶因停滯者症必形為脹痛此多屬虛症須進健脾補益之劑明乎此所以治傷食也則思過半矣然而傷食之法既明食積之治宜辨嘗考古法飲食之積必用消導消者散其積也導者行其氣也脾虛不運則氣不流行氣不流行則停滯而成積或作瀉利或成癥痞以致飲食減少五臟無所資稟血氣日愈虛衰因致危困者多矣故必消而導之輕則和解常劑重必峻下湯丸蓋濁陰不降則清陽不升客垢不除則真元不復如必戡定禍亂然後可以致太平若積因脾虛不能健運藥力者治或消補並行或補多消少或先補後消潔古所謂養正而積自除故前人破滯削堅之藥必假參朮贊助成功然而治此者尤不可不辨果何因而致此疾也若徒見其面色黃白或青黃腹大或飲食少腹痛發則數日不止旋不問平日所傷食之物是寒是熱並不察兒之形氣或虛或實可攻與否竟用偏寒偏熱峻下之劑而犯虛者益虛之戒其害豈可勝言或抑思先傷熱乳熱食者為熱積傷冷乳冷食者為冷積五穀之類為食積禽畜之類為肉積菜果之類為冷積故用藥必分寒熱二症冷積應用消積丸熱積用木香檳榔丸仍用原傷之物作湯送之謂之溯源湯總之治積之法凡用攻下取積之藥必先補其脾氣如六君子湯之類先服數劑扶其元神然後下之免傷胃氣也若小兒體弱者雖積斷不可下當以補為消六君子湯加莪朮木香研末以薑汁打神麯為丸每服一二錢以米湯送下久服自消今之小兒稟受怯弱者衆有積皆當識此攻克之藥慎勿輕用證治歌小兒傷食病堪尋寒熱久暫虛實分大抵總宜固脾胃脾胃虛弱莫輕心性情貧賤均宜察肌體強弱更須詢乳食停滯因成病發熱惡食病相循噫氣作酸惡聞食欲吐不吐致呻吟氣短痞悶兼腹痛症為傷食已分明此宜損谷自能愈損之不愈用胃苓丸不效保和丸可導導之不去始宜攻輕則木香檳榔丸好重投消積丸最工傷食本來關利害若稍遲延積癖成治之不當仍成禍成疳成癆症更凶若是小兒脾胃弱不能消穀辨須精治從傷食必多誤六君子湯可奏勳若經吐瀉宜和胃異功散用與六神丸傷食麵黃兼吐瀉潔古枳實丸可庸胸膈痞悶兼腹脹保和丸進自消融倘貪果食傷生冷腹痛瀉利症必形此係寒傷當審慎從寒施治莫朦朧偶因停滯必脹痛脾虛須用補脾功傷食之法須詳列食積之治更條陳自古久傳消導法脾虛食積成痞癥食少臟枯血氣敗故宜消導免危沉輕則和解重峻下濁陰既降陽始升脾虛藥力不能運消補並行任酌斟古人破滯削堅藥必加參朮以和同更辨所因以求治慎勿執見免傷人熱積冷積宜分別肉積食積莫囫圇大約不離寒與熱冷積可用消積丸通熱用木香檳榔丸妙送以溯源湯最靈消積宜先補脾氣六君子湯先服保其身倘遇小兒身體弱以補為消庶合情六君子加莪朮木香薑汁神麯共調勻糊丸每服米湯下久服能消澤布春方木香檳榔丸檳榔炒五分莊黃酒蒸曬乾五錢南木香三錢神麯炒一兩上共為細末薑汁打糊丸量兒大小加減用之此方亦不峻厲白湯下潔古枳實丸白朮二兩黃土炒枳實一兩酒炒上依炒制共為細末以鮮荷葉包飯煨熟去荷葉將飯同前末撮勻為丸極小每服一二錢半飢白湯下若胃虛不思飲食加藿香五錢西砂五錢若體質肥白有痰者加酒炒廣皮五錢法夏五錢焙研消食消水消氣消痞消脹消腫消積其功甚健方亦名消積丸香附米酒炒一兩五靈脂淨一兩黑牽牛炒取頭末一兩共為細末醋打麵糊丸緑豆大每服一二十丸食遠薑湯下一方治傷冷及難化之之物以生薑紫蘇搗爛炒熱布包尉胸腹如冷再炒再尉神效治傷食停積不消用白酒面老麥芽取淨末一兩共為細末每服二錢白湯調下治粽傷及糯米所傷更妙一方治飲食停滯飽悶不消以糯米一升炒熱以布包之分作二包於臍腹上輪換尉之助其脾氣轉運自消因傷麵食腹脹以生薑搗汁和好酒熱服即消又方以生蘿蔔取汁溫熱服神應凡食麵用醋斷不作脹因食瓜果生冷太多腹脹氣急用青化桂去皮取肉研細末以飯搗和為丸緑豆大每服五丸稍長者十丸白湯下凡小兒病醫認症不確錯用其藥或煩躁不寧或吐瀉不止欲解去其藥用黑豆一杯甘草三錢煎濃湯服之自解倘無黑豆緑豆亦可胃苓湯見腫滿保和丸見二便色白消積丸異功散均見嘔吐六君子湯六神丸均見發熱霍亂論霍亂之病起於倉卒其症揮霍擾亂無有寧止故名霍亂究其致此病根多因夾食傷寒陰陽乖隔上吐下瀉而煩躁悶亂者是也蓋人有三焦上焦受納水穀主入而不主出中焦腐化水穀流行於五臟六腑下焦分別水穀主出而不主納故邪在上焦則吐在下則瀉在中則上吐下瀉凡霍亂得吐瀉則邪氣上下得出斯無苦矣蓋邪出盡而吐瀉自止乃有上不得吐下不得瀉為乾霍亂又名絞腸痧者其病因脾胃之邪氣無從而出若加喘滿作搐者十不救一其有上吐下瀉者當分寒熱治之亦宜止其乳食恐其增痰也故霍亂飲米湯必死以其助胃邪故也宜藿香正氣散有先瀉後吐者乃脾胃虛寒故先瀉白水而吐亦不多口氣緩而神色慢額上有汗六脈沉細此為虛冷宜以六君子湯溫之不愈則以理中湯加藿香木瓜各一錢有先吐後瀉者乃脾胃有熱故喘促唇紅吐來面赤渴飲水漿脈洪而數此為熱也宜以五苓散加藿香和解之至若干霍亂一症上不得吐下不得瀉最為危候速用鹽湯探吐之必待其吐出宿食痰積然後用藥或以針刺十指甲邊令血出或刺膝彎名委中穴血出即解後用藿香正氣散治法略明運用猶存乎人證治歌霍亂起於倉卒時揮霍擾亂症如斯病由夾食傷寒起陰陽不順兩相聯煩躁悶亂兼吐瀉邪在三焦宜逐之絞腸痧與乾霍亂邪氣凝於胃與脾上不得吐下不瀉喘滿作搐最難醫吐瀉則分寒與熱節乳慎勿使痰滋倘飲米湯必速禍藿香正氣散扶持先瀉後吐知何故脾胃虛寒病在茲先瀉白水吐亦少神色慢兮口氣徐額上有汗脈沉細虛冷六君子湯可施不愈則用理中湯進藿香木瓜加莫遺脾胃有熱必先吐面赤唇紅喘促隨渴飲水漿脈洪數五苓散加藿香宜危候莫如干霍亂鹽湯探吐莫遲遲吐出宿食兼痰積更須針刺救垂危或刺膝彎或指甲血出即解不須疑藥用藿香正氣散神明治法貴精思方鹽湯探吐法其法以溫水調食鹽略咸一大碗令兒服之良久以指探其喉間則吐一吐即松霍亂嘔吐不能受納藥食危甚者速以新汲水和百沸湯各一盞和勻飲數口即定痰瘧及宿食惡毒之物阻塞中焦而令腹脹即與鹽湯令其頓服吐盡痰食即安霍亂吐瀉諸藥不效用緑豆胡椒二十一粒研細水煎服如口渴甚者將二物末以井水調服即安霍亂心腹絞痛不可忍上不得吐下不得瀉痰壅腹脹手足厥逆六脈沉細危在須臾用食鹽一兩生薑五錢搗碎同鹽炒黑色水一大碗煎數沸溫服良久以手探喉中吐之或不吐即瀉發痧手足厥冷腹痛用溫水一碗令病人伏臥凳上以手蘸水掐兩膝彎名委中穴看其有紫黑點現用針刺黑點上出惡血即愈脾脈肝脈腎脈皆從此委中穴過藿香正氣散見時疫六君子湯見發熱理中湯五苓散均見外感瘧疾論經曰痎瘧皆生於風又曰夏傷於暑秋必痎瘧夫風暑陽邪也寒水陰邪也然風為陽中之涼氣暑為熱中之寒邪合四者而言無非皆屬於寒故俗號為脾寒謂病邪客於肌肉之間而脾應肉也及瘧之將發必先手足厥冷蓋脾主四肢也經云暑者特言時氣言寒者特言病氣若邪自淺而深郁寒成熱然終不免寒為本熱為標久而不解縱實亦虛非大補真氣大健脾氣莫能療也總之瘧病之發有寒有熱尋所來經皆自少陽雖有純熱純寒之辨為溫瘧牝瘧之別而言治總不離乎以少陽為宗或曰凡瘧之起其初必有痰食致臟氣不流故發為瘧又曰瘧之止發有定期其間有一日或二三日者此臟氣有盛衰邪之輕重不等也發於夏至後處暑前者三陽受病傷之淺而暴也發於處暑後冬至前者三陰受病傷之遠而深也發於子後午前者陽分受病易愈發在午後子前者陰分受病難愈尤當以寒熱多寡稟受強弱而參之則得矣且有曰瘧疾之症始而呵欠繼而足冷面色青黃身體拘急戰栗頭項腰脊俱痛寒去未已內外皆熱頭痛而渴但欲飲水嘔惡煩滿而不嗜食因症尋根皆由小兒脾胃素弱邪氣得以乘之雖有寒熱虛實之不同要不離乎脾胃然吾謂瘧之一病症有風寒暑濕與食之異治法分初中末殊為妥帖初則截之謂邪氣初中正氣未傷略與疏解即驅之使去不可以養患也中則和之謂邪氣漸入正氣漸傷或於補中加截藥或於截中加補藥務適其中以平為期末用補法謂邪久不去正氣已衰當補其脾胃為主使正氣復強則邪不攻自退此通論治法也而因病治病究不可不詳別焉稽夫風瘧者因感風得之其症惡風自汗煩渴頭痛風陽也故先熱後寒初時宜發散用桂枝白朮湯不退以小柴胡湯加常山檳榔烏梅截之久不退以補中益氣湯多服自愈寒瘧者因感寒得之其症無汗惡寒攣急面慘寒陰也故先寒後熱宜發散寒邪用養胃湯加桂心不止以平胃散加檳榔草果截之久不止以六君子湯加薑桂久服自愈暑瘧者因傷暑得之陰氣獨微陽氣獨發但熱不寒煩渴少睡嘔惡時見肌肉消爍宜解暑毒以柴胡白虎湯不止去石膏加貝母常山檳榔截之久不止以補中益氣湯久服自愈濕瘧者因冒襲雨濕汗出澡浴坐臥濕地得之其症身體腫痛肢節乏力嘔逆脹滿以胃苓湯主之不退以平胃散加茯苓檳榔常山截之久不止以參苓白朮散治之自愈食瘧者一名痰瘧由飲食不節飢飽有傷然也凡食生冷魚肉油膩之物以致中脘停痰皆為食瘧其候飢不欲食食則中滿嘔逆腹痛治宜去其宿食以四獸飲止之不止以二陳湯送紅丸子久不止以六君子湯加青皮薑桂服之自愈此五等症治明此而治瘧之法宜完備矣而復有瘧痢並作者治宜初用小柴胡湯加當歸白芍檳榔以解表導滯不已用六君子湯加桂枝服之自止且有瘧後腫者此病極多以胃苓湯五皮湯主之不消以六君子湯加薑桂砂仁四肢冷者加附子更有瘧後食少黃瘦不長肌肉將欲成疳者以平瘧養脾丸調之多服自愈又有瘧發於夜名夜瘧者此邪在血分宜麻黃桂枝湯加地黃紅花止之不止以四物湯合小柴胡湯加升麻提出陽分繼用四君子湯加常山檳榔烏梅截之甚矣小兒瘧疾得此宜保全矣但望明者善調之證治歌經言瘧疾各分端風暑寒水總為寒瘧發必先手足冷經言寒暑可精參暑言時氣寒言病郁寒成熱病源探久而不解必虛弱健脾補氣是大綱總之病發宜詳究尋所來經自少陽純熱純寒雖有別溫瘧牝瘧總同觀或云瘧發有痰食臟氣不流故不安或云瘧發分久暫臟氣盛衰豈等量處暑前與夏至後三陽受病猶等間處暑之後迄冬至三陰受病勢難當子後午前猶易治子前午後病非常宜從寒熱分多寡稟受有殊弱與強始而呵欠繼足冷身體拘急面青黃頭項腰脊俱痛苦寒去未已熱循環頭痛而渴欲飲水滿不嗜食嘔惡煩總由小兒脾胃弱因之邪氣得相干究竟治分初中末初則截之患宜防中則和之須審慎末宜補法庶無妨此為通治無他法因病治病更宜詳風瘧惡風因風感自汗頭痛煩渴彰先熱後寒宜發散桂枝白朮湯可嘗不退小柴胡湯可用常山烏梅與檳榔久而不退宜投補補中益氣湯莫忘寒症惡寒因寒感攣急無汗面少歡先寒後熱亦宜發養胃湯加桂心臧不止再投平胃散檳榔草果亦同行久之不愈六君子湯加入薑桂服自康暑瘧之症因傷暑但熱不寒類亢陽陰氣獨微陽氣發嘔惡少睡煩渴揚肌肉消爍宜解暑柴胡白虎湯最涼不止石膏宜急去檳榔貝母常山將久而不止仍宜補補中益氣湯利無疆濕瘧病源因冒雨澡浴坐臥濕地戕嘔逆脹滿肢乏力腫痛宜用胃苓湯不退且投平胃散茯苓檳榔與常山久之不愈宜何藥參苓白朮散擅長食瘧即同痰瘧病飲食不節飢飽傷飢不欲食食則滿嘔逆腹痛病難堪治法宜先去宿食四獸飲進勝瓊漿不止二陳湯最妙紅丸子服起膏盲久之不愈六君子湯加入青皮與桂薑更有瘧痢交作者小柴胡湯加藥襄檳榔當歸白芍藥解表導滯是程章不已則用六君子湯桂枝加入效可望病症更多瘧後腫胃苓湯與五皮湯良不消仍用六君子湯薑桂砂仁功可完四肢冷宜加附子瘧後少食另作看黃瘦肌肉時見減此時病勢將成疳平瘧養脾丸最善多服自解勿盤桓瘧發於夜名夜瘧邪在血分故為殃麻黃桂枝湯可用加入紅花與地黃不止小柴胡合四物湯升麻提陽理可諳繼用四君子湯烏梅入常山檳榔相頡頏小兒瘧疾如期治管教赤子壽而昌方桂枝白朮湯桂枝青皮陳皮雲苓各一錢川芎白芷桔梗檳榔各五分白朮六分法夏一錢半蘇子七分上入薑棗水煎瘧未發前二時服養胃湯草果仁薑製五錢藿香一錢半陳皮薑汁炒桂心各一錢炙草五分上入生薑三片烏梅一枚水煎熱服紅丸子三稜莪朮青皮陳皮胡椒乾薑上為細末早米粉煮糊為丸緑豆大黃丹為衣每服二十丸二陳湯送下平瘧養脾丸治久瘧體虛不問遠年近日此乃去瘧之良方也人參切片焙白朮土炒茯苓乳蒸陳皮酒炒青皮醋炒法夏蒼朮炒川朴薑製柴胡酒炒黃耆蜜炙豬苓炒澤瀉炒桂枝焙常山炒鱉甲醋炙川芎酒炒草果薑製炙草上為細末酒煮麵糊丸每服三錢米飲下有痞塊者加三稜莪朮麻黃桂枝湯麻黃桂枝黃芩桃仁生地紅花炙草上入蔥水煎熱服四物合小柴胡湯熟地白芍川芎當歸人參柴胡黃芩法夏升麻炙草等分上入薑棗水煎熱服四獸飲人參一錢法夏白朮各一錢二分茯苓二錢陳皮老生薑各一錢大棗一枚烏梅三粒炙草五分上水煎半飢服小兒凡發瘧疾多有邪氣須常燒檀速之香以闢其邪更常熏其衣褓等物氣穢去而邪易除矣清邪止瘧方用升麻柴胡各二錢黃芩知母各一錢五分生薑三錢甘草五分水煎服二三劑自止四神酒治久瘧不止用常山一錢五分檳榔一錢丁香五分烏梅一個好酒半碗略煎露一宿發日空心冷服小兒邪瘧其發無時日期不定乍早乍晚或有或無者名為邪瘧以麝香五釐同好京墨同研書去邪辟魔四字於額上效小兒熱瘧不寒者用穿山甲一兩大紅棗十個同燒存性為末每用一錢發日五更白湯調服小兒久瘧不止用大鱉甲小者不用以醋炙枯研末每一錢或五錢隔夜一服清晨一服將發時一服無不斷者瘧來寒多熱少飲食不思用良薑一兩麻油炒炮薑一兩其為末每二錢用豬膽汁調成膏臨發時熱酒調服或用豬膽汁和丸酒送下亦可小柴胡湯參苓白朮散見解囟補中益氣湯柴胡白虎湯見外感六君子湯見發熱平胃散胃苓湯五皮散均見腫滿二陳湯見嘔吐破傷風論附瘢疹癮疹赤白遊風丹毒黃水瘡頭面諸瘡天泡瘡露丹破傷風者何凡小兒跌僕或刀斧破傷為風邪暗襲傷處發腫謂之破傷風速宜治之不然則發痙矣治宜內服疏風活血散外以紫金錠塗之復有所謂瘢疹者然瘢與疹有別要在陰陽之分凡焮腫於外者屬少陽相火謂之瘢其症發於面部或背部或四肢極其稠密色如錦紋紅赤者胃熱也紫黑者胃爛也治均宜消瘢青黛飲其紅點發於皮膚之內不出者屬少陰君火謂之疹其症發於胸腹手足稀而少者此由無根失守之火聚於胸中主蒸於肺隱於皮膚而成小疹狀如蚊迹蚤斑而非錦紋也治宜理中湯瘢疹有自吐瀉者慎勿止之因其毒氣從上下出治宜調其中氣如吐瀉後遍身發熱瘢如錦紋者恐防熱氣乘虛入胃夏月多有此症治宜化瘢湯主之且有所謂癮疹者此病多屬於脾其發隱隱在皮膚之間發而多癢或不紅故名癮疹世俗謂之風丹治宜加味羌活散豫考群書又有赤白遊風丹毒一症為究病根因於熱發於風成於血蓋血得熱因以遊走然無風以感觸亦淡靜自安也治法因風熱者其色多白用小柴胡湯加防風連翹因血熱者其色多赤用四物湯加梔丹柴胡風熱相搏者其色紅白相間用人參敗毒散內寒外熱者其發在寢睡暖熱之時治宜加味羌活散因胃寒者發必嘔吐宜補中益氣湯加羌活或用消風散亦可抑有因血虛而發者其色白宜加味逍遙散不應或六味丸或逍遙散或防風升麻湯隨宜擇用次之或用磁針刺之血出即止然此丹毒集成有十種治法備列於後隨宜用之若夫黃水瘡病症屬肝脾風熱治法輕用犀角消毒散重用連翹防風湯若大便閉者用九味解毒散或加味清涼飲至若頭面生瘡頭為諸陽之會然亦各有部位治宜按部下方大凡瘡發而熱飲冷者是屬心經實熱治宜導赤散發熱而欲飲湯者是為心經虛熱治宜養心湯瘡若發於左腮而頭項強者是肝家之病宜柴胡清肝飲發瘡而咬牙煩悶者亦屬虛熱治宜六味地黃湯瘡發右腮嗽而飲冷者是肺家之病治宜瀉白散若發熱而咳嗽者是火剋金之候治宜人參平肺散若發於鼻而大便黃硬發熱飲冷是脾家之病治宜瀉黃散發熱飲湯而便溏白者是脾家虛熱治宜異功散瘡發耳輪乃膀胱之病瘡發承漿屬腎家之災均宜六味丸治之若發於胎毒者宜犀角消毒散因乳母膏粱過厚而致者治宜清胃散瘡發眉間者是名眉爛其病由於膽經積熱治宜柴胡梔子湯或用小柴胡湯亦可若因鬱怒者用加味逍遙散但須與乳母分服之又有名天泡瘡者其症如水泡之明亮是因肺胃二經風熱所致發熱焮痛者症在表治宜人參敗毒散發熱咳嗽者邪在肺治宜加味瀉白散熱渴便閉者邪在內治宜加味清涼散外用金黃散或黃柏散以麻油調搽之小兒初生有遍身蟲疥與乎流水風瘡者是皆胎毒切勿外治宜內服胡麻丸倘誤用搽洗逼毒入腹以致腹脹危候須急服解毒湯總之小兒未過周歲凡有一切瘡疥無論頭面遍身皆不宜輕用搽洗以胡麻丸服之最穩有瘡未搽洗而瘡忽自平更加痰喘氣急者切不可下宜以連翹丸解托之至若露丹一症小兒生後百日內外半歲以上忽然眼胞紅腫面青黯色夜間煩啼臉如胭脂此因伏熱在內發之於外初則滿面如水痘腳微紅而不壯出沒無定次至項頸赤如丹砂是名露丹以三解散疏散之小兒諸瘡之治輯録幾條是在醫者之精究耳證治歌病名類集破傷風或因跌僕或斧侵風邪暗襲傷處腫速宜治之庶無驚內服疏風活血散外則塗搽用紫金錠此論內載不一症瘢疹有別陰陽分瘢症焮腫屬相火面背四肢發必同極其稠密苦難受辨色遍體如錦紋紅赤胃熱紫黑爛消瘢青黛有殊功疹隱皮膚點稀少無根之火聚於胸蚊迹蚤瘢紋異錦治法速宜用理中吐瀉毒從上下出調其中氣法前人遍身發熱瘢如錦須防胃腑熱氣乘夏月人多有此症化瘢湯藥可為君癮疹一症由脾發皮膚多癢手難停俗謂風丹亦宜治加味羌活服須頻赤白遊風丹毒症醫人宜細究原因發風成血因於熱血得熱兮走遍身風熱色白小柴胡湯進加入連翹防風病可平血熱色赤用四物柴胡梔仁丹皮亦宜增風熱相搏紅白間人參敗毒服之寧內寒外熱發寢候加味羌活可回春胃寒病發必嘔吐補中益氣或消風散血虛而發其色白逍遙加味進宜勤六味丸或逍遙散防風升麻湯隨擇庸又有黃水瘡一症肝脾風熱釀而成犀角消毒散可進連翹防風湯亦靈便閉九味解毒散加味清涼亦可通頭面生瘡尋部位按部下方術不窮發熱飲冷宜導赤發熱飲湯宜養心發於左腮頭項強柴胡清肝保無凶咬牙煩悶屬虛熱六味地黃有定評發於右腮嗽飲冷肺家之病瀉白散馨咳嗽發熱火克肺人參平肺配宜精大便黃硬病發鼻瀉黃散治脾之𤵜飲湯便白脾虛熱治法可速進異功瘡發承漿病屬腎膀胱之病發耳輪六味丸投皆合法醫師臨症自分明胎毒所發宜何藥犀角消毒毒可清乳母厚味宜清胃眉爛積熱在膽經柴胡梔子湯能清熱小柴胡湯亦可斟鬱怒加味逍遙散乳母分服自然松又有一症名天泡肺胃風熱久薰蒸發熱焮痛症在表人參敗毒莫他尋咳嗽加味瀉白散熱渴便閉邪入深加味清涼宜速進金黃散黃柏散外搽工遍身蟲疥或流水胡麻丸服可通融誤用搽洗毒入腹急宜解毒莫因循瘡復自平加喘急連翹丸解托痰氣升至若露丹症奚似生後眼腫面色青煩啼臉赤如水痘出沒無定腳微紅三解散投取疏散因類備録救兒童方人參平肺散人參陳皮甘草地骨皮茯苓各二錢知母炒七分五味炒青皮天冬去心各四分桑皮炒一錢上每服二三錢水煎服疏風活血散當歸生地赤芍防風各一錢二分紅花川芎蘇木炙草各六分上入薑棗水煎熱服紫金錠山慈菰三兩五倍子三兩大戟一兩半明雄黃辰砂各一兩麝香三錢上共為細末糯米飲和藥為錠磨水塗之消瘢青黛飲雅連熟石膏知母柴胡黑梔仁元參升麻生地黃芩各一錢人參青黛炙草各五分上入生薑三片豆豉二十一粒水煎熱服化斑湯人參一錢熟石膏四兩知母二錢炙草淡竹葉各一錢上入粳米一撮水煎熱服加味羌活湯羌活前胡桔梗薄荷枳殼天麻白芷川芎蟬蛻各一錢人參炙草各五分上入生薑三片水煎熱服消風散羌活荊芥防風川芎厚朴陳皮人參茯苓甘草殭蠶蟬蛻藿香等分上為細末茶飲或酒調服逍遙散當歸白芍白朮茯苓甘草柴胡上入生薑水煎服防風升麻湯防風升麻麥冬去心知仁牛子炒元參荊芥乾葛薄荷木通各一錢粉草五分上入燈心煎服便閉加大黃微利之犀角消毒散牛蒡子甘草荊芥防風各五分犀角二分鎊金銀花三分上水煎好入犀角對服連翹防風湯連翹防風當歸陳皮白芍黃連獨活荊芥蒺藜炒牛蒡子炒黃芩茯苓甘草上等分每服二錢水煎熱服九味解毒散黃連炒金銀花連翹芍藥防風甘草各三分山梔四分白芷六分當歸六分上水煎母子並服加味清涼飲當歸赤芍大黃炒牛子炒梔仁甘草上等分水煎服養心湯黃耆炒白茯苓法夏當歸川芎辣桂柏子仁酸棗仁炒五味人參炙草上每服一二錢入薑棗煎服為末調服亦可柴胡梔子散即梔子清肝散柴胡梔子炒丹皮茯苓川芎芍藥炒當歸牛蒡子炒各七分甘草三分上水煎母子並服加味瀉白散即發熱內瀉白散加山梔杏仁金黃散滑石甘草上為細末青油調敷患處加黃柏尤妙胡麻丸白菊花二錢苦參首烏蒸胡麻仁炒蔓荊子炒威靈仙炒皂角刺炒荊芥穗焙各三錢菖蒲炒二錢上為細末米飲糊丸每服一二錢量兒大小加減淡竹葉湯調下連翹丸連翹桑白皮白頭翁丹皮防風黃柏化桂淡豆豉海螵蛸秦艽獨活各三錢上為細末蜜丸龍眼核大每服一丸燈心湯下解毒湯元參連翹升麻黃芩赤芍當歸羌活防風生地芥穗木通各一錢炙草五分上入燈心水煎服若大便祕量加酒炒大黃三解散人參防風天麻鬱金白附莊黃黃芩殭蠶全蠍枳殼薄荷赤芍甘草上入燈心水煎熱服磁針法用磁瓦輕輕敲破取鋒鋭者一塊將筷頭劈開筘磁針露鋒於外用線扎緊另以筷一隻於磁針上輕輕敲之血出多刺更妙一飛灶丹從頭頂起腫然後散開先用蔥白搗取自然汁塗之效二走灶丹從頭項起紅腫痛甚用紅飯豆研末雞蛋清調塗三鬼火丹從面部起紅腫用灶心土研末雞蛋清調塗四天火丹從背上起赤點用桑白皮切碎焙乾為末羊油調塗五天灶丹從兩臂赤腫黃色起用柳條燒灰研末淨水調塗六水丹先起兩脅赤腫用多年繡鐵磨濃汁豬油調塗七葫蘆丹先從臍下起用尖檳榔切碎焙乾研末醋調塗八野火丹先從兩腳起紅腫用乳香去油研末以羊油調塗九煙火丹從腳背上起紅腫用豬槽下土研末麻油調塗十胡漏丹從陰囊下起紅腫用門檻下千腳土研末羊油調塗胎毒重者遍體皆是用蕓薹子即油菜子也稱過一兩酒一大壺和研濾去渣煮數沸不拘時溫服治赤白遊風用油菜葉搗爛敷患處若無生葉即干葉亦可為末水調敷凡丹毒遍身或連腰周匝者百方不能治惟此最神四物湯導赤散柴胡清肝飲瀉白散瀉黃散均見發熱加味逍遙散異功散均見嘔吐清胃散見疳疾黃柏散見目痛六味丸見胎病補中益氣湯理中湯見外感小柴胡湯見解囟人參敗毒散見時疫楊梅證論附疔毒瘰癧時毒流注天蛇毒考夫楊梅一證以其腫突紅爛狀如楊梅故爾名之西北人名天泡瘡東南人則名棉花瘡小兒何有此患實由父母胎毒傳染而致也然此非尋常胎毒之可比蓋青樓豔質柳巷嬌姬每多患此而少年意興誤墮術中由泄精之後毒從精道乘虛直透命門以灌衝脈所以外而皮毛內而筋骨凡衝脈之所注莫不及之治不如法毒未盡而至殞命者有之矣然而遺毒難盡遺之兒女以致生而不育者有之矣即幸育之小兒不因而病者未之有也遇此者治最宜慎不然傷生殞命往往有之治法初起下體多者先用龍膽瀉肝湯上體多者宜用荊防敗毒散大便若閉者用連翹飲後用換肌消毒飲或用胡麻丸更為穩妥若有傷眼目宜九味蘆薈丸兼服六味丸若肢節驚攣宜用蠲痹解毒湯如脾胃虛弱者先用異功散後用換肌消毒飲或外無瘡形而皮自潰爛須下沆瀣丹兼進換肌消毒飲繼進托裡消毒飲其病自然平愈雖然此瘡固為深患而更有甚者則莫如疔毒治之不急其命難保為尋厥由或因乳母誤食毒物或感四時不正之氣其症外見寒熱拘急嘔吐瘡形如水泡小瘡治宜急用隔蒜灸法內服解毒湯真人活命飲若牙關緊閉宜速進奪命丹若以食冷與冷愛冷洗冷其命難保矣若手足有紅絲須用針挑出血更妙旋用小艾丸灸之自愈若瘰癧一症病由肝膽二經風熱血燥而成蓋二經常多血少氣倘怒則肝火動而血熱腎陰虛則不生木而血燥燥則筋病纍纍然結若貫珠其候多生於耳之前後連及頤項下至缺盆及胸腋之側又謂之馬刀初起如豆粒漸如梅李或一粒或二粒按之則動而微痛不甚熱久之則日益日甚或頭項強痛或午後微熱或夜間口乾飲食少思四肢倦怠或堅而不潰或潰而不合皆由氣血不足往往變成疳癆此症並非外科切忌刀針爛藥取去其核昧者不諳病源誤用爛藥取核不知肝脾二經內有相火抑鬱不伸而生瘰癧為之益氣養榮舒筋散郁猶恐不暇何敢用刀針爛藥以致破爛不收膿血交併耶故凡小兒患此不可妄治然虛實表裡亦所必詳治法赤腫者為肝熱宜人參敗毒散寒熱者為肝火宜加味小柴胡湯不痛尿黃肝血熱也宜六味丸隱內色白乃肝疳也宜九味蘆薈丸膿成不潰或潰不合者脾氣虛弱也宜益氣養榮湯其他外治簡方另録於後不但此也有感於四時不正之氣而病為時毒者其症頭頂項鼻面耳胸與咽喉皆腫或寒或熱恍惚不寧有如傷寒然此病數日能斃人命治法脈浮者邪在表以牛子湯攻之脈沉澀者邪在裡以梔子仁湯解之若表裡俱病以升麻主之甚則宜通氣散砭之若痛不作膿者以消毒散潰不收斂者以托裡散更有病名流注者蓋謂血滯而注也其症多因脾虛食積而凝或因閃跌外為六淫所侵治法因閃跌者宜和血定痛丸因肝火者九味蘆薈丸若因食積者以四味肥兒丸通用蔥尉法亦妙或膿成不潰者乃氣血虛也須用補劑而後針之或膿出而反痛者以八珍湯主之嘔逆不食者以四君子湯主之口噤搐搦者乃大虛之變症虛熱陰虛故寒熱相凌須急以十全大補湯補之內熱晡熱者陰血弱也以四物湯加參耆白朮主之抑有名天泡毒者其症指頭腫痛寒熱往來然五指各有經絡言治不可不究考夫大指屬太陰肺食指屬大腸中指屬心包無名指屬三焦小指屬心大約此病多因過於厚味或寒熱之侵治法初以活命飲次用托裡消毒飲若元氣下陷而沉墜痛者則以補中益氣湯甚矣小兒之病亦繁而且怪哉言治者潦草固不可而統以強壯通治亦甚不可故編輯另列一科後之覽者蓋亦省之證治歌乳子楊梅何事生總由胎毒禍相侵紅爛如梅宜速治古人保赤有良針下體多兮龍膽瀉肝湯上體多者荊防敗毒清大便閉宜連翹飲換肌消毒飲是後程或用胡麻丸更穩管教積毒自消融有傷眼目宜九味蘆薈丸六味丸加亦可斟肢節驚攣毒宜解蠲痹解毒勿逡巡脾胃虛弱異功散後用換肌消毒飲工若無瘡形皮自爛先投沆瀣丹奏功兼進換肌消毒飲繼服托裡消毒飲平更有疔毒尤為患乳母食毒是病因或感四時不正氣寒熱拘急嘔吐頻形如小泡急需治外用隔蒜灸法攻內服解毒湯最妙真人活命飲相同牙關緊閉宜何藥速進奪命丹自松肢有紅絲針挑破後將艾灸法堪遵瘰癧一症有由發風熱血燥肝膽經二經多血而少氣怒動肝火血熱凝木失所生而血燥燥則筋病瘰癧成生耳前後連頤項下及胸腋之下與缺盆初起如豆漸如李按之而動微痛疼病延日久頸項強午後微熱夜渴臻飲食少思肢倦怠堅而不潰潰難封此病總由氣血弱變成疳癆禍匪輕外科治法多貽誤刀針取核最傷人表裡虛實須詳辨治法分明可引伸赤腫本為肝熱病人參敗毒散堪陳寒熱則從肝火發加味小柴胡湯可庸不痛溺黃肝血熱六味丸投熱自熔隱內色白肝疳症九味蘆薈丸最靈膿成不潰潰不合養榮益氣湯建勳氣感不正成時毒症發頭頂而耳胸咽喉項鼻皆成腫或寒或熱不安寧病似傷寒候最惡治法脈分浮與沉脈若浮兮邪在表牛子湯攻效絶倫脈如沉澀邪在裡欲解須投梔子仁湯表裡俱病升麻湯主甚則通氣散最精痛不作膿消毒散潰不收斂托裡散神更有病名流注者血滯而注病之根或因脾虛兼食積或因閃跌感六淫閃跌和血定痛丸最善肝火九味蘆薈丸最醇食積四味肥兒丸好通用尉法必須蔥膿成不潰氣血弱須用補劑乃堪針膿出反痛八珍湯進嘔吐不食用四君子湯口噤搐搦大虛症虛熱陰虛寒熱停十全大補湯能救內熱晡熱更須詢陰血弱宜投四物湯加入黃耆白術與參復有病號天泡毒指頭腫痛寒熱循指之經絡分五臟大指屬肺本太陰病在大腸名食指病心包絡指居中無名指本三焦病小指病心治法均病由厚味因流毒或因寒熱損其身初起藥投活命飲托裡消毒飲繼相從元氣墜陷因疼痛補中益氣可回春縷悉條分諸毒症時醫下藥勿朦朧方龍膽瀉肝湯柴胡黃芩炒膽草酒炒梔子酒炒澤瀉木通車前子當歸酒洗生地酒炒甘草上等分水煎服荊防敗毒散人參茯苓枳殼桔梗柴胡前胡羌活獨活川芎薄荷荊芥防風大連翹飲當歸木通柴胡黃芩赤芍連翹防風滑石蟬蛻梔子荊芥瞿麥甘草上咀片水煎服每服二錢加紫草少許大便祕量加大黃換肌消毒飲一名萆薢散白鮮皮白芷當歸甘草木瓜忌鐵苡仁土茯苓即萆薢皂刺上咀片水煎食前空心服九味蘆薈丸青皮雷丸木香白蕪荑川連胡連鶴蝨蘆薈麝香上為細末米糊丸如麻子大每服五分空心米飲下量兒加減蠲痹解毒湯白鮮皮薑黃赤芍當歸羌活各四分茯苓白朮皂角子炒各二分白芷三分上為末水煎服托裡消毒飲人參黃耆當歸酒洗川芎芍藥炒白朮茯苓各一錢金銀花連翹白芷各七分甘草五分上每服三五錢水煎服真人活命飲金銀花陳皮各三錢皂角刺炒穿山甲蛤粉炒乳香沒藥白芷防風當歸各一錢貝母花粉甘草各七分上每服五錢酒煎母子同服或為末酒調服亦可若勢甚而邪在表者加麻黃若毒在內者加大黃當臨症制宜此回生起死之劑但元氣脫者不治奪命丹真蟾蜍乾者酒化輕粉枯白礬銅緑寒水石乳香沒藥麝香硃砂各六錢蝸牛四十個另研如無亦可上為末入蟾蜍蝸牛或酒少許糊丸緑豆大每服一二丸溫酒或蔥湯下重者外用隔蒜灸法益氣養榮湯人參茯苓陳皮貝母香附炒當歸酒洗川芎熟地黃耆炒芍藥各一錢炙草桔梗五分白朮柴胡各六分上每服二三錢加生薑水煎服牛子湯貫仲乾葛豆豉牛子半生半炒甘草上等分每服三五錢水煎服梔子仁湯梔仁牛子半生半炒上等分研末每服二三錢水煎或蜜調服托裡散人參白朮黃耆當歸芍藥茯苓熟地甘草上水煎服氣虛者重用參耆血虛者重用當歸和血定痛湯又名黑丸子百草霜五兩川烏炮兩半白芨南星炮各二兩白蘞八兩當歸五兩赤小豆八兩牛膝五兩骨碎補四兩芍藥五兩上為細末酒糊丸梧子大每服二三十丸白湯下此湯能治流注膝風或閃跌瘀血作痛等症八珍湯人參白朮茯苓炙草當歸川芎熟地白芍上入薑棗煎服神效蔥尉法治流注結核或骨癰鶴膝等症先用隔蒜炙者余腫倘存用此尉之以取行氣血散壅滯功效甚速又治跌撲損傷止痛散血消腫之良法也其法用蔥細切搗爛炒熱頻尉患處冷則易之如鶴膝風兼服大防風湯自愈大防風湯附片牛膝酒炒各一錢白朮羌活人參防風各二錢杜仲薑製川芎肉桂黃耆炒熟地白芍炒各一錢五分甘草一錢上每服二五錢水煎服隔蒜灸法治流注及癰疽鶴膝風等症每日灸二三十壯痛者灸至不痛不痛者灸至痛其毒隨火而散蓋火以暢達拔引郁毒此提治之法有回生之道其法用大蒜去皮切三文錢厚安患處用艾壯於蒜上灸之三壯換蒜復灸未成即消已成亦殺其毒如癰大用蒜杵搗爛攤患處將艾鋪上燒之蒜敗再易如不痛或作膿或不起發及瘡屬陰症者尤當多灸凡瘡不痛不作膿不起發者皆氣血虛也多主不治惟患在頭面者不宜多灸論小兒灸法不同小兒肌肉脆嫩且不能言痛否且將蒜切薄片著肉一面略剜少空灼艾燃蒜先置大人臂上試其冷熱得宜然後移著瘡上又別灼艾如前法試之以待相易勿令間歇治小兒頸項結核或三五粒十數粒或痛發熱或不痛發熱用鳳毛草根系陰崖所生取以糯米酒煮湯服之久服多服自愈紫霞膏治瘰癧用松香一斤銅緑二兩先將麻油四兩熬令滴水不散下松香次下銅緑熬盡煙退火毒收入磁瓶內用時以熱水溶用皮紙開貼梅瘡點藥用杏仁一兩泡去皮以棉紙包之木捶緩緩捶去油以成白粉為度加入真輕粉八分明雄一分共研勻先以槐花煎湯將瘡洗淨瘡濕以干藥搽之瘡乾用公豬膽汁調搽三日即愈此方不特小兒梅瘡凡外科下疳瘡蠟燭瘡藥到病除最驗治小兒疥瘡神方用大風子肉三錢輕粉明礬各五分共為末先以臘月豬油二兩入麻黃五錢同入鍋內熬之以麻黃色黑為度濾去渣退火冷定調前末搽之但小兒生瘡必先內服解毒之藥方可外治不然恐毒入內反生別害慎之治癙痢白禿頭瘡方用雞蛋十個去殼攪勻入小鍋加香油共燙成一餅乘熱蓋兒頭上一時蛋冷又將上面用香油煎熱再覆頭上數次痊愈治肥瘡即黃水瘡用黃連五錢輕粉三錢共為細末以麻油調成膏塗粗碗內宜乾溼得中將碗覆轉下燒艾煙薰之緩緩燒煙薰至黑色為度放地上出火毒次加冰片三分研勻香油調搽數次即愈治熱毒瘡疥用生石膏生硫黃陳細茶各二錢共為末以生豬油和藥搗勻搽之小兒諸般疳瘡生於面上遍身爛如楊瘡以蒸糯飯時甑盆四邊滴下汽水以碗盛取掃瘡上數日即愈小兒頭生軟癤用枳殼一個刳去瓤磨平口以麵糊塗滿口同於癤上餘一邊安燈心一根以通濃水愈後枳殼自脫更無痕迹其枳殼鮮者更妙枳殼即鐵籬巴臭橘子是也此方不獨治軟癤凡久年頭瘡膿瘡不能收口依法用之無不愈者治成人梅瘡方穿山甲蛇蛻蟬蛻蝟皮黃芩黃連梔子黃柏土茯苓皂刺槐花人參上等分水煎服四君子湯補中益氣湯見外感通氣散消毒散見目病六味丸見胎病異功散見嘔吐沆瀣丹見臍風解毒湯見破傷風人參敗毒散見時疫加味小柴胡湯見不寐升麻湯見痢疾四味肥兒丸見疳疾十全大補湯見解囟四物湯見發熱胡麻丸見破傷風湯火便方湯火傷初起以食鹽研末調米醋塗之暫時雖痛卻能護肉不壞然後再用別方切不可用冷物塌冷水洗並涼藥敷貼湯火傷悶亂不省人事急以蜂蜜調湯灌之若至重者急以煮過熱酒十壺入浴盆內以患兒浸酒中雖至重者不死小兒火燒手即以酸醋升余浸之出醋尚痛少時痛止不瘡不膿不疤痕奇方也湯火傷爛諸藥不治者用豬毛一籃以破鍋炭火煅紅入豬毛在內煅之候豬毛消化而成黑液取起冷定略加大黃數錢共研細末再加冰片一分研勻香油茶油豬油俱可調搽至神至靈之方遭火藥燒壞者先以好酒洗淨次以大黃研末以雞蛋黃熬油調末搽之即愈治湯火傷用石灰不拘多少大黃不拘多少研末與石灰同入井花水內澄清去面水加真麻油少許用鴨毛不住手攪勻如雞子黃樣搽患處止痛神效退火症火毒用金櫻子根去粗皮不拘多少搗爛取汁搽患處即時退火神效
